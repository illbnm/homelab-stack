global:
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@homelab.local'
  smtp_auth_username: ''
  smtp_auth_password: ''
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      continue: false
    - match:
        severity: warning
      receiver: 'warning'
      continue: false

receivers:
  - name: 'default'
    email_configs:
      - to: 'admin@homelab.local'
        headers:
          subject: '[HOMELAB] {{ .GroupLabels.alertname }}'
        html: |
          <h2>Alert: {{ .AlertName }}</h2>
          <p><strong>Severity:</strong> {{ .CommonLabels.severity }}</p>
          <p><strong>Status:</strong> {{ .Status }}</p>
          <p><strong>StartsAt:</strong> {{ .StartsAt }}</p>
          <p><strong>Summary:</strong> {{ .CommonAnnotations.summary }}</p>
          <p><strong>Description:</strong> {{ .CommonAnnotations.description }}</p>

  - name: 'critical'
    email_configs:
      - to: 'admin@homelab.local'
        headers:
          subject: '[HOMELAB CRITICAL] {{ .GroupLabels.alertname }}'
        html: |
          <h2 style="color:red;">CRITICAL ALERT</h2>
          <h3>{{ .AlertName }}</h3>
          <p><strong>Severity:</strong> {{ .CommonLabels.severity }}</p>
          <p><strong>Status:</strong> {{ .Status }}</p>
          <p><strong>StartsAt:</strong> {{ .StartsAt }}</p>
          <p><strong>Summary:</strong> {{ .CommonAnnotations.summary }}</p>
          <p><strong>Description:</strong> {{ .CommonAnnotations.description }}</p>
    webhook_configs:
      - url: 'http://uptime-kuma:3001/api/alert'
        send_resolved: true

  - name: 'warning'
    email_configs:
      - to: 'admin@homelab.local'
        headers:
          subject: '[HOMELAB WARNING] {{ .GroupLabels.alertname }}'
