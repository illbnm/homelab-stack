# =============================================================================
# Home Assistant Secrets
# HomeLab Stack — Home Automation
# =============================================================================
# 请复制此文件为 secrets.yaml 并填入真实密码
# cp config/homeassistant/secrets.yaml.example config/homeassistant/secrets.yaml

# MQTT 密码（Mosquitto 用户 ha 的密码）
mqtt_password: !secret HA_MQTT_PASSWORD

# 地理位置（可选，用于天气、日出日落等）
latitude: 31.2304
longitude: 121.4737
elevation: 0

# Wi-Fi 密码（用于设备跟踪等）
# wifi_password: your_wifi_password

# Google TTS（可选）
# google_tts_api_key: your_google_api_key
