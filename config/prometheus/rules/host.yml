groups:
  - name: host
    interval: 1m
    rules:
      - alert: HostHighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: High CPU on  + "{{ " + $labels.instance }}" + 
          description: CPU usage is above 80% (current value:  + "{{ " + $value }}%" + )

      - alert: HostHighMemory
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: High memory on  + "{{ " + $labels.instance }}" + 
          description: Memory usage is above 90% (current value:  + "{{ " + $value }}%" + )

      - alert: HostDiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Low disk space on  + "{{ " + $labels.instance }}" + 
          description: Disk space is below 15% (current value:  + "{{ " + $value }}%" + )

      - alert: HostDiskSpaceCritical
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Critical disk space on  + "{{ " + $labels.instance }}" + 
          description: Disk space is below 5% (current value:  + "{{ " + $value }}%" + )

      - alert: HostDiskIOHigh
        expr: rate(node_disk_io_time_seconds_total[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: High disk IO on  + "{{ " + $labels.instance }}" + 
          description: Disk IO is above 80% (current value:  + "{{ " + $value }}%" + )
