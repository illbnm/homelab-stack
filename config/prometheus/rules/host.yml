groups:
  - name: host_alerts
    interval: 30s
    rules:
      - alert: HostHighCPU
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host {{ $labels.instance }} CPU is high"
          description: "CPU usage is above 80% for more than 5 minutes (current: {{ $value }}%)"

      - alert: HostHighMemory
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host {{ $labels.instance }} memory is high"
          description: "Memory usage is above 90% (current: {{ $value }}%)"

      - alert: HostHighDisk
        expr: (node_filesystem_size_bytes{mountpoint="/"} - node_filesystem_avail_bytes{mountpoint="/"}) / node_filesystem_size_bytes{mountpoint="/"} * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host {{ $labels.instance }} disk is high"
          description: "Disk usage is above 85% (current: {{ $value }}%)"

      - alert: HostDiskIOHigh
        expr: rate(node_disk_io_time_seconds_total[5m]) > 0.5
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "Host {{ $labels.instance }} disk IO is high"
          description: "Disk IO utilization is high (current: {{ $value }})"
