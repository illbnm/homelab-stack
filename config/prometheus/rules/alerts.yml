groups:
  - name: host
    interval: 30s
    rules:
      - alert: HostHighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 80% for more than 5 minutes (current: {{ $value }}%)"

      - alert: HostHighMemory
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 < 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Available memory is below 10% (current: {{ $value }}%)"

      - alert: HostHighDisk
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs"} / node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs"}) * 100 < 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk space is below 15% (current: {{ $value }}%)"

      - alert: HostHighDiskIO
        expr: rate(node_disk_io_time_seconds_total[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High disk I/O on {{ $labels.instance }}"
          description: "Disk I/O utilization is above 80% (current: {{ $value }}%)"

  - name: containers
    interval: 30s
    rules:
      - alert: ContainerHighRestart
        expr: rate(container_restart_count[1h]) * 60 > 3
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.container_label_com_docker_compose_service }} restarting frequently"
          description: "Container has restarted more than 3 times in the last hour"

      - alert: ContainerOOMKilled
        expr: increase(container_memory_failcnt_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.container_label_com_docker_compose_service }} OOM killed"
          description: "Container has been OOM killed in the last 5 minutes"

      - alert: ContainerUnhealthy
        expr: kube_pod_container_status_health != 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.container }} health check failing"
          description: "Container health check has been failing for more than 2 minutes"

  - name: services
    interval: 30s
    rules:
      - alert: TraefikHigh5xxErrorRate
        expr: rate(traefik_http_requests_total{code=~"5.."}[5m]) / rate(traefik_http_requests_total[5m]) * 100 > 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate on Traefik"
          description: "5xx error rate is above 1% (current: {{ $value }}%)"

      - alert: ServiceHighResponseTime
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High response time on {{ $labels.service }}"
          description: "P99 response time is above 2 seconds (current: {{ $value }}s)"

      - alert: PrometheusTargetDown
        expr: up{job=~".*"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus target {{ $labels.job }} is down"
          description: "Target has been down for more than 2 minutes"
