groups:
  - name: services
    interval: 1m
    rules:
      - alert: TraefikHighErrorRate
        expr: sum(rate(traefik_service_requests_total{code=~"5.."}[5m])) / sum(rate(traefik_service_requests_total[5m])) * 100 > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Traefik 5xx error rate is high
          description: More than 1% of requests are returning 5xx errors (current value:  + "{{ " + $value }}%" + )

      - alert: ServiceHighResponseTime
        expr: histogram_quantile(0.99, rate(traefik_service_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Service response time P99 is high
          description: P99 response time is above 2 seconds (current value:  + "{{ " + $value }}s" + )

      - alert: PrometheusTargetsDown
        expr: count(up == 0) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Prometheus targets are down
          description:  + "{{ " + $value }}" +  Prometheus targets are unreachable.

      - alert: AlertmanagerConfigFailed
        expr: alertmanager_config_last_reload_successful == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Alertmanager configuration failed
          description: Alertmanager failed to reload configuration.

      - alert: PrometheusConfigFailed
        expr: prometheus_config_last_reload_successful == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Prometheus configuration failed
          description: Prometheus failed to reload configuration.
