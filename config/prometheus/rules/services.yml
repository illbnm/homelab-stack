groups:
  - name: service_alerts
    interval: 30s
    rules:
      - alert: TraefikHigh5xxErrors
        expr: rate(traefik_backend_requests_total{code=~"5.."}[5m]) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Traefik 5xx error rate is high"
          description: "5xx error rate is above 1% (current: {{ $value | humanizePercentage }})"

      - alert: ServiceHighLatency
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Service {{ $labels.instance }} P99 latency is high"
          description: "P99 response time is above 2 seconds (current: {{ $value }}s)"

      - alert: PrometheusTargetDown
        expr: up == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus target {{ $labels.job }} is down"
          description: "Target {{ $labels.job }} has been down for more than 3 minutes"

      - alert: GrafanaDown
        expr: up{job="grafana"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Grafana is down"
          description: "Grafana has been unreachable for 2 minutes"

      - alert: LokiDown
        expr: up{job="loki"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Loki is down"
          description: "Loki has been unreachable for 2 minutes"

      - alert: AlertmanagerDown
        expr: up{job="alertmanager"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Alertmanager is down"
          description: "Alertmanager has been unreachable for 2 minutes"
