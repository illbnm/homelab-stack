# =============================================================================
# Container Alert Rules
# =============================================================================

groups:
  - name: container_alerts
    rules:
      # Container restart count > 3 per hour
      - alert: ContainerRestarting
        expr: increase(container_restart_count[1h]) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} restarting frequently"
          description: "Container restarted {{ $value }} times in the last hour"

      # Container OOM killed
      - alert: ContainerOOMKilled
        expr: container_oom_events_total > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.name }} OOM killed"
          description: "Container was OOM killed"

      # Container health check failed
      - alert: ContainerHealthCheckFailed
        expr: container_health_status{status="unhealthy"} == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} health check failed"
          description: "Container health check is failing"

      # Container CPU usage > 80%
      - alert: ContainerHighCPU
        expr: rate(container_cpu_usage_seconds_total{name!=""}[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} high CPU usage"
          description: "Container CPU usage is {{ $value }}%"

      # Container memory usage > 90%
      - alert: ContainerHighMemory
        expr: (container_memory_usage_bytes / container_spec_memory_limit_bytes) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} high memory usage"
          description: "Container memory usage is {{ $value }}%"
