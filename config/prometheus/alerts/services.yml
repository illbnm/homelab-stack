groups:
  - name: service_alerts
    rules:
      - alert: TraefikHigh5xxErrorRate
        expr: |
          (
            sum(rate(traefik_service_requests_total{code=~"5.."}[5m]))
            /
            sum(rate(traefik_service_requests_total[5m]))
          ) * 100 > 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Traefik 5xx error rate is high"
          description: "Traefik 5xx error rate is above 1%\n  VALUE = {{ $value }}%"

      - alert: ServiceHighResponseTime
        expr: histogram_quantile(0.99, rate(traefik_service_request_duration_seconds_bucket[5m])) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Service response time P99 is high"
          description: "Service {{ $labels.service }} P99 response time is above 2 seconds\n  VALUE = {{ $value }}s"

      - alert: ServiceDown
        expr: up{job!~"prometheus"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Service is down"
          description: "Service {{ $labels.job }} is not responding\n  VALUE = {{ $value }}"

      - alert: PrometheusConfigReloadFailed
        expr: prometheus_config_last_reload_successful == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus configuration reload failed"
          description: "Prometheus configuration reload has failed\n  VALUE = {{ $value }}"

      - alert: AlertmanagerNotificationFailed
        expr: rate(alertmanager_notifications_failed_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Alertmanager notification failed"
          description: "Alertmanager notification to {{ $labels.integration }} has failed\n  VALUE = {{ $value }}"

      - alert: LokiRateLimitReached
        expr: rate(loki_discarded_samples_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Loki rate limit reached"
          description: "Loki is discarding samples due to rate limiting\n  VALUE = {{ $value }}"
