groups:
  - name: services
    interval: 30s
    rules:
      - alert: TraefikHighErrorRate
        expr: sum(rate(traefik_service_requests_total{code=~"5.."}[5m])) by(service) / sum(rate(traefik_service_requests_total[5m])) by(service) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Traefik high 5xx error rate on {{ $labels.service }}"
          description: "5xx error rate is {{ $value | printf \"%.2f\" }}% (threshold: 1%)"

      - alert: TraefikHighLatencyP99
        expr: histogram_quantile(0.99, sum(rate(traefik_service_request_duration_seconds_bucket[5m])) by(le, service)) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Traefik high P99 latency on {{ $labels.service }}"
          description: "P99 latency is {{ $value | printf \"%.2f\" }}s (threshold: 2s)"

      - alert: TraefikBackendDown
        expr: count(traefik_service_server_up == 0) by(service) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Traefik backend {{ $labels.service }} has no healthy servers"
          description: "All backend servers for this service are down"
