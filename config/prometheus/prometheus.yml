global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: homelab

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: node-exporter
    static_configs:
      - targets: [node-exporter:9100]

  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]

  - job_name: traefik
    static_configs:
      - targets: [traefik:8080]

  - job_name: loki
    static_configs:
      - targets: [loki:3100]

  - job_name: tempo
    static_configs:
      - targets: [tempo:3200]

  - job_name: alertmanager
    static_configs:
      - targets: [alertmanager:9093]

  - job_name: uptime-kuma
    static_configs:
      - targets: [uptime-kuma:3001]
    metrics_path: /metrics
    scheme: http

  - job_name: authentik
    static_configs:
      - targets: [authentik-server:9300]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: authentik

  - job_name: nextcloud
    static_configs:
      - targets: [nextcloud:80]
    metrics_path: /apps/serverinfo/metrics

  - job_name: gitea
    static_configs:
      - targets: [gitea:3000]
    metrics_path: /metrics
