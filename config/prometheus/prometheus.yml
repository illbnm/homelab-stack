global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 30s
    metrics_path: /metrics

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s

  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8080']
    metrics_path: /metrics
    scrape_interval: 30s

  - job_name: 'authentik'
    static_configs:
      - targets: ['authentik-server:9300']
    metrics_path: /metrics
    scrape_interval: 60s

  - job_name: 'nextcloud'
    static_configs:
      - targets: ['nextcloud:80']
    metrics_path: /metrics
    scrape_interval: 60s
    basic_auth:
      username: 'monitoring'
      password_file: /etc/prometheus/secrets/nextcloud_password

  - job_name: 'gitea'
    static_configs:
      - targets: ['gitea:3000']
    metrics_path: /metrics
    scrape_interval: 60s
    bearer_token_file: /etc/prometheus/secrets/gitea_token

  - job_name: 'blackbox'
    static_configs:
      - targets:
        - http://authentik-server:9000
        - http://nextcloud:80
        - http://gitea:3000
    metrics_path: /probe
    params:
      module: [http_2xx]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115