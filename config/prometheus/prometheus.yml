## 🔧 采集目标详解

| Job 名称 | 目标 | 端口 | 说明 |
|----------|------|------|------|
| `node-exporter` | 主机指标 | 9100 | CPU, 内存, 磁盘, 网络 |
| `cadvisor` | 容器指标 | 8080 | 容器资源使用、网络、块 I/O |
| `traefik` | 反代指标 | 8080 | 请求数、状态码、延迟 |
| `authentik` | SSO 指标 | 9000 | 登录数、用户数、延迟 |
| `gitea` | 代码托管 | 3000 | 仓库数、用户数、API 调用 |
| `nextcloud` | 云存储 | 9000 | 用户数、存储使用、API |
| `prometheus` | 自监控 | 9090 | 自身指标、WAL 大小 |

需要监控的服务可根据实际部署情况增删。

---

## 📊 指标访问

Prometheus Web UI: https://prometheus.${DOMAIN}

- 查询语言: PromQL
- 示例查询:
  - 主机 CPU 使用率: `100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)`
  - 容器内存使用: `container_memory_usage_bytes{container_label_com_docker_compose_service="cadvisor"}`
  - 请求延迟: `rate(traefik_service_requests_total{service="monitor"}[5m])`

