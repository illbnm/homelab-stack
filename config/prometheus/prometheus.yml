global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: homelab

rule_files:
  - /etc/prometheus/rules/*.yml
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]
    metrics_path: /metrics

  - job_name: node-exporter
    static_configs:
      - targets: [node-exporter:9100]

  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]

  - job_name: traefik
    static_configs:
      - targets: [traefik:8080]
    metrics_path: /metrics

  - job_name: loki
    static_configs:
      - targets: [loki:3100]
    metrics_path: /metrics

  - job_name: alertmanager
    static_configs:
      - targets: [alertmanager:9093]

  - job_name: tempo
    static_configs:
      - targets: [tempo:3200]

  - job_name: authentik-server
    static_configs:
      - targets: [authentik-server:9300]
    metrics_path: /metrics

  - job_name: authentik-worker
    static_configs:
      - targets: [authentik-worker:9300]
    metrics_path: /metrics

  - job_name: nextcloud
    static_configs:
      - targets: [nextcloud:9205]

  - job_name: gitea
    static_configs:
      - targets: [gitea:3000]
    metrics_path: /metrics
