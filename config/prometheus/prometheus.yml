## 🎯 与 Grafana 集成

Grafana 会自动从 `config/grafana/provisioning/datasources/prometheus.yml` 加载 Prometheus 数据源。

预置 Dashboard 包含:
- Node Exporter Full (ID 1860)
- Docker Container & Host Metrics (ID 179)
- Traefik Official (ID 17346)

所有 Dashboard 在 `config/grafana/provisioning/dashboards/` 中定义，自动导入。

---

## 🔒 安全建议

- ✅ Prometheus 不直接暴露公网（仅内网和 Traefik 可选）
- ✅ 启用基本认证（Traefik 已配置 Basic Auth）
- ✅ 限制 scrape 目标（仅已知服务）
- ✅ 数据保留时间合理（默认 30 天，可调整）
- ✅ 使用 TLS 连接（如果 Prometheus → 目标支持）

---

## 🛠️ 故障排除

### Prometheus 无法抓取目标

1. 检查目标容器是否健康: `docker compose ps`
2. 查看 Prometheus 日志: `docker compose logs prometheus`
3. 查看 Targets 页面: https://prometheus.${DOMAIN}/targets
4. 确保目标容器已暴露 metrics 端口（即使不通过 Traefik）

### 数据量过大

调整 `scrape_interval` (例如改为 `30s` 或 `1m`)，或减少抓取的目标数量。

