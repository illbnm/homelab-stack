# =============================================================================
# Prometheus Configuration
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'homelab'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Load alert rules
rule_files:
  - /etc/prometheus/alerts/*.yml

# Scrape configurations
scrape_configs:
  # ---------------------------------------------------------------------------
  # Prometheus self-monitoring
  # ---------------------------------------------------------------------------
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # ---------------------------------------------------------------------------
  # Node Exporter - Host metrics
  # ---------------------------------------------------------------------------
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # ---------------------------------------------------------------------------
  # cAdvisor - Container metrics
  # ---------------------------------------------------------------------------
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # ---------------------------------------------------------------------------
  # Traefik - Reverse proxy metrics
  # ---------------------------------------------------------------------------
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8080']

  # ---------------------------------------------------------------------------
  # Alertmanager
  # ---------------------------------------------------------------------------
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']

  # ---------------------------------------------------------------------------
  # Authentik - SSO metrics
  # ---------------------------------------------------------------------------
  - job_name: 'authentik'
    static_configs:
      - targets: ['authentik-server:9300']
    metrics_path: /metrics

  # ---------------------------------------------------------------------------
  # Nextcloud - Storage metrics
  # ---------------------------------------------------------------------------
  - job_name: 'nextcloud'
    static_configs:
      - targets: ['nextcloud:80']
    metrics_path: /ocs/v2.php/apps/serverinfo/api/v1/info
    basic_auth:
      username: ${NEXTCLOUD_EXPORTER_USER:-}
      password: ${NEXTCLOUD_EXPORTER_PASSWORD:-}

  # ---------------------------------------------------------------------------
  # Gitea - Git hosting metrics
  # ---------------------------------------------------------------------------
  - job_name: 'gitea'
    static_configs:
      - targets: ['gitea:3000']
    metrics_path: /metrics

  # ---------------------------------------------------------------------------
  # Uptime Kuma - Service availability
  # ---------------------------------------------------------------------------
  - job_name: 'uptime-kuma'
    static_configs:
      - targets: ['uptime-kuma:3001']
    metrics_path: /metrics

  # ---------------------------------------------------------------------------
  # Loki - Log aggregation
  # ---------------------------------------------------------------------------
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
    metrics_path: /metrics

  # ---------------------------------------------------------------------------
  # Tempo - Distributed tracing
  # ---------------------------------------------------------------------------
  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']
    metrics_path: /metrics
