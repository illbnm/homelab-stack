# =============================================================================
# Prometheus Configuration
# Scrapes: cAdvisor, Node Exporter, Traefik, Authentik, and all homelab services
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'homelab-stack'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - /etc/prometheus/rules/*.yml

# Scrape configurations
scrape_configs:
  # =============================================================================
  # Prometheus self-monitoring
  # =============================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'

  # =============================================================================
  # cAdvisor - Container metrics
  # =============================================================================
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          instance: 'cadvisor'

  # =============================================================================
  # Node Exporter - Host metrics
  # =============================================================================
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: 'node-exporter'

  # =============================================================================
  # Traefik - Reverse proxy metrics
  # =============================================================================
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8082']
        labels:
          instance: 'traefik'

  # =============================================================================
  # Authentik - SSO metrics
  # =============================================================================
  - job_name: 'authentik'
    metrics_path: /-/metrics
    static_configs:
      - targets: ['authentik-server:9000']
        labels:
          instance: 'authentik'

  # =============================================================================
  # Grafana - Dashboard metrics
  # =============================================================================
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
        labels:
          instance: 'grafana'

  # =============================================================================
  # Loki - Log aggregation metrics
  # =============================================================================
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
        labels:
          instance: 'loki'

  # =============================================================================
  # Tempo - Tracing metrics
  # =============================================================================
  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']
        labels:
          instance: 'tempo'

  # =============================================================================
  # Alertmanager - Alert routing metrics
  # =============================================================================
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
        labels:
          instance: 'alertmanager'

  # =============================================================================
  # Uptime Kuma - Service availability metrics
  # =============================================================================
  - job_name: 'uptime-kuma'
    metrics_path: /metrics
    static_configs:
      - targets: ['uptime-kuma:3001']
        labels:
          instance: 'uptime-kuma'

  # =============================================================================
  # Gitea - Code hosting metrics (if running)
  # =============================================================================
  - job_name: 'gitea'
    metrics_path: /metrics
    static_configs:
      - targets: ['gitea:3000']
        labels:
          instance: 'gitea'
    relabel_configs:
      - source_labels: [__address__]
        regex: 'gitea:3000'
        action: keep

  # =============================================================================
  # Nextcloud - Storage metrics (if running)
  # =============================================================================
  - job_name: 'nextcloud'
    metrics_path: /status.php
    static_configs:
      - targets: ['nextcloud:80']
        labels:
          instance: 'nextcloud'
    relabel_configs:
      - source_labels: [__address__]
        regex: 'nextcloud:80'
        action: keep
