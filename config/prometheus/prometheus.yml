global:
  scrape_interval: 15s
  evaluation_interval: 30s
  external_labels:
    cluster: 'homelab'
    monitor: 'homelab-stack'

# 告警规则目录
rule_files:
  - '/etc/prometheus/rules/*.yml'
  - '/etc/prometheus/alerts/*.yml'

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

# 指标存储设置
storage:
  tsdb:
    retention.time: ${PROMETHEUS_RETENTION:-30d}
    retention.size: 10GB

# Web 界面配置
web:
  enable_lifecycle: true
  enable_remote_write_receiver: true

# 抓取配置
scrape_configs:
  # ========================================================================
  # 主机指标 - Node Exporter
  # ========================================================================
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'
          group: 'host'
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # ========================================================================
  # 容器指标 - cAdvisor
  # ========================================================================
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'cadvisor'
          group: 'containers'
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # ========================================================================
  # 反向代理 - Traefik
  # ========================================================================
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8080']  # Traefik 指标端口（需在 traefik.yml 中配置）
        labels:
          service: 'traefik'
          group: 'infrastructure'
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # ========================================================================
  # 统一认证 - Authentik
  # ========================================================================
  - job_name: 'authentik'
    static_configs:
      - targets: ['authentik-server:9000']
        labels:
          service: 'authentik'
          group: 'sso'
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  # ========================================================================
  # 代码托管 - Gitea
  # ========================================================================
  - job_name: 'gitea'
    static_configs:
      - targets: ['gitea:3000']
        labels:
          service: 'gitea'
          group: 'productivity'
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  # ========================================================================
  # 云存储 - Nextcloud
  # ========================================================================
  - job_name: 'nextcloud'
    static_configs:
      - targets: ['nextcloud:9000']
        labels:
          service: 'nextcloud'
          group: 'storage'
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  # ========================================================================
  # Prometheus 自监控
  # ========================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          group: 'self-monitoring'
```

---

## 📝 说明

### 配置结构

| Section | 说明 |
|---------|------|
| `global` | 全局 scrape 间隔、外部标签 |
| `rule_files` | 加载告警规则文件（`rules/` 和 `alerts/`） |
| `alerting` | 配置 Alertmanager 目标 |
| `storage` | 数据保留策略（覆盖命令行参数） |
| `scrape_configs` | 各个目标的抓取配置 |

### 服务发现

当前使用 **静态配置**（static_configs），每个目标明确列出。

**优点**: 简单可控  
**缺点**: 需要手动维护目标列表

如果需要动态发现（Docker 自动），可以启用 Docker SD：

```yaml
- job_name: 'docker-autodiscover'
  docker_sd_configs:
    - host: unix:///var/run/docker.sock
      refresh_interval: 15s
  relabel_configs:
    - source_labels: [__meta_docker_container_name]
      regex: '/observability/(.+):(.+)'
      replacement: '${1}:${2}'
      target_label: 'service'
```

但注意：Docker SD 需要 `docker-socket-proxy` 配合，稍复杂。当前版本用静态配置更稳定。

