global:
  resolve_timeout: 5m

route:
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: ntfy-default
  routes:
    - match:
        severity: critical
      receiver: ntfy-default
      continue: true
    - match:
        severity: warning
      receiver: ntfy-default

receivers:
  - name: ntfy-default
    webhook_configs:
      - url: "http://ntfy:80/homelab-alerts"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname, cluster]
