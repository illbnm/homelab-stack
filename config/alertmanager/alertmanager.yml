global:
  resolve_timeout: '5m'
  smtp_smarthost: 'localhost:25'
  smtp_from: 'alertmanager@${DOMAIN}'

# 告警路由规则
route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'ntfy-default'
  routes:
    # 严重告警 → 立即通知
    - match:
        severity: 'critical'
      group_wait: 0s
      group_interval: 1m
      repeat_interval: 5m
      receiver: 'ntfy-critical'

    # 警告级别 → 聚合通知
    - match:
        severity: 'warning'
      receiver: 'ntfy-warning'

    # 主机相关 → 独立分组
    - match:
        component: 'host'
      receiver: 'ntfy-host'

    # 容器相关 → 独立分组
    - match:
        component: 'container'
      receiver: 'ntfy-container'

# 抑制规则 (避免告警风暴)
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']

  - source_match:
      component: 'host'
    target_match:
      component: 'container'
    equal: ['node']

# 接收器配置
receivers:
  # 默认接收器 (ntfy)
  - name: 'ntfy-default'
    webhook_configs:
      - url: 'https://ntfy.${DOMAIN}/alerts'
        send_resolved: true
        http_config:
          bearer_token: '${NTFY_TOKEN:-}'
        relabel_configs:
          - source_labels: [alertname]
            target_label: title
          - source_labels: [severity]
            target_label: priority
          - source_labels: [summary]
            target_label: message

  # 严重告警接收器
  - name: 'ntfy-critical'
    webhook_configs:
      - url: 'https://ntfy.${DOMAIN}/critical'
        send_resolved: true
        http_config:
          bearer_token: '${NTFY_TOKEN:-}'
    repeat_interval: 5m

  # 警告接收器
  - name: 'ntfy-warning'
    webhook_configs:
      - url: 'https://ntfy.${DOMAIN}/warnings'
        send_resolved: false
        http_config:
          bearer_token: '${NTFY_TOKEN:-}'

  # 主机告警接收器
  - name: 'ntfy-host'
    webhook_configs:
      - url: 'https://ntfy.${DOMAIN}/host-alerts'
        send_resolved: true
        http_config:
          bearer_token: '${NTFY_TOKEN:-}'

  # 容器告警接收器
  - name: 'ntfy-container'
    webhook_configs:
      - url: 'https://ntfy.${DOMAIN}/container-alerts'
        send_resolved: true
        http_config:
          bearer_token: '${NTFY_TOKEN:-}'

  # 邮件接收器 (可选)
  # - name: 'email-admin'
  #   email_configs:
  #     - to: 'admin@${DOMAIN}'
  #       from: 'alertmanager@${DOMAIN}'
