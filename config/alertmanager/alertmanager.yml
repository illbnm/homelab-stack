global:
  resolve_timeout: 5m
  smtp_require_tls: false

route:
  group_by: [alertname, cluster]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: ntfy
  routes:
    - match:
        severity: critical
      receiver: ntfy
      continue: true

receivers:
  - name: ntfy
    webhook_configs:
      - url: http://ntfy:80/${NTFY_ALERT_TOPIC:-homelab-alerts}
        send_resolved: true
        http_config:
          basic_auth:
            username: ${NTFY_USERNAME:-}
            password: ${NTFY_PASSWORD:-}
        max_alerts: 10

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname, instance]
