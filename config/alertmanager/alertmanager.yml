# =============================================================================
# Alertmanager Configuration
# =============================================================================

global:
  resolve_timeout: 5m

# Route tree
route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'ntfy-notifications'
  routes:
    - match:
        severity: critical
      receiver: 'ntfy-critical'
      continue: true
    - match:
        severity: warning
      receiver: 'ntfy-warnings'

# Receivers
receivers:
  - name: 'ntfy-notifications'
    webhook_configs:
      - url: 'http://ntfy:80/alerts?priority=3&tags=warning'
        send_resolved: true

  - name: 'ntfy-critical'
    webhook_configs:
      - url: 'http://ntfy:80/alerts?priority=5&tags=rotating_light,critical'
        send_resolved: true

  - name: 'ntfy-warnings'
    webhook_configs:
      - url: 'http://ntfy:80/alerts?priority=3&tags=warning'
        send_resolved: true

# Inhibition rules
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
