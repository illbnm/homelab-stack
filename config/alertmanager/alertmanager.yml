# ===========================================
# Alertmanager Configuration
# Docs: https://prometheus.io/docs/alerting/latest/configuration/
# ===========================================

global:
  resolve_timeout: 5m
  smtp_require_tls: false

route:
  group_by: [alertname, cluster]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: default
  routes:
    - match:
        severity: critical
      receiver: ntfy-critical
      continue: true
    - match:
        severity: warning
      receiver: ntfy-warning
      continue: true

receivers:
  - name: default
    webhook_configs:
      - url: 'http://ntfy:80/homelab-alerts'
        send_resolved: true
        http_config:
          headers:
            Content-Type: application/json

  - name: ntfy-critical
    webhook_configs:
      - url: 'http://ntfy:80/homelab-alerts?priority=5&tags=warning,rotating_light'
        send_resolved: true
        http_config:
          headers:
            Content-Type: application/json
            Title: '[CRITICAL] Homelab Alert'

  - name: ntfy-warning
    webhook_configs:
      - url: 'http://ntfy:80/homelab-alerts?priority=3&tags=warning'
        send_resolved: true
        http_config:
          headers:
            Content-Type: application/json
            Title: '[WARNING] Homelab Alert'

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname, instance]