global:
  resolve_timeout: 5m
  smtp_require_tls: false

route:
  group_by: [alertname, cluster]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: default
  routes:
    - match:
        severity: critical
      receiver: default
      continue: true

receivers:
  - name: default
    webhook_configs:
      - url: http://ntfy:80/alertmanager
        send_resolved: true
    # Uncomment and configure one of the following:
    # slack_configs:
    #   - api_url: YOUR_SLACK_WEBHOOK
    #     channel: #alerts

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname, instance]
