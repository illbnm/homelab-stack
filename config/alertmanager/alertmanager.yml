global:
  resolve_timeout: 5m
  smtp_require_tls: false

route:
  group_by: [alertname, cluster]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: default
  routes:
    - match:
        severity: critical
      receiver: default
      continue: true

receivers:
  - name: default
    webhook_configs:
      - url: 'http://ntfy:80/homelab-alerts'
        send_resolved: true
        http_config:
          headers:
            Title: 'Alert: {{ .GroupLabels.alertname }}'
            Priority: 'high'
            Tags: 'warning,alert'

  - name: ntfy
    webhook_configs:
      - url: 'http://ntfy:80/homelab-alerts'
        send_resolved: true
        http_config:
          headers:
            Title: 'Alert: {{ .GroupLabels.alertname }}'
            Priority: 'high'
            Tags: 'warning,alert'

  - name: gotify
    webhook_configs:
      - url: 'http://gotify:80/message?token=${GOTIFY_TOKEN:-}'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname, instance]
