# Alertmanager Configuration
# Docs: https://prometheus.io/docs/alerting/latest/configuration/

global:
  resolve_timeout: 5m
  smtp_require_tls: false

route:
  group_by: [alertname, cluster]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: ntfy
  routes:
    # Critical alerts → ntfy with high priority
    - match:
        severity: critical
      receiver: ntfy-critical
      continue: true

    # Warning alerts → ntfy with default priority
    - match:
        severity: warning
      receiver: ntfy
      continue: false

receivers:
  # Default receiver — ntfy with normal priority
  - name: ntfy
    webhook_configs:
      - url: "http://ntfy:80/homelab-alerts"
        send_resolved: true
        http_config:
          # Uncomment if ntfy auth is enabled:
          # authorization:
          #   type: Bearer
          #   credentials: YOUR_NTFY_TOKEN
          follow_redirects: true

  # Critical receiver — ntfy with high priority header
  - name: ntfy-critical
    webhook_configs:
      - url: "http://ntfy:80/homelab-critical"
        send_resolved: true
        http_config:
          follow_redirects: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname, instance]
