global:
  resolve_timeout: 5m

route:
  group_by: [alertname, cluster]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: ntfy
  routes:
    - match:
        severity: critical
      receiver: ntfy
      continue: true
    - match:
        severity: warning
      receiver: ntfy
      group_wait: 5m
      repeat_interval: 24h

receivers:
  - name: ntfy
    webhook_configs:
      - url: https://ntfy. + "${NTFY_TOPIC:-alerts}" + .ntfy.sh/homelab-alerts
        send_resolved: true
    pushover_configs:
      - token: ${PUSHOVER_TOKEN:-}
        user_key: ${PUSHOVER_USER_KEY:-}
        title: 'Homelab Alert'
        priority: 1

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname, instance]
