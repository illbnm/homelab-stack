global:
  resolve_timeout: 5m
  smtp_require_tls: false

route:
  group_by: [alertname, cluster]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: ntfy
  routes:
    - match:
        severity: critical
      receiver: ntfy
      continue: false
    - match:
        severity: warning
      receiver: ntfy
      continue: false

receivers:
  - name: ntfy
    webhook_configs:
      - url: ${NTFY_URL:-https://ntfy.sh}/${NTFY_TOPIC:-homelab-alerts}
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname, instance]
