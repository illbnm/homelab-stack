global:
  resolve_timeout: 5m

route:
  group_by: [alertname, cluster]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: ntfy
  routes:
    - match:
        severity: critical
      receiver: ntfy-critical
      continue: true

receivers:
  - name: ntfy
    webhook_configs:
      - url: http://ntfy:80/homelab-alerts
        send_resolved: true

  - name: ntfy-critical
    webhook_configs:
      - url: http://ntfy:80/homelab-critical
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname, instance]
