global:
  resolve_timeout: 5m

route:
  group_by: [alertname, cluster, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  receiver: ntfy-default
  routes:
    - matchers:
        - severity="critical"
      receiver: ntfy-critical

receivers:
  - name: ntfy-default
    webhook_configs:
      - url: "https://ntfy.${DOMAIN}/${NTFY_TOPIC:-homelab-alerts}"
        send_resolved: true

  - name: ntfy-critical
    webhook_configs:
      - url: "https://ntfy.${DOMAIN}/${NTFY_TOPIC:-homelab-alerts}-critical"
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: [alertname, instance]
