global:
  resolve_timeout: 5m
  smtp_require_tls: false

route:
  group_by: [alertname, cluster]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: default
  routes:
    - match:
        severity: critical
      receiver: ntfy
      continue: true
    - match:
        severity: warning
      receiver: default

receivers:
  - name: default
    # Uncomment and configure one of the following:
    # webhook_configs:
    #   - url: http://gotify:80/message?token=YOUR_TOKEN
    # slack_configs:
    #   - api_url: YOUR_SLACK_WEBHOOK
    #     channel: #alerts
    # email_configs:
    #   - to: your@email.com

  - name: ntfy
    webhook_configs:
      - url: 'http://ntfy:80/homelab-alerts'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname, instance]
