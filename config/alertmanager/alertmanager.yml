global:
  resolve_timeout: 5m
  smtp_require_tls: false

route:
  group_by: [alertname, cluster]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: ntfy
  routes:
    - match:
        severity: critical
      receiver: ntfy
      group_wait: 10s
      repeat_interval: 4h
      continue: true
    - match:
        severity: warning
      receiver: ntfy
      repeat_interval: 24h

receivers:
  - name: ntfy
    webhook_configs:
      - url: 'http://ntfy:80/homelab-alerts'
        send_resolved: true
        http_config:
          headers:
            Title: '{{ if gt (len .Alerts.Firing) 0 }}🔥{{ else }}✅{{ end }} [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
            Priority: '{{ if eq .Status "firing" }}high{{ else }}low{{ end }}'
            Tags: 'alertmanager,{{ .CommonLabels.alertname }}'

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname, instance]
