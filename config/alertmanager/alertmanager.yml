global:
  resolve_timeout: 5m

route:
  receiver: ntfy
  group_by:
    - alertname
    - job
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h

receivers:
  - name: ntfy
    webhook_configs:
      - url: "https://ntfy.${DOMAIN}/homelab-alerts?template=alertmanager"
        send_resolved: true
