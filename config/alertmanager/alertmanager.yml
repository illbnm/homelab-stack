global:
  resolve_timeout: 5m
  smtp_require_tls: false

route:
  group_by: [alertname, cluster]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: ntfy
  routes:
    - match:
        severity: critical
      receiver: ntfy
      continue: true
    - match:
        severity: warning
      receiver: ntfy

receivers:
  # Primary notification via ntfy
  - name: ntfy
    webhook_configs:
      - url: 'http://ntfy:80/homelab-alerts'
        send_resolved: true
        http_config:
          basic_auth:
            username: ${NTFY_USER:-admin}
            password: ${NTFY_PASSWORD:-}
  
  # Fallback receiver (logs only)
  - name: default
    webhook_configs:
      - url: 'http://ntfy:80/homelab-internal'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname, instance]