# Alertmanager Configuration
# https://prometheus.io/docs/alerting/latest/configuration/

global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alertmanager@example.com'
  smtp_auth_username: 'alertmanager@example.com'
  smtp_auth_password: 'your-smtp-password'

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'ntfy'
  routes:
    - match:
        severity: critical
      receiver: 'ntfy-critical'
      continue: true
    - match:
        severity: warning
      receiver: 'ntfy'

receivers:
  # ntfy receiver for all alerts
  - name: 'ntfy'
    webhook_configs:
      - url: 'http://ntfy:80/homelab-alerts'
        send_resolved: true

  # ntfy receiver for critical alerts
  - name: 'ntfy-critical'
    webhook_configs:
      - url: 'http://ntfy:80/homelab-critical'
        send_resolved: true

  # Gotify receiver (optional backup)
  - name: 'gotify'
    webhook_configs:
      - url: 'http://gotify:80/message?token=${GOTIFY_APP_TOKEN}'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']
