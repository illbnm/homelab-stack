# =============================================================================
# Grafana Dashboard Provisioning
# Auto-loads pre-built dashboards from this directory.
# Dashboard JSON files are provisioned here so Grafana loads them on startup
# without any manual import.
# =============================================================================
apiVersion: 1

providers:
  - name: "HomeLab Dashboards"
    orgId: 1
    folder: "HomeLab"
    folderUid: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
      default: true
