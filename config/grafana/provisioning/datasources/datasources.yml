# =============================================================================
# Grafana Datasources
# =============================================================================

apiVersion: 1

datasources:
  # Prometheus
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  # Loki
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false

  # Tempo
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      httpMethod: GET
      tracesToLogs:
        datasourceUid: loki
      serviceMap:
        datasourceUid: prometheus
