apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      timeInterval: 15s

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      derivedFields:
        - datasourceName: Tempo
          matcherRegex: "traceID=(\\w+)"
          name: TraceID
          url: http://tempo:16686/trace/$${__value.raw}

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:16686
    editable: false
    jsonData:
      httpEdgePort: 4318
      serviceMap:
        datasourceUid: Prometheus
