apiVersion: 1

datasources:
  # ---------------------------------------------------------------------------
  # Prometheus — Metrics
  # ---------------------------------------------------------------------------
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s
      httpMethod: POST

  # ---------------------------------------------------------------------------
  # Loki — Logs
  # ---------------------------------------------------------------------------
  - name: Loki
    type: loki
    uid: loki
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000
      direction: backward

  # ---------------------------------------------------------------------------
  # Tempo — Distributed Tracing
  # ---------------------------------------------------------------------------
  - name: Tempo
    type: tempo
    uid: tempo
    url: http://tempo:3100
    editable: false
    jsonData:
      httpMethod: GET
      tracesToLogs:
        datasourceUid: loki
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true

  # ---------------------------------------------------------------------------
  # Alertmanager — Alerts (via Prometheus datasource proxy)
  # ---------------------------------------------------------------------------
  - name: Alertmanager
    type: alertmanager
    uid: alertmanager
    url: http://alertmanager:9093
    editable: false
    jsonData:
      implementation: prometheus
