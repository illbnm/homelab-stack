[auth.generic_oauth]
enabled = true
name = Authentik
allow_sign_up = true
client_id = <CLIENT_ID>
client_secret = <CLIENT_SECRET>
auth_url = http://authentik-server:9000/application/o/authorize/
token_url = http://authentik-server:9000/application/o/token/
api_url = http://authentik-server:9000/application/o/userinfo/
allowed_domains =
allowed_groups =
scopes = openid,profile,email