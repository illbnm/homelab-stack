[auth.generic_oauth]
enabled = true
name = Authentik
client_id = ${GRAFANA_OAUTH_CLIENT_ID}
client_secret = ${GRAFANA_OAUTH_CLIENT_SECRET}
scopes = openid email profile
auth_url = https://${AUTHENTIK_DOMAIN}/application/o/authorize/
token_url = https://${AUTHENTIK_DOMAIN}/application/o/token/
api_url = https://${AUTHENTIK_DOMAIN}/application/o/userinfo/
allow_sign_up = true
auto_login = false
role_attribute_path = contains(groups, 'homelab-admins') && 'Admin' || 'Viewer'

[server]
root_url = https://grafana.${DOMAIN}

[security]
admin_user = ${GRAFANA_ADMIN_USER}
admin_password = ${GRAFANA_ADMIN_PASSWORD}

[users]
auto_assign_org = true
auto_assign_org_role = Viewer

[analytics]
reporting_enabled = false
