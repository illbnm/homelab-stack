[auth.generic_oauth]
enabled = true
name = Authentik
allow_sign_up = true
client_id = YOUR_CLIENT_ID
client_secret = YOUR_CLIENT_SECRET
auth_url = http://authentik-server/application/o/authorize/
token_url = http://authentik-server/application/o/token/
api_url = http://authentik-server/application/o/userinfo/
scopes = openid,profile,email