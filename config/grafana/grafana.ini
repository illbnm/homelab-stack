# =============================================================================
# Grafana Configuration — Authentik OIDC Integration
# Docs: https://grafana.com/docs/grafana/latest/setup-grafana/configure-grafana/
#
# NOTE: Most values here reference environment variables set in
#       stacks/monitoring/docker-compose.yml. This file provides defaults
#       and additional settings not available via env vars.
# =============================================================================

[server]
domain = ${GF_SERVER_DOMAIN}
root_url = ${GF_SERVER_ROOT_URL}

[security]
admin_user = ${GF_SECURITY_ADMIN_USER}
admin_password = ${GF_SECURITY_ADMIN_PASSWORD}

# -----------------------------------------------------------------------------
# Authentik OIDC (Generic OAuth)
# Client ID/Secret are created by scripts/setup-authentik.sh
# and stored in the root .env file.
# -----------------------------------------------------------------------------
[auth.generic_oauth]
enabled = true
name = Authentik
icon = signin
allow_sign_up = true
auto_login = false

client_id = ${GF_AUTH_GENERIC_OAUTH_CLIENT_ID}
client_secret = ${GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
scopes = openid profile email
auth_url = ${GF_AUTH_GENERIC_OAUTH_AUTH_URL}
token_url = ${GF_AUTH_GENERIC_OAUTH_TOKEN_URL}
api_url = ${GF_AUTH_GENERIC_OAUTH_API_URL}

# Map Authentik groups to Grafana roles
role_attribute_path = contains(groups, 'homelab-admins') && 'Admin' || contains(groups, 'homelab-users') && 'Editor' || 'Viewer'
role_attribute_strict = false

# Signout redirect to Authentik
signout_redirect_url = ${GF_AUTH_SIGNOUT_REDIRECT_URL}

[users]
auto_assign_org = true
auto_assign_org_role = Viewer

[analytics]
reporting_enabled = false
check_for_updates = false
