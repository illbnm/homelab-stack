# Grafana 配置文件 - OIDC 集成示例
#
# 复制到 config/grafana/grafana.ini 并根据实际情况修改
#
# 注意: 此配置需要 Grafana 8.0+ 并启用 OIDC 支持

[server]
# HTTP 监听地址 (通常由 Traefik 处理，这里可留空或设置内网端口)
http_addr = 127.0.0.1
http_port = 3000

# 域名 (Traefik 会设置 X-Forwarded-Host)
domain = ${DOMAIN:-grafana.example.com}

# 启用 HTTPS 重定向 (Traefik 处理)
enforce_domain = false

[auth.generic_oauth]
# 启用 OIDC
enabled = true

# 提供商名称 (登录页面显示)
name = Authentik

# 允许新用户自动注册
allow_sign_up = true

# Client ID (从 authentik-setup.sh 输出获取)
# 运行: ./stacks/sso/scripts/authentik-setup.sh 查看
client_id = YOUR_CLIENT_ID_HERE

# Client Secret (从 authentik-setup.sh 输出获取)
client_secret = YOUR_CLIENT_SECRET_HERE

# OIDC 端点
auth_url = https://auth.${DOMAIN}/application/o/authorize/
token_url = https://auth.${DOMAIN}/application/o/token/
api_url = https://auth.${DOMAIN}/application/v1/users/@me

# 请求的 scope
scopes = openid profile email

# 回调 URL (Grafana 自动生成，通常不需要改)
# redirect_uri = https://grafana.${DOMAIN}/login/generic_oauth

# 用户映射
# Authentik 返回的用户名字段
username_attribute = preferred_username

# 邮箱字段
email_attribute = email

# 名字字段 (可选)
name_attribute = name

# 角色同步
role_attribute_path = $$
# 如果想根据 Authentik 组自动分配 Grafana 角色:
# role_attribute_path = groups[*]@.contains('homelab-admins') ? 'Admin' : 'Viewer'

# PKCE 支持 (推荐开启)
use_pkce = true

# 跳过 TLS 验证 (仅测试环境，生产环境应 false)
insecure_skip_verify_tls_verify = false

[auth]
# 禁用本地登录 (仅 OIDC)
disable_login_form = false  # 设置为 true 可隐藏密码登录框

# 设置默认角色
default_organization_role = Editor

# 允许用户注册 (OIDC allow_sign_up 已控制)
allow_org_create = false

[security]
# 会话 cookie 安全设置
cookie_secure = true
cookie_samesite = lax

[session]
# 会话过期时间 (秒)
# 默认 86400 (24 小时)
# 如果 Authentik token 有效期较短，这里应匹配或更短
timeout = 86400

[log]
# 日志级别 (调试时用 info/debug)
level = info

# OIDC 调试日志
[log.oauth2]
enabled = true
level = debug