# Traefik v3 — Static Configuration
# This file is mounted read-only into the Traefik container.

global:
  checkNewVersion: false
  sendAnonymousUsage: false

# API and Dashboard
api:
  dashboard: true
  insecure: false  # Dashboard is exposed only via router label (with auth)

# Logging
log:
  level: INFO  # DEBUG | INFO | WARN | ERROR

# Access logging
accessLog:
  filePath: /dev/stdout
  format: json
  bufferingSize: 100

# Ping endpoint for healthcheck
ping: {}

# Entrypoints
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt
        domains:
          - main: "${DOMAIN}"
            sans:
              - "*.${DOMAIN}"
    http3:
      advertisedPort: 443

# Certificate Resolvers
certificatesResolvers:
  letsencrypt:
    acme:
      email: "${ACME_EMAIL}"
      storage: /acme/acme.json
      # HTTP Challenge (default — works without wildcard DNS)
      httpChallenge:
        entryPoint: web
      # Uncomment for DNS Challenge (required for wildcard certs):
      # dnsChallenge:
      #   provider: cloudflare
      #   resolvers:
      #     - "1.1.1.1:53"
      #     - "8.8.8.8:53"

# Providers
providers:
  # Docker provider via socket-proxy
  docker:
    endpoint: "tcp://socket-proxy:2375"
    exposedByDefault: false
    network: proxy
    watch: true

  # File provider for dynamic config (middlewares, TLS options)
  file:
    directory: /etc/traefik/dynamic
    watch: true
