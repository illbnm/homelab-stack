# =============================================================================
# Traefik Dynamic Configuration - Authentik ForwardAuth Middleware
#
# This provides SSO protection for services that don't natively support OIDC.
# Services using this middleware will redirect to Authentik for authentication.
#
# Usage:
#   Add to your docker-compose.yml labels:
#   - "traefik.http.routers.<service>.middlewares=authentik-auth@file"
# =============================================================================

http:
  middlewares:
    # -------------------------------------------------------------------------
    # Authentik ForwardAuth - For services without native OIDC support
    # -------------------------------------------------------------------------
    authentik-auth:
      forwardAuth:
        address: "http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-email
          - X-authentik-name
          - X-authentik-jwt
          - X-authentik-meta-jwks
          - X-authentik-meta-outpost
          - X-authentik-meta-provider

    # -------------------------------------------------------------------------
    # Authentik Auth - Strict version requiring specific groups
    # -------------------------------------------------------------------------
    authentik-auth-strict:
      forwardAuth:
        address: "http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-email
          - X-authentik-name
        # Uncomment and configure for group-based access control:
        # authResponseHeadersRegex: "^X-authentik-groups:.*;?(homelab-admins|homelab-users)$"

    # -------------------------------------------------------------------------
    # Rate limiting middleware (can be combined with auth)
    # -------------------------------------------------------------------------
    rate-limit:
      rateLimit:
        average: 100
        burst: 50
        period: 1s

    # -------------------------------------------------------------------------
    # Security headers
    # -------------------------------------------------------------------------
    security-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        customResponseHeaders:
          X-Robots-Tag: "noindex, nofollow"
