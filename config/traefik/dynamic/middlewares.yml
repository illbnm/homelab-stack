# =============================================================================
# Traefik Dynamic Configuration - Authentik ForwardAuth Middleware
# 
# 用于为不原生支持 OIDC 的服务提供 SSO 保护
# 用法：在服务的 labels 中添加：
#   - traefik.http.routers.myservice.middlewares=authentik@file
# =============================================================================

http:
  middlewares:
    # -------------------------------------------------------------------------
    # Authentik ForwardAuth
    # 所有请求先经过 Authentik 验证，通过后添加用户信息 headers
    # -------------------------------------------------------------------------
    authentik:
      forwardAuth:
        address: "http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
          - X-authentik-jwt
          - X-authentik-meta-jwks
          - X-authentik-meta-outpost
          - X-authentik-meta-provider
          - X-authentik-meta-app
          - X-authentik-meta-version

    # -------------------------------------------------------------------------
    # 仅限管理员访问的中间件
    # 需要用户在 authentik-admins 组中
    # -------------------------------------------------------------------------
    authentik-admin-only:
      forwardAuth:
        address: "http://authentik-server:9000/outpost.goauthentik.io/auth/traefik?group=authentik-admins"
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-email

    # -------------------------------------------------------------------------
    # 仅限认证用户访问（不限制组）
    # -------------------------------------------------------------------------
    authentik-user-only:
      forwardAuth:
        address: "http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-email

    # -------------------------------------------------------------------------
    # 速率限制中间件（可选）
    # 限制为每秒 10 个请求
    # -------------------------------------------------------------------------
    rate-limit:
      rateLimit:
        average: 10
        burst: 20

    # -------------------------------------------------------------------------
    # 安全 Headers 中间件
    # -------------------------------------------------------------------------
    secure-headers:
      headers:
        frameDeny: true
        browserXssFilter: true
        contentTypeNosniff: true
        sslRedirect: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000

# =============================================================================
# TLS 配置（可选，如果 Traefik 静态配置已包含则不需要）
# =============================================================================
# tls:
#   options:
#     default:
#       minVersion: VersionTLS12
#       sniStrict: true
