http:
  middlewares:
    basic-auth:
      basicAuth:
        users:
          - "${TRAEFIK_AUTH}"

    secure-headers:
      headers:
        frameDeny: true
        browserXssFilter: true
        contentTypeNosniff: true
        sslRedirect: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000

    compress:
      compress: {}

    retry:
      retry:
        attempts: 3
        initialInterval: 100ms
