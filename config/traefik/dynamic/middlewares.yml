http:
  middlewares:
    # -------------------------------------------------------------------------
    # Authentik ForwardAuth
    # Protects any service routed through Traefik — redirects unauthenticated
    # requests to https://auth.${DOMAIN} for login.
    #
    # Usage: add label to any service:
    #   traefik.http.routers.<name>.middlewares=authentik@file
    #
    # Docs: https://docs.goauthentik.io/docs/providers/proxy/traefik
    # -------------------------------------------------------------------------
    authentik:
      forwardAuth:
        address: "http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
          - X-authentik-jwt
          - X-authentik-meta-jwks
          - X-authentik-meta-outpost
          - X-authentik-meta-provider
          - X-authentik-meta-app
          - X-authentik-meta-version

    # -------------------------------------------------------------------------
    # HTTPS redirect
    # -------------------------------------------------------------------------
    https-redirect:
      redirectScheme:
        scheme: https
        permanent: true

    # -------------------------------------------------------------------------
    # Secured chain — HTTPS redirect + Authentik auth (convenience alias)
    # Usage: traefik.http.routers.<name>.middlewares=secured@file
    # -------------------------------------------------------------------------
    secured:
      chain:
        middlewares:
          - https-redirect
          - authentik

    # -------------------------------------------------------------------------
    # Rate limiting (general)
    # -------------------------------------------------------------------------
    rate-limit:
      rateLimit:
        average: 100
        burst: 50

    # -------------------------------------------------------------------------
    # Security headers
    # -------------------------------------------------------------------------
    security-headers:
      headers:
        customResponseHeaders:
          X-Robots-Tag: "noindex,nofollow,nosnippet,noarchive,notranslate,noimageindex"
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "same-origin"
        frameDeny: false
        customFrameOptionsValue: "SAMEORIGIN"
