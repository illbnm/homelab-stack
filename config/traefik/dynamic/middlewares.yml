# Traefik Dynamic Config — Shared Middlewares
# Referenced by other stacks via: middleware-name@file

http:
  middlewares:
    # ─── HTTPS Redirect ───────────────────────────────────────
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true

    # ─── Traefik Dashboard Basic Auth ─────────────────────────
    # Set TRAEFIK_AUTH in .env (use htpasswd to generate)
    traefik-auth:
      basicAuth:
        usersFile: /dev/null  # Overridden by label; kept here as fallback reference

    # ─── Security Headers ─────────────────────────────────────
    secure-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "same-origin"
        permissionsPolicy: "camera=(), microphone=(), geolocation=()"
        customResponseHeaders:
          X-Powered-By: ""
          Server: ""

    # ─── Rate Limiting ────────────────────────────────────────
    rate-limit:
      rateLimit:
        average: 100
        burst: 50

    # ─── Compress Responses ───────────────────────────────────
    compress:
      compress: {}

    # ─── Authentik Forward Auth ───────────────────────────────
    # Uncomment after deploying SSO stack
    # authentik:
    #   forwardAuth:
    #     address: "http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
    #     trustForwardHeader: true
    #     authResponseHeaders:
    #       - X-authentik-username
    #       - X-authentik-groups
    #       - X-authentik-email
    #       - X-authentik-name
