http:
  middlewares:
    # Security headers for all services
    security-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        customFrameOptionsValue: "SAMEORIGIN"

    # rate limiting
    rate-limit:
      rateLimit:
        average: 100
        burst: 50

    # gzip compression
    compress:
      compress: {}
