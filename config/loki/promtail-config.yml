server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ===========================================
  # Docker Container Logs (Auto-discovery)
  # ===========================================
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      # Extract compose project
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: project
      # Skip internal containers
      - source_labels: [__meta_docker_container_name]
        regex: '(promtail|loki).*'
        action: drop

  # ===========================================
  # System Logs
  # ===========================================
  - job_name: system
    static_configs:
      - targets: [localhost]
        labels:
          job: varlogs
          __path__: /var/log/*.log
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\w+\s+\d+ \d+:\d+:\d+) (?P<hostname>\w+) (?P<process>\w+)(\[(?P<pid>\d+)\])?: (?P<message>.*)$'
      - labels:
          hostname:
          process:

  # ===========================================
  # Syslog (if available)
  # ===========================================
  - job_name: syslog
    static_configs:
      - targets: [localhost]
        labels:
          job: syslog
          __path__: /var/log/syslog
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\w+\s+\d+ \d+:\d+:\d+) (?P<hostname>\w+) (?P<process>\w+)(\[(?P<pid>\d+)\])?: (?P<message>.*)$'
      - labels:
          hostname:
          process:

  # ===========================================
  # Traefik Access Logs
  # ===========================================
  - job_name: traefik-access
    static_configs:
      - targets: [localhost]
        labels:
          job: traefik
          __path__: /var/log/traefik/access.log
    pipeline_stages:
      # Parse Traefik common log format
      - regex:
          expression: '^(?P<client_ip>[\d.]+) - (?P<client_user>\S+) \[(?P<timestamp>[^\]]+)\] "(?P<method>\w+) (?P<path>\S+) (?P<protocol>\S+)" (?P<status>\d+) (?P<size>\d+) "(?P<referer>[^"]*)" "(?P<user_agent>[^"]*)" (?P<request_time>\d+)ms'
      - labels:
          client_ip:
          method:
          status:
      # Extract trace ID if present (for Tempo integration)
      - regex:
          source: path
          expression: '.*traceId=(?P<trace_id>[a-f0-9]+).*'
      - labels:
          trace_id:
      # Create Grafana Explore link
      - labels:
          traceId:

  # ===========================================
  # Authentik Logs
  # ===========================================
  - job_name: authentik
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.service=authentik-server"]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
    pipeline_stages:
      - json:
          expressions:
            level: level
            event: event
            timestamp: timestamp
      - labels:
          level:
          event:

  # ===========================================
  # Nginx/Nextcloud Logs (if using nginx)
  # ===========================================
  - job_name: nextcloud
    static_configs:
      - targets: [localhost]
        labels:
          job: nextcloud
          __path__: /var/log/nextcloud/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            app: app
      - labels:
          level:
          app:

  # ===========================================
  # Application JSON Logs (generic)
  # ===========================================
  - job_name: application-json
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            time: time
      - labels:
          level: