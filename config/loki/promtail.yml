server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    external_labels:
      cluster: homelab
      host: ${HOSTNAME}

scrape_configs:
  # ========================================================================
  # Docker 容器日志自动发现
  # ========================================================================
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # 只采集 observability stack 以外的容器日志
      - source_labels: ['__meta_docker_container_name']
        regex: '/observability/(.+):(.+)'
        action: drop
      # 提取服务名称
      - source_labels: ['__meta_docker_container_name']
        regex: '/([^/]+)/([^_]+)_[0-9a-f]+'
        replacement: '${2}'
        target_label: 'service'
      # 提取容器 ID
      - source_labels: ['__meta_docker_container_id']
        target_label: 'container_id'
      # 提取容器名称
      - source_labels: ['__meta_docker_container_name']
        target_label: 'container'
      # 提取镜像
      - source_labels: ['__meta_docker_container_image']
        target_label: 'image'
      # 提取项目名称 (compose project)
      - source_labels: ['__meta_docker_compose_project']
        target_label: 'project'
      # 提取服务名称 (compose service)
      - source_labels: ['__meta_docker_compose_service']
        target_label: 'compose_service'
      # 日志路径
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'log_stream'
      # 日志文件
      - source_labels: ['__meta_docker_container_log_file']
        target_label: 'log_file'

  # ========================================================================
  # 系统日志 (syslog)
  # ========================================================================
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          __path__: /var/log/syslog
          host: ${HOSTNAME}
          service: system
          log_type: syslog

  # ========================================================================
  # Traefik 访问日志
  # ========================================================================
  - job_name: traefik
    static_configs:
      - targets:
          - localhost
        labels:
          job: traefik
          __path__: /var/log/traefik/access.log
          service: traefik
          log_type: access
    pipeline_stages:
      - docker: {}
      - labels:
          status:
      - match:
          selector: '{status=~"5.."}'
          stages:
            - label:
                severity:
                  source: status
                  action: replace
                  regex: '5..'
                  replace: 'critical'
      - output:
          source: message

  # ========================================================================
  # 应用日志 (通过挂载的 volume)
  # ========================================================================
  # 为每个重要的服务添加自定义日志路径
  # 示例: Grafana, Prometheus, Loki 自身的日志