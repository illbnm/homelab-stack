# =============================================================================
# Loki — Log Aggregation Configuration
# Docs: https://grafana.com/docs/loki/latest/configuration/
# =============================================================================
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# Query caching and limits
query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

# Schema configuration
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Limits
limits_config:
  allow_structured_metadata: false
  volume_enabled: true
  # Retention (days) — controlled by LOKI_RETENTION env var
  retention_period: ${LOKI_RETENTION:-7d}

# Ruler — alert rules evaluated against Loki log data
ruler:
  alertmanager_url: http://alertmanager:9093
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  enable_api: true
