# =============================================================================
# Mosquitto MQTT Broker Configuration
# HomeLab Stack — Home Automation
# =============================================================================

# --- Persistence ---
persistence true
persistence_location /mosquitto/data/

# --- Logging ---
log_dest stdout
log_type all

# --- Listeners ---
# Internal listener (Docker network)
listener 1883
protocol mqtt

# --- Authentication ---
# Allow anonymous access within Docker network (secured by network isolation)
# For production: replace with password_file
allow_anonymous true

# --- Performance ---
max_connections -1
max_inflight_messages 20
max_queued_messages 1000
message_size_limit 0
