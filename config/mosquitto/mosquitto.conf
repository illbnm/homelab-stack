# =============================================================================
# Mosquitto MQTT Broker Configuration
# =============================================================================

# Persistence
persistence true
persistence_location /mosquitto/data/
autosave_interval 1800

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
log_timestamp true

# Authentication
# IMPORTANT: For production, set up proper authentication:
# 1. Create password file: mosquitto_passwd -c /mosquitto/config/passwd <username>
# 2. Uncomment the lines below:

# allow_anonymous false
# password_file /mosquitto/config/passwd

# For initial setup, allow anonymous (change in production!)
allow_anonymous true

# Listeners
# Internal listener for local services
listener 1883 0.0.0.0
protocol mqtt

# WebSocket listener (for Node-RED dashboard, etc.)
listener 9001 0.0.0.0
protocol websockets

# ACL (optional)
# acl_file /mosquitto/config/acl

# Limits
max_connections 256
max_queued_messages 256

# Security
# require_certificate false
# tls_version tlsv1.2
