# Redis Configuration — HomeLab Stack
bind 0.0.0.0
protected-mode yes
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Memory
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128
