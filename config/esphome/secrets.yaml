# =============================================================================
# ESPHome Secrets
# HomeLab Stack — Home Automation
# =============================================================================
# 请复制此文件为 secrets.yaml 并填入真实密码

# Wi-Fi 配置
WIFI_SSID: your_wifi_ssid
WIFI_PASSWORD: your_wifi_password

# OTA 更新密码
ESPHOME_OTA_PASSWORD: your_ota_password

# API 加密密钥（与 Home Assistant ESPHome 集成配对用）
# 生成方法：openssl rand -hex 32
ESPHOME_API_ENCRYPTION_KEY: your_32_byte_encryption_key_here

# AP 模式密码（Wi-Fi 连接失败时的热点密码）
ESPHOME_AP_PASSWORD: 12345678

# Web 服务器密码（可选）
ESPHOME_WEB_PASSWORD: your_web_password
