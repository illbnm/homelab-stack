# Unbound DNS 递归解析器配置文件
# 路径：config/unbound/unbound.conf
# 说明：Unbound 作为本地递归 DNS 解析器，为 AdGuard Home 提供上游解析

server:
    # 运行用户和目录
    username: unbound
    chroot: /opt/unbound
    directory: /opt/unbound
    pidfile: /opt/unbound/unbound.pid

    # 监听地址（仅监听本地，供 AdGuard Home 使用）
    interface: 0.0.0.0
    port: 5053
    do-ip4: yes
    do-ip6: yes
    do-udp: yes
    do-tcp: yes

    # 安全设置
    verbosity: 1
    num-threads: 2
    prefetch: yes
    prefetch-key: yes
    rrset-roundrobin: yes

    # 缓存配置
    cache-size: 512m
    max-ttl: 86400
    min-ttl: 60

    # 积极缓存 DNSSEC 验证
    val-date-tier: 1
    val-bogus-ttl: 60
    val-log-level: 2

    # DNSSEC 配置
    module-config: "validator dns64"
    dnssec-validation: yes

    # 访问控制（仅允许本地网络访问）
    access-control: 0.0.0.0/0 refuse
    access-control: 127.0.0.0/8 allow
    access-control: 10.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 192.168.0.0/16 allow

    # 私有地址排除（允许 DNS 通过私有 IP 进行 rebinding）
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: fd00::/8
    private-address: fe80::/10

    # 本地-zone（本地域名解析，按需启用）
    # local-zone: "lan." static
    # local-data: "adguard.lan. IN A 10.0.0.2"
    # local-data: "wireguard.lan. IN A 10.0.0.3"

    # 日志配置
    logfile: "/opt/unbound/data/unbound.log"
    use-syslog: no
    log-time-ascii: yes
    log-queries: no

    # 性能优化
    so-rcvbuf: 4m
    so-sndbuf: 4m

    # 远端控制（用于管理接口）
    # remote-control:
    #     control-enable: yes
    #     control-interface: 127.0.0.1
    #     control-port: 953
    #     server-key-file: "/opt/unbound/unbound_server.key"
    #     server-cert-file: "/opt/unbound/unbound_server.pem"
    #     control-key-file: "/opt/unbound/unbound_control.key"
    #     control-cert-file: "/opt/unbound/unbound_control.pem"

# 转发区配置（将特定域名转发到其他 DNS 服务器）
# forward-zone:
#     name: "corporate.local"
#     forward-addr: 192.168.1.100@53

# IPv6 转发配置（如需要 IPv6 支持）
forward-zone:
    name: "ip6.arpa."
    forward-addr: 2001:4860:4860::8888@53
    forward-addr: 2001:4860:4860::8844@53
