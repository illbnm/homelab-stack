# =============================================================================
# Unbound Recursive DNS Resolver Configuration
# =============================================================================

server:
    # Basic settings
    verbosity: 1
    interface: 0.0.0.0
    port: 53
    do-ip4: yes
    do-ip6: yes
    do-udp: yes
    do-tcp: yes

    # Access control
    access-control: 0.0.0.0/0 refuse
    access-control: 127.0.0.0/8 allow
    access-control: 10.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 192.168.0.0/16 allow
    access-control: fd00::/8 allow

    # Private addresses (never returned to clients)
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: fd00::/8
    private-address: fe80::/10

    # DNSSEC
    auto-trust-anchor-file: "/etc/unbound/root.key"
    val-log-level: 2
    val-clean-additional: yes

    # Privacy
    hide-identity: yes
    hide-version: yes
    identity: "DNS"
    
    # Performance
    num-threads: 2
    num-queries-per-thread: 4096
    outgoing-range: 8192
    msg-cache-size: 128m
    rrset-cache-size: 256m
    key-cache-size: 64m
    infra-cache-numhosts: 10000
    
    # Rate limiting (prevent DNS amplification)
    ratelimit: 1000
    ratelimit-size: 1m
    ratelimit-slabs: 4
    
    # Prefetch
    prefetch: yes
    prefetch-key: yes
    
    # Cache lifetime
    cache-min-ttl: 300
    cache-max-ttl: 86400
    
    # QNAME minimization (RFC 7816)
    qname-minimisation: yes
    qname-minimisation-strict: yes

# Forward zone for local DNS (optional - use Pi-hole for local)
# forward-zone:
#     name: "home.arpa."
#     forward-addr: 127.0.0.1@54

# Root hints (use built-in)
# root-hints: "/etc/unbound/root.hints"

# Include additional configs
include: "/etc/unbound/conf.d/*.conf"
