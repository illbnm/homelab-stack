server:
  # Basic server configuration
  port: 53
  do-ip4: yes
  do-udp: yes
  do-tcp: yes
  
  # Access control
  access-control: 10.13.13.0/24 allow
  access-control: 172.16.0.0/12 allow
  access-control: 192.168.0.0/16 allow
  access-control: 127.0.0.1 allow
  access-control: ::1 allow
  
  # Module configuration
  module-config: "iterator"
  
  # Logging
  log-queries: no
  log-replies: no
  log-tag-queryreply: no
  log-ident-queries: no
  
  # Performance
  num-threads: 2
  msg-cache-size: 16m
  rrset-cache-size: 32m
  cache-max-ttl: 86400
  cache-min-ttl: 300
  prefetch: yes
  prefetch-key: yes
  
  # Security
  harden-glue: yes
  harden-dnssec-stripped: yes
  use-caps-for-id: yes
  minimal-responses: yes
  
  # Forward zone for local network
  local-zone: "local." static
  local-data: "localhost. 3600 IN A 127.0.0.1"
  local-data: "localhost. 3600 IN AAAA ::1"
  
  # Upstream DNS servers (fallback)
  forward-zone:
    name: "."
    forward-addr: 1.1.1.1@53
    forward-addr: 1.0.0.1@53
    forward-addr: 8.8.8.8@53
    forward-addr: 8.8.4.4@53

# Remote control
remote-control:
  control-enable: no
