# =============================================================================
# Tempo Configuration
# Distributed tracing backend
# =============================================================================

server:
  http_listen_port: 3200
  log_level: warn

distributor:
  receivers:
    jaeger:
      protocols:
        thrift_http:
    zipkin:
    otlp:
      protocols:
        http:
        grpc:

ingester:
  max_block_duration: 5m
  max_block_bytes: 1073741824  # 1GB
  trace_idle_period: 10s
  max_traces_per_user: 10000

compactor:
  compaction:
    block_retention: 72h  # 3 days
    compacted_block_retention: 24h

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: homelab
  storage:
    path: /tmp/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

storage:
  trace:
    backend: local
    wal:
      path: /tmp/tempo/wal
    local:
      path: /tmp/tempo/blocks

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]

usage_report:
  reporting_enabled: false
