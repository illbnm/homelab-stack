upstream php-handler {
    server nextcloud-app:9000;
}

server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.php index.html /index.php$request_uri;

    # Security headers
    add_header X-Content-Type-Options    nosniff       always;
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header Referrer-Policy           "no-referrer" always;
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

    # Max upload size
    client_max_body_size 512M;
    fastcgi_buffers 64 4K;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_proxied expired no-cache no-store private no_last_modified no_etag auth;
    gzip_types application/atom+xml text/javascript application/javascript application/json application/ld+json application/manifest+json application/rss+xml application/vnd.geo+json application/vnd.ms-fontobject application/wasm application/x-font-ttf application/x-web-app-manifest+json application/xhtml+xml application/xml font/opentype image/bmp image/svg+xml image/x-icon text/cache-manifest text/css text/plain text/vcard text/vnd.rim.location.xloc text/vtt text/x-component text/x-cross-domain-policy;

    location / {
        rewrite ^ /index.php$request_uri;
    }

    location ~ ^\/(?:build|tests|config|lib|3rdparty|templates|data)\/ {
        deny all;
    }

    location ~ ^\/(?:\.|autotest|occ|issue|indie|db_|console) {
        deny all;
    }

    location ~ ^\/(?:remote|public|cron|status|ocs\/v[12]|updater\/.+|ocs-provider\/.+|.+\/richdocumentscode(_arm64)?\/proxy) {
        rewrite ^ /index.php$request_uri;
    }

    location ~ ^\/(?:index|remote|public|cron|status|ocs\/v[12]|updater\/.+|ocs-provider\/.+|.+(?:\/|\/build|\/tests|\/config\/|\/lib|\/3rdparty\/|\/templates\/|\/data\/|\.|autotest|occ|issue|indie|db_|console))\.php(?:$|\/) {
        fastcgi_split_path_info ^(.+?\.php)(\/.*|)$;
        set $path_info $fastcgi_path_info;
        if (!-f $document_root$fastcgi_script_name) {
            rewrite ^ /index.php$request_uri;
        }
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $path_info;
        fastcgi_param HTTPS on;
        fastcgi_param modHeadersAvailable true;
        fastcgi_param front_controller_active true;
        fastcgi_pass php-handler;
        fastcgi_intercept_errors on;
        fastcgi_request_buffering off;
    }

    location ~ ^\/(?:updater|ocs-provider|core\/doc\/api\/)(?:\/|$) {
        try_files $uri/ =404;
        index index.php;
    }

    location ~ \.(?:css|js|mjs|svg|gif|png|jpg|ico|wasm|tflite|mp4|mp3|ogg|webm)$ {
        try_files $uri /index.php$request_uri;
        add_header Cache-Control "public, max-age=15778463, immutable";
        access_log off;
    }

    location ~ \.woff2?$ {
        try_files $uri /index.php$request_uri;
        expires 7d;
        access_log off;
    }

    location = /robots.txt {
        allow all;
        try_files $uri /index.php$request_uri;
    }
}
