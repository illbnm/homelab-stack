# =============================================================================
# Ofelia Job Scheduler Configuration
# =============================================================================

# Global settings
[global]
# Log level: debug, info, warn, error
log-level = "info"

# Job: Daily backup at 2 AM UTC
[job-backup-daily]
schedule = "0 0 2 * * *"
container = "backup-server"
command = "/scripts/backup.sh"
no-overlap = true

# Job: Clean up old logs weekly
[job-cleanup-weekly]
schedule = "0 0 3 * * 0"
container = "log-cleaner"
command = "find /logs -name '*.log' -mtime +30 -delete"
no-overlap = true

# Job: Health check notification
[job-healthcheck-hourly]
schedule = "0 0 * * * *"
container = "ntfy"
command = "curl -sf http://localhost:80/health"
no-overlap = false
