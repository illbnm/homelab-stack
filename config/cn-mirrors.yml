      ghcr.io/linuxserver/baseimage-alpine: m.daocloud.io/ghcr.io/linuxserver/baseimage-alpine
      
      # Baseimage Ubuntu
      ghcr.io/linuxserver/baseimage-ubuntu: m.daocloud.io/ghcr.io/linuxserver/baseimage-ubuntu
      
      # Baseimage Debian
      ghcr.io/linuxserver/baseimage-debian: m.daocloud.io/ghcr.io/linuxserver/baseimage-debian

  # ==========================================================================
  # Quay.io 镜像映射
  # ==========================================================================
  quay.io:
    target: quay.m.daocloud.io
    images:
      quay.io/prometheus/prometheus: m.daocloud.io/quay.io/prometheus/prometheus
      quay.io/prometheus/alertmanager: m.daocloud.io/quay.io/prometheus/alertmanager
      quay.io/prometheus/node-exporter: m.daocloud.io/quay.io/prometheus/node-exporter
      quay.io/grafana/loki: m.daocloud.io/quay.io/grafana/loki
      quay.io/grafana/promtail: m.daocloud.io/quay.io/grafana/promtail

  # ==========================================================================
  # Docker.io 镜像映射 (Docker Hub 加速)
  # ==========================================================================
  docker.io:
    target: docker.m.daocloud.io
    images:
      docker.io/nginx: m.daocloud.io/library/nginx
      docker.io/redis: m.daocloud.io/library/redis
      docker.io/postgres: m.daocloud.io/library/postgres
      docker.io/mysql: m.daocloud.io/library/mysql
      docker.io/mariadb: m.daocloud.io/library/mariadb
      docker.io/mongo: m.daocloud.io/library/mongo
      docker.io/elasticsearch: m.daocloud.io/library/elasticsearch
      docker.io/rabbitmq: m.daocloud.io/library/rabbitmq
      docker.io/traefik: m.daocloud.io/library/traefik
      docker.io/portainer/portainer-ce: m.daocloud.io/portainer/portainer-ce
      docker.io/telegraf: m.daocloud.io/library/telegraf
      docker.io/influxdb: m.daocloud.io/library/influxdb
      docker.io/grafana/grafana: m.daocloud.io/grafana/grafana
      docker.io/prom/prometheus: m.daocloud.io/prom/prometheus
      docker.io/prom/alertmanager: m.daocloud.io/prom/alertmanager

# ==========================================================================
# 备用镜像源 (当主镜像源失败时使用)
# ==========================================================================
fallback_mirrors:
  - mirror.gcr.io
  - docker.m.daocloud.io
  - hub-mirror.c.163.com
  - mirror.baidubce.com
  - registry.cn-hangzhou.aliyuncs.com

# ==========================================================================
# apt 包管理器镜像源
# ==========================================================================
apt_mirrors:
  ubuntu:
    primary: https://mirrors.tuna.tsinghua.edu.cn/ubuntu/
    backup: https://mirrors.ustc.edu.cn/ubuntu/
    aliyun: https://mirrors.aliyun.com/ubuntu/
  debian:
    primary: https://mirrors.tuna.tsinghua.edu.cn/debian/
    backup: https://mirrors.ustc.edu.cn/debian/
    aliyun: https://mirrors.aliyun.com/debian/

# ==========================================================================
# pip 包管理器镜像源
# ==========================================================================
pip_mirrors:
  primary: https://pypi.tuna.tsinghua.edu.cn/simple
  backup: https://mirrors.aliyun.com/pypi/simple/
  huawei: https://repo.huaweicloud.com/repository/pypi/simple

# ==========================================================================
# npm 包管理器镜像源
# ==========================================================================
npm_mirrors:
  primary: https://registry.npmmirror.com
  backup: https://registry.npm.taobao.org
