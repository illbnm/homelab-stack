      ghcr.io/linuxserver/unbound: m.daocloud.io/ghcr.io/linuxserver/unbound
      
      # DDNS Updater
      ghcr.io/qdm12/ddns-updater: m.daocloud.io/ghcr.io/qdm12/ddns-updater
      
      # Cloudflare DDNS
      ghcr.io/qdm12/cloudflared: m.daocloud.io/ghcr.io/qdm12/cloudflared
      
      # Nginx
      ghcr.io/nginx/nginx: m.daocloud.io/ghcr.io/nginx/nginx
      
      # Apache
      ghcr.io/linuxserver/apache: m.daocloud.io/ghcr.io/linuxserver/apache
      
      # PHP
      ghcr.io/linuxserver/php: m.daocloud.io/ghcr.io/linuxserver/php
      
      # Python
      ghcr.io/linuxserver/python: m.daocloud.io/ghcr.io/linuxserver/python
      
      # Node
      ghcr.io/linuxserver/node: m.daocloud.io/ghcr.io/linuxserver/node
      
