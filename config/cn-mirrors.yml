      # Homepage
      ghcr.io/gethomepage/homepage: m.daocloud.io/ghcr.io/gethomepage/homepage
      
      # Glances
      ghcr.io/nicolargo/glances: m.daocloud.io/ghcr.io/nicolargo/glances
      
      # Netdata
      ghcr.io/netdata/netdata: m.daocloud.io/ghcr.io/netdata/netdata
      
      # Pi-hole
      ghcr.io/pi-hole/pi-hole: m.daocloud.io/ghcr.io/pi-hole/pi-hole
      
