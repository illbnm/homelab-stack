      # Bookstack
      ghcr.io/linuxserver/bookstack: m.daocloud.io/ghcr.io/linuxserver/bookstack
      
      # Wiki.js
      ghcr.io/linuxserver/wikijs: m.daocloud.io/ghcr.io/linuxserver/wikijs
      
      # Ghost
      ghcr.io/linuxserver/ghost: m.daocloud.io/ghcr.io/linuxserver/ghost
      
