# =============================================================================
# CN Mirrors Configuration — 国内镜像加速映射表
# 覆盖所有 gcr.io / ghcr.io / quay.io / docker.io 镜像
# =============================================================================

mirrors:
  # ==========================================================================
  # GCR.io 镜像映射
  # ==========================================================================
  gcr.io:
    target: gcr.m.daocloud.io
    images:
      gcr.io/cadvisor/cadvisor: m.daocloud.io/gcr.io/cadvisor/cadvisor
      gcr.io/google-containers/pause: m.daocloud.io/google-containers/pause
      gcr.io/google-samples/gce-app-healthcheck: m.daocloud.io/google-samples/gce-app-healthcheck
      k8s.gcr.io/coredns/coredns: k8s.m.daocloud.io/coredns/coredns
      k8s.gcr.io/ingress-nginx/controller: k8s.m.daocloud.io/ingress-nginx/controller

  # ==========================================================================
  # GHCR.io 镜像映射 (GitHub Container Registry)
  # ==========================================================================
  ghcr.io:
    target: ghcr.m.daocloud.io
    images:
      # Authentik (SSO)
      ghcr.io/goauthentik/server: m.daocloud.io/ghcr.io/goauthentik/server
      ghcr.io/goauthentik/ldap: m.daocloud.io/ghcr.io/goauthentik/ldap
      
      # Home Assistant
      ghcr.io/home-assistant/home-assistant: m.daocloud.io/ghcr.io/home-assistant/home-assistant
      ghcr.io/home-assistant/appdaemon: m.daocloud.io/ghcr.io/home-assistant/appdaemon
      
      # Immich (Photos)
      ghcr.io/immich-app/immich-server: m.daocloud.io/ghcr.io/immich-app/immich-server
      ghcr.io/immich-app/immich-machine-learning: m.daocloud.io/ghcr.io/immich-app/immich-machine-learning
      ghcr.io/immich-app/immich-microservices: m.daocloud.io/ghcr.io/immich-app/immich-microservices
      
      # Jellyfin
      ghcr.io/jellyfin/jellyfin: m.daocloud.io/ghcr.io/jellyfin/jellyfin
      
      # Navidrome (Music)
      ghcr.io/navidrome/navidrome: m.daocloud.io/ghcr.io/navidrome/navidrome
      
      # Gitea
      ghcr.io/go-gitea/gitea: m.daocloud.io/ghcr.io/go-gitea/gitea
      
      # Vaultwarden
      ghcr.io/dani-garcia/vaultwarden: m.daocloud.io/ghcr.io/dani-garcia/vaultwarden
      
      # Calibre-Web
      ghcr.io/linuxserver/calibre-web: m.daocloud.io/ghcr.io/linuxserver/calibre-web
      
      # Prowlarr
      ghcr.io/linuxserver/prowlarr: m.daocloud.io/ghcr.io/linuxserver/prowlarr
      
      # Radarr
      ghcr.io/linuxserver/radarr: m.daocloud.io/ghcr.io/linuxserver/radarr
      
      # Sonarr
      ghcr.io/linuxserver/sonarr: m.daocloud.io/ghcr.io/linuxserver/sonarr
      
      # Bazarr
      ghcr.io/linuxserver/bazarr: m.daocloud.io/ghcr.io/linuxserver/bazarr
      
      # Overseerr
      ghcr.io/linuxserver/overseerr: m.daocloud.io/ghcr.io/linuxserver/overseerr
      
      # Tautulli
      ghcr.io/linuxserver/tautulli: m.daocloud.io/ghcr.io/linuxserver/tautulli
      
      # Prometheus Stack
      ghcr.io/prometheus/prometheus: m.daocloud.io/ghcr.io/prometheus/prometheus
      ghcr.io/prometheus/alertmanager: m.daocloud.io/ghcr.io/prometheus/alertmanager
      ghcr.io/prometheus/node-exporter: m.daocloud.io/ghcr.io/prometheus/node-exporter
      ghcr.io/prometheus/blackbox-exporter: m.daocloud.io/ghcr.io/prometheus/blackbox-exporter
      
      # Grafana
