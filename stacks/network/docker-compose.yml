networks:
  proxy:
    external: true

services:
  adguardhome:
    image: adguard/adguardhome:v0.107.55
    container_name: adguardhome
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - adguard-work:/opt/adguardhome/work
      - adguard-conf:/opt/adguardhome/conf
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "853:853/tcp"
      - "3000:3000/tcp"
    environment:
      - TZ=${TZ}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.adguard.rule=Host(`dns.${DOMAIN}`)"
      - traefik.http.routers.adguard.entrypoints=websecure
      - traefik.http.routers.adguard.tls=true
      - traefik.http.services.adguard.loadbalancer.server.port=3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  unbound:
    image: mvance/unbound:1.21.1
    container_name: unbound
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - unbound-config:/opt/unbound/etc/unbound
      - unbound-cache:/unbound
    environment:
      - TZ=${TZ}
    healthcheck:
      test: ["CMD-SHELL", "unbound-control status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:2.11.3
    container_name: nginx-proxy-manager
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - npm-data:/data
      - npm-letsencrypt:/etc/letsencrypt
    ports:
      - "8181:81"
      - "4443:443"
      - "8080:8080"
    environment:
      - TZ=${TZ}
      - DB_SQLITE_FILE=/data/nginx.db
    labels:
      - traefik.enable=true
      - "traefik.http.routers.npm.rule=Host(`npm.${DOMAIN}`)"
      - traefik.http.routers.npm.entrypoints=websecure
      - traefik.http.routers.npm.tls=true
      - traefik.http.services.npm.loadbalancer.server.port=81
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:81/api/health || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  wireguard:
    image: ghcr.io/wg-easy/wg-easy:14
    container_name: wireguard
    restart: unless-stopped
    networks:
      - proxy
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - TZ=${TZ}
      - WG_HOST=${WG_HOST}
      - WG_PORT=${WG_PORT:-51820}
      - WG_PASSWORD=${WG_PASSWORD}
      - WG_DEFAULT_ADDRESS=10.8.0.x
      - WG_PEERS=10
      - WG_ALLOWEDIPS=0.0.0.0/0,::/0
      - WG_DNS=10.8.0.1
      - WG_EXTERNAL_IP=${WG_EXTERNAL_IP:-}
    volumes:
      - wireguard-data:/etc/wireguard
    ports:
      - "51820:51820/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    labels:
      - traefik.enable=true
      - "traefik.http.routers.wireguard.rule=Host(`vpn.${DOMAIN}`)"
      - traefik.http.routers.wireguard.entrypoints=websecure
      - traefik.http.routers.wireguard.tls=true
      - traefik.http.services.wireguard.loadbalancer.server.port=51820
    healthcheck:
      test: ["CMD", "wg", "show"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  cloudflare-ddns:
    image: ghcr.io/favonia/cloudflare-ddns:1.14.0
    container_name: cloudflare-ddns
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - CF_API_TOKEN=${CF_API_TOKEN}
      - CF_ZONE_ID=${CF_ZONE_ID}
      - CF_RECORD_NAME=${CF_RECORD_NAME}
      - CF_RECORD_TYPE=A
      - CRON=*/5 * * * *
      - SUPERVISOR_HTTP_API=cloudflare-ddns
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  proxy:
    external: true

volumes:
  adguard-work:
  adguard-conf:
  unbound-config:
  unbound-cache:
  npm-data:
  npm-letsencrypt:
  wireguard-data:
