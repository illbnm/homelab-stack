services:
  # =============================================================================
  # AdGuard Home - DNS 过滤 + 广告屏蔽
  # =============================================================================
  adguardhome:
    image: adguard/adguardhome:v0.107.55
    container_name: adguardhome
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - adguard-work:/opt/adguardhome/work
      - adguard-conf:/opt/adguardhome/conf
    ports:
      - 53:53/tcp
      - 53:53/udp
    dns:
      - 127.0.0.1  # Use Unbound as upstream
    labels:
      - traefik.enable=true
      - "traefik.http.routers.adguard.rule=Host(`dns.${DOMAIN}`)"
      - traefik.http.routers.adguard.entrypoints=websecure
      - traefik.http.routers.adguard.tls=true
      - traefik.http.services.adguard.loadbalancer.server.port=3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # =============================================================================
  # WireGuard Easy - VPN 服务端
  # =============================================================================
  wireguard-easy:
    image: ghcr.io/wg-easy/wg-easy:14
    container_name: wireguard-easy
    restart: unless-stopped
    networks:
      - proxy
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - wireguard-data:/etc/wireguard
    ports:
      - "${WG_PORT:-51820}:51820/udp"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - WG_HOST=${WG_HOST:-${DOMAIN}}
      - PASSWORD=${WG_PASSWORD:-changeme-wg}
      - WG_DEFAULT_DNS=${ADGUARD_IP:-10.8.0.2}
      - WG_DEFAULT_ADDRESS=10.8.0.x
      - WG_ALLOWED_IPS=0.0.0.0/0
      - WG_PRE_UP=echo "Pre Up"
      - WG_POST_UP=echo "Post Up"
      - WG_PRE_DOWN=echo "Pre Down"
      - WG_POST_DOWN=echo "Post Down"
    labels:
      - traefik.enable=true
      - "traefik.http.routers.wireguard.rule=Host(`vpn.${DOMAIN}`)"
      - traefik.http.routers.wireguard.entrypoints=websecure
      - traefik.http.routers.wireguard.tls=true
      - traefik.http.services.wireguard.loadbalancer.server.port=51821
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:51821/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # =============================================================================
  # Cloudflare DDNS - 动态 DNS 更新
  # =============================================================================
  cloudflare-ddns:
    image: ghcr.io/favonia/cloudflare-ddns:1.14.0
    container_name: cloudflare-ddns
    restart: unless-stopped
    network_mode: host
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - CF_API_TOKEN=${CF_API_TOKEN:-}
      - CF_ZONE_ID=${CF_ZONE_ID:-}
      - CF_RECORD_NAME=${CF_RECORD_NAME:-}
      - PROXY=true
      - DETECT_TIMEOUT=300
      - UPDATE_TIMEOUT=300
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # =============================================================================
  # Unbound - 递归 DNS 解析器
  # =============================================================================
  unbound:
    image: mvance/unbound:1.21.1
    container_name: unbound
    restart: unless-stopped
    networks:
      - proxy
    ports:
      - "54:53/tcp"
      - "54:53/udp"
    volumes:
      - unbound-data:/opt/unbound/etc/unbound
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    healthcheck:
      test: ["CMD-SHELL", "dig @127.0.0.1 -p 53 example.com || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  proxy:
    external: true

volumes:
  adguard-work:
  adguard-conf:
  npm-data:
  npm-letsencrypt:
  wireguard-data:
  unbound-data:
