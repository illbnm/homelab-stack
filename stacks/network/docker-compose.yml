services:
  adguardhome:
    image: adguard/adguardhome:v0.107.52
    container_name: adguardhome
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - adguard-work:/opt/adguardhome/work
      - adguard-conf:/opt/adguardhome/conf
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    labels:
      - traefik.enable=true
      - "traefik.http.routers.adguard.rule=Host(`adguard.${DOMAIN}`)"
      - traefik.http.routers.adguard.entrypoints=websecure
      - traefik.http.routers.adguard.tls=true
      - traefik.http.services.adguard.loadbalancer.server.port=3000
    healthcheck:
      test: [CMD, wget, -qO-, http://localhost:3000]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  wireguard:
    image: ghcr.io/wg-easy/wg-easy:14
    container_name: wireguard
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - wireguard-data:/etc/wireguard
    environment:
      - WG_HOST=${WG_HOST:-${DOMAIN}}
      - WG_PORT=51820
      - WG_DEFAULT_DNS=${WG_DNS:-10.8.0.1}
      - WG_DEFAULT_ADDRESS=10.8.0.x
    ports:
      - "51820:51820/udp"
    labels:
      - traefik.enable=true
      - "traefik.http.routers.wireguard.rule=Host(`wg.${DOMAIN}`)"
      - traefik.http.routers.wireguard.entrypoints=websecure
      - traefik.http.routers.wireguard.tls=true
      - traefik.http.services.wireguard.loadbalancer.server.port=51821
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:51821/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  cloudflare-ddns:
    image: favonia/cloudflare-ddns:1.14.0
    container_name: cloudflare-ddns
    restart: unless-stopped
    network_mode: host
    environment:
      - CLOUDFLARE_API_TOKEN=${CF_API_TOKEN}
      - DOMAINS=${CF_DOMAINS:-${DOMAIN}}
      - PROXIED=true
      - IP6_PROVIDER=cloudflare.trace
    healthcheck:
      test: [CMD-SHELL, "pgrep cloudflare-ddns || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s

  unbound:
    image: mvance/unbound:1.21.1
    container_name: unbound
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - unbound-data:/opt/unbound/etc/unbound
    healthcheck:
      test: [CMD-SHELL, "drill @127.0.0.1 google.com || nslookup google.com 127.0.0.1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  proxy:
    external: true

volumes:
  adguard-work:
  adguard-conf:
  wireguard-data:
  unbound-data:
