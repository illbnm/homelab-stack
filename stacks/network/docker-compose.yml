# =============================================================================
# HomeLab Stack — Network Stack
# Services: AdGuard Home + WireGuard Easy + Cloudflare DDNS + Unbound
#
# Prerequisites:
#   1. cp .env.example .env && fill in required values
#   2. Ensure 'proxy' network exists (created by base stack)
#   3. docker compose up -d
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # AdGuard Home — DNS Ad Blocker
  # URL: https://adguard.${DOMAIN}
  # ---------------------------------------------------------------------------
  adguardhome:
    image: adguard/adguardhome:v0.107.55
    container_name: adguardhome
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - adguard-work:/opt/adguardhome/work
      - adguard-conf:/opt/adguardhome/conf
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    labels:
      - traefik.enable=true
      - "traefik.http.routers.adguard.rule=Host(`adguard.${DOMAIN}`)"
      - traefik.http.routers.adguard.entrypoints=websecure
      - traefik.http.routers.adguard.tls=true
      - traefik.http.services.adguard.loadbalancer.server.port=3000
    healthcheck:
      test: [CMD, wget, -qO-, http://localhost:3000]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # WireGuard Easy — VPN Server
  # URL: https://wg.${DOMAIN}
  # ---------------------------------------------------------------------------
  wireguard:
    image: weejewel/wg-easy:13
    container_name: wireguard
    restart: unless-stopped
    networks:
      - proxy
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - wireguard-data:/etc/wireguard
    environment:
      - WG_HOST=${WG_HOST}
      - PASSWORD=${WG_PASSWORD}
      - WG_PORT=${WG_PORT:-51820}
    ports:
      - "${WG_PORT:-51820}:51820/udp"
    labels:
      - traefik.enable=true
      - "traefik.http.routers.wireguard.rule=Host(`wg.${DOMAIN}`)"
      - traefik.http.routers.wireguard.entrypoints=websecure
      - traefik.http.routers.wireguard.tls=true
      - traefik.http.services.wireguard.loadbalancer.server.port=51821
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:51821/api/wireguard/client || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Cloudflare DDNS — Dynamic DNS Updater
  # ---------------------------------------------------------------------------
  cloudflare-ddns:
    image: favonia/cloudflare-ddns:v1.15.1
    container_name: cloudflare-ddns
    restart: unless-stopped
    network_mode: host
    environment:
      - CLOUDFLARE_API_TOKEN=${CF_API_TOKEN}
      - DOMAINS=${CF_RECORD_NAME}
      - IP6_PROVIDER=none
    healthcheck:
      test: [CMD-SHELL, "pgrep cloudflare-ddns || exit 1"]
      interval: 300s
      timeout: 10s
      retries: 1

  # ---------------------------------------------------------------------------
  # Unbound — Recursive DNS Resolver
  # ---------------------------------------------------------------------------
  unbound:
    image: mvance/unbound:1.22.0
    container_name: unbound
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - unbound-data:/opt/unbound/etc/unbound
    ports:
      - "5335:53/tcp"
      - "5335:53/udp"
    labels:
      - traefik.enable=false
    healthcheck:
      test: [CMD-SHELL, "drill @127.0.0.1 -p 53 example.com || nslookup example.com 127.0.0.1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# =============================================================================
# Networks
# =============================================================================
networks:
  proxy:
    external: true

# =============================================================================
# Volumes
# =============================================================================
volumes:
  adguard-work:
  adguard-conf:
  wireguard-data:
  unbound-data:
