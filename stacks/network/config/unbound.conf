server:
    # Logging
    verbosity: 1
    log-queries: no
    log-replies: no

    # Interface — listen on all interfaces inside container
    interface: 0.0.0.0
    port: 53
    do-ip4: yes
    do-ip6: yes
    do-udp: yes
    do-tcp: yes

    # Access control — allow queries from Docker networks
    access-control: 127.0.0.0/8 allow
    access-control: 10.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 192.168.0.0/16 allow

    # Security
    hide-identity: yes
    hide-version: yes
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-referral-path: yes
    use-caps-for-id: no
    qname-minimisation: yes
    aggressive-nsec: yes

    # DNSSEC validation
    auto-trust-anchor-file: "/opt/unbound/etc/unbound/root.key"

    # Cache settings
    cache-min-ttl: 3600
    cache-max-ttl: 86400
    msg-cache-size: 128m
    rrset-cache-size: 256m
    num-threads: 2

    # Performance
    so-rcvbuf: 1m
    so-sndbuf: 1m
    edns-buffer-size: 1232

    # Privacy — no root hints needed with recursive resolution
    root-hints: "/opt/unbound/etc/unbound/root.hints"

    # Prefetch popular domains
    prefetch: yes
    prefetch-key: yes

    # Private address ranges — protect against DNS rebinding
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: 172.16.0.0/12
    private-address: 10.0.0.0/8
    private-address: fd00::/8
    private-address: fe80::/10
