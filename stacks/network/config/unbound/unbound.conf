# Unbound 递归 DNS 解析器配置
# 参考: https://nlnetlabs.nl/documentation/unbound/

# ============================================================================
# 服务器设置
# ============================================================================

server:
  # 监听地址
  interface: 0.0.0.0
  port: 53

  # IPv6 支持 (如有)
  # interface: ::0
  # port: 53

  # DNS 协议
  do-ip4: yes
  do-ip6: no  # 如无 IPv6 可关闭
  do-udp: yes
  do-tcp: yes

  # 访问控制
  access-control: 127.0.0.0/8 allow
  access-control: 192.168.0.0/16 allow
  access-control: 10.0.0.0/8 allow
  access-control: 172.16.0.0/12 allow
  access-control: ::1 allow

  # 不允许递归查询 (防止开放递归)
  # access-control: 0.0.0.0/0 refuse

  # 缓存设置
  cache-max-ttl: 86400
  cache-min-ttl: 3600
  msg-cache-size: 50mb
  msg-cache-slabs: 4
  rrset-cache-size: 100mb
  rrset-cache-slabs: 4

  # 线程数
  num-threads: 4

  # 端口优化
  so-reuseport: yes
  so-rcvbuf: 4m
  so-sndbuf: 4m

  # 响应策略 (RFC 6761)
  local-zone: "localhost." static
  local-zone: "example.com." static
  local-zone: "example.org." static

  # 禁止某些后缀
  local-zone: "lan" static
  local-zone: "local" static

  # DNSSEC 验证 (信任根密钥)
  # 推荐开启，但需要时间同步
  # val-clean-additional: yes
  # prefetch: yes
  # prefetch-key: yes

  # 日志
  log-queries: no
  log-replies: no
  log-dest: stdout
  log-identity: "unbound"

# ============================================================================
# 上游 DNS 服务器 (stub-zone)
# ============================================================================

# 使用国内 DNS 作为上游 (更快)
stub-zone:
  name: "."
  stub-addr: 223.5.5.5@53      # 阿里 DNS
  stub-addr: 119.29.29.29@53   # 腾讯 DNSPod
  stub-addr: 114.114.114.114@53 # 电信 DNS

# 备用上游 (如果上面不可用)
# stub-zone:
#   name: "."
#   stub-addr: 1.1.1.1@53      # Cloudflare
#   stub-addr: 8.8.8.8@53      # Google

# ============================================================================
# 转发区域 (可选，针对特定域名使用特定 DNS)
# ============================================================================

# forward-zone:
#   name: "example.com"
#   forward-addr: 192.168.1.1

# ============================================================================
# DHCP 适配 (如果 AdGuard 提供 DHCP，这里可配置 local-data)
# ============================================================================

# local-data: "router.local A 192.168.1.1"
# local-data: "printer.local A 192.168.1.100"

# ============================================================================
# 安全设置
# ============================================================================

# 不响应未知域名的查询 (NXDOMAIN 劫持)
# don't respond to basically anything to an outside query

# 避免缓存污染
# avoid 0x20 randomization for now

# ============================================================================
# 性能调优
# ============================================================================

# 使用 hugepages (如果可用)
# use-hugepages: no

# ECS 支持 (EDNS Client Subnet)
# enable-ecs: yes

# 最小 TTL
# serve-expired: no

# ============================================================================
# 统计与监控 (可选)
# ============================================================================

# statistics-interval: 0
# statistics-cumulative: no