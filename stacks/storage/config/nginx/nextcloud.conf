# Nextcloud Nginx 配置 (FPM 代理)
# 参考: https://github.com/nextcloud/docker/blob/master/nginx/nextcloud.conf

upstream php-handler {
    server nextcloud:9000;
}

server {
    listen 443 ssl http2;
    server_name cloud.${DOMAIN};

    # SSL 证书 (由 Traefik 提供，或在此处配置)
    # ssl_certificate /etc/nginx/ssl/domain.crt;
    # ssl_certificate_key /etc/nginx/ssl/domain.key;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 根路径
    root /var/www/html;
    index index.php index.html /index.php$request_uri;

    # 日志
    access_log /var/log/nginx/nextcloud.access.log;
    error_log /var/log/nginx/nextcloud.error.log;

    # 静态文件缓存
    location = /favicon.ico {
        log_not_found off;
    }

    location = /robots.txt {
        allow all;
        log_not_found off;
    }

    location / {
        rewrite ^ /index.php$request_uri;
    }

    location ~ ^/(?:build|tests|config|lib|3rdparty|templates|data)/ {
        deny all;
    }

    location ~ ^/(?:\.|autotest|occ|issue|indique|db_|console) {
        deny all;
    }

    location ~ \.php(?:$|/) {
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        set $path_info $fastcgi_path_info;
        try_files $fastcgi_script_name =404;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $path_info;
        fastcgi_param HTTPS on;

        fastcgi_pass php-handler;
        fastcgi_intercept_errors on;
    }

    # 文件下载
    location ~ ^/(?:updater|core/ajax/update|status|settings)/(?:.+)\.php$ {
        try_files $uri =404;

        include fastcgi_params;
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        set $path_info $fastcgi_path_info;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $path_info;
        fastcgi_intercept_errors on;

        fastcgi_pass php-handler;
    }

    # 静态文件
    location ~ \.(?:css|js|svg|gif|png|jpg|ico)$ {
        try_files $uri /index.php$request_uri;

        add_header Cache-Control "public, max-age=15778463, immutable";

        access_log off;
    }

    location ~ \.woff2?$ {
        try_files $uri /index.php$request_uri;

        add_header Cache-Control "public, max-age=31536000, immutable";

        access_log off;
    }
}