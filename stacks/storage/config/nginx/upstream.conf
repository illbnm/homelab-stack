upstream php-handler {
    server nextcloud-fpm:9000;
}

server {
    listen 80;
    server_name _;

    # 健康检查端点
    location /status.php {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # 重定向到 HTTPS (由 Traefik 处理)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    server_name nextcloud.internal;

    root /var/www/html;
    index index.php index.html;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'" always;

    # 客户端最大上传大小
    client_max_body_size 10G;
    client_body_timeout 300s;

    # 静态资源缓存
    location ~* \.(?:css|js|woff|woff2|eot|ttf|otf|png|jpg|jpeg|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # PHP 处理
    location ~ \.php(?:$|/) {
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        set $path_info $fastcgi_path_info;

        try_files $fastcgi_script_name =404;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $path_info;
        fastcgi_param PATH_TRANSLATED $document_root$path_info;
        fastcgi_param HTTPS on;
        fastcgi_param front_controller_active true;

        fastcgi_pass php-handler;
        fastcgi_intercept_errors on;
        fastcgi_request_buffering off;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
    }

    # 主 location
    location / {
        try_files $uri $uri/ /index.php$request_uri;
    }

    # 禁止访问敏感文件
    location ~ ^/(?:\.|data|config|db_structure|xml|phpinfo|status|README|3rdparty|lib|templates|composer)\. {
        deny all;
        return 404;
    }

    location ~ /(?:autotest|occ|issue|indie|db_|console) {
        deny all;
        return 404;
    }
}
