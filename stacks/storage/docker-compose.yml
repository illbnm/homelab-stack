version: '3.8'

volumes:
  nextcloud-data:
    driver: local
  nextcloud-app:
    driver: local
  minio-data:
    driver: local
  filebrowser-data:
    driver: local
  syncthing-data:
    driver: local
  storage-root:
    driver: local

networks:
  proxy:
    external: true
  internal:
    external: true

services:
  # ------------------------------------------------------------------------
  # Nextcloud — 个人云盘 (FPM + Nginx)
  # ------------------------------------------------------------------------
  nextcloud:
    image: nextcloud:29.0.7-fpm-alpine
    container_name: nextcloud
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - nextcloud-data:/var/www/html
      - nextcloud-app:/var/www/html/apps
      - ./config/nextcloud/config:/var/www/html/config:ro
      - ./config/nextcloud/myjwt.example.php:/var/www/html/apps/jwt/config/jwt.example.php:ro
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - OVERWRITEPROTOCOL=https
      - TRUSTED_PROXIES=traefik
      - DEFAULT_PHONE_REGION=CN
      - NEXTCLOUD_TRUSTED_DOMAINS=${DOMAIN},cloud.${DOMAIN}
      - NEXTCLOUD_DEFAULT_PHONE_REGION=CN
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER:-admin}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD:-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=false"  # 只暴露给 internal 网络，由 Nginx 代理

  nextcloud-nginx:
    image: nginx:1.27-alpine
    container_name: nextcloud-nginx
    restart: unless-stopped
    networks:
      - internal
      - proxy
    volumes:
      - nextcloud-data:/var/www/html:ro
      - ./config/nginx/nextcloud.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/nginx/ssl:/etc/nginx/ssl:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    depends_on:
      - nextcloud
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "https://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextcloud.rule=Host(`cloud.${DOMAIN}`)"
      - "traefik.http.routers.nextcloud.entrypoints=websecure"
      - "traefik.http.routers.nextcloud.tls=true"
      - "traefik.http.routers.nextcloud.tls.certResolver=letsencrypt"
      - "traefik.http.services.nextcloud.loadbalancer.server.port=443"

  # ------------------------------------------------------------------------
  # MinIO — 对象存储 (S3 兼容)
  # ------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: minio
    restart: unless-stopped
    networks:
      - internal
      - proxy
    volumes:
      - minio-data:/data
      - ./config/minio/init.sh:/init.sh:ro
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_DEFAULT_BUCKETS=nextcloud,syncthing,outline
    command: ["/bin/bash", "/init.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio.rule=Host(`minio.${DOMAIN}`)"
      - "traefik.http.routers.minio.entrypoints=websecure"
      - "traefik.http.routers.minio.tls=true"
      - "traefik.http.routers.minio.tls.certResolver=letsencrypt"
      - "traefik.http.services.minio.loadbalancer.server.port=9000"
      # S3 API 路由 (可选)
      - "traefik.http.routers.minio-api.rule=Host(`s3.${DOMAIN}`)"
      - "traefik.http.routers.minio-api.entrypoints=websecure"
      - "traefik.http.routers.minio-api.tls=true"
      - "traefik.http.routers.minio-api.tls.certResolver=letsencrypt"
      - "traefik.http.services.minio-api.service=minio@docker"
      - "traefik.http.routers.minio-api.middlewares=strip-api-prefix@docker"

  # ------------------------------------------------------------------------
  # FileBrowser — 轻量文件管理
  # ------------------------------------------------------------------------
  filebrowser:
    image: filebrowser/filebrowser:v2.31.1
    container_name: filebrowser
    restart: unless-stopped
    networks:
      - internal
      - proxy
    volumes:
      - storage-root:/srv
      - filebrowser-data:/filebrowser-db
      - ./config/filebrowser/filebrowser.json:/filebrowser.json:ro
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    command: ["-c", "/filebrowser.json", "-r", "/srv"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.filebrowser.rule=Host(`files.${DOMAIN}`)"
      - "traefik.http.routers.filebrowser.entrypoints=websecure"
      - "traefik.http.routers.filebrowser.tls=true"
      - "traefik.http.routers.filebrowser.tls.certResolver=letsencrypt"
      - "traefik.http.services.filebrowser.loadbalancer.server.port=8080"

  # ------------------------------------------------------------------------
  # Syncthing — P2P 文件同步
  # ------------------------------------------------------------------------
  syncthing:
    image: lscr.io/linuxserver/syncthing:1.27.11
    container_name: syncthing
    restart: unless-stopped
    networks:
      - internal
      - proxy
    volumes:
      - syncthing-data:/config
      - storage-root:/data
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - PUID=1000
      - PGID=1000
      # 静默模式 (Web UI 只允许 localhost，通过 Traefik 暴露)
      - STN_FOLDER=/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8384/rest/system/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.syncthing.rule=Host(`sync.${DOMAIN}`)"
      - "traefik.http.routers.syncthing.entrypoints=websecure"
      - "traefik.http.routers.syncthing.tls=true"
      - "traefik.http.routers.syncthing.tls.certResolver=letsencrypt"
      - "traefik.http.services.syncthing.loadbalancer.server.port=8384"