services:
  nextcloud:
    image: nextcloud:29.0.9-fpm-alpine
    container_name: nextcloud
    restart: unless-stopped
    networks:
      - databases
      - storage-internal
    volumes:
      - nextcloud-data:/var/www/html
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER:-admin}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD:-changeme}
      - NEXTCLOUD_TRUSTED_DOMAINS=nextcloud.${DOMAIN}
      - POSTGRES_HOST=homelab-postgres
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=${NEXTCLOUD_DB_USER:-nextcloud}
      - POSTGRES_PASSWORD=${NEXTCLOUD_DB_PASSWORD}
      - REDIS_HOST=homelab-redis
      - REDIS_HOST_PASSWORD=${REDIS_PASSWORD}
      - NEXTCLOUD_OIDC_LOGIN_ENABLED=${NEXTCLOUD_OIDC_ENABLED:-false}
      - OIDC_LOGIN_PROVIDER_URL=https://${AUTHENTIK_DOMAIN:-auth.${DOMAIN}}/application/o/nextcloud/
      - OIDC_LOGIN_CLIENT_ID=${NEXTCLOUD_OIDC_CLIENT_ID:-}
      - OIDC_LOGIN_CLIENT_SECRET=${NEXTCLOUD_OIDC_CLIENT_SECRET:-}
      - OIDC_LOGIN_AUTO_REDIRECT=${NEXTCLOUD_OIDC_AUTO_REDIRECT:-false}
      - NEXTCLOUD_TRUSTED_PROXIES=172.16.0.0/12
      - OVERWRITEPROTOCOL=https
      - DEFAULT_PHONE_REGION=CN
    healthcheck:
      test: [CMD-SHELL, "php-fpm-healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  nextcloud-nginx:
    image: nginx:1.27-alpine
    container_name: nextcloud-nginx
    restart: unless-stopped
    networks:
      - proxy
      - storage-internal
    volumes:
      - nextcloud-data:/var/www/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      nextcloud:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - "traefik.http.routers.nextcloud.rule=Host(`nextcloud.${DOMAIN}`)"
      - traefik.http.routers.nextcloud.entrypoints=websecure
      - traefik.http.routers.nextcloud.tls=true
      - traefik.http.services.nextcloud.loadbalancer.server.port=80
      - "traefik.http.middlewares.nextcloud-dav.redirectregex.regex=https://(.*)/.well-known/(card|cal)dav"
      - "traefik.http.middlewares.nextcloud-dav.redirectregex.replacement=https://$${1}/remote.php/dav/"
      - traefik.http.routers.nextcloud.middlewares=nextcloud-dav
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:80/status.php || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  minio-init:
    image: minio/mc:RELEASE.2024-10-02T08-27-28Z
    container_name: minio-init
    restart: "no"
    networks:
      - proxy
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-changeme-minio}
      - MINIO_DOMAIN=${DOMAIN}
    entrypoint: ["/bin/sh", "/init-buckets.sh"]
    volumes:
      - ./minio-init/init-buckets.sh:/init-buckets.sh:ro

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: minio
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - minio-data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-changeme-minio}
      - MINIO_BROWSER_REDIRECT_URL=https://minio.${DOMAIN}
    command: server /data --console-address ":9001"
    labels:
      - traefik.enable=true
      - "traefik.http.routers.minio.rule=Host(`minio.${DOMAIN}`)"
      - traefik.http.routers.minio.entrypoints=websecure
      - traefik.http.routers.minio.tls=true
      - traefik.http.services.minio.loadbalancer.server.port=9001
      - "traefik.http.routers.minio-api.rule=Host(`s3.${DOMAIN}`)"
      - traefik.http.routers.minio-api.entrypoints=websecure
      - traefik.http.routers.minio-api.tls=true
      - traefik.http.services.minio-api.loadbalancer.server.port=9000
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  filebrowser:
    image: filebrowser/filebrowser:v2.31.2
    container_name: filebrowser
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - filebrowser-data:/database
      - ${STORAGE_PATH:-/data}:/srv
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.filebrowser.rule=Host(`files.${DOMAIN}`)"
      - traefik.http.routers.filebrowser.entrypoints=websecure
      - traefik.http.routers.filebrowser.tls=true
      - traefik.http.services.filebrowser.loadbalancer.server.port=80
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  syncthing:
    image: lscr.io/linuxserver/syncthing:1.27.11
    container_name: syncthing
    restart: unless-stopped
    networks:
      - proxy
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - syncthing-data:/config
      - ${STORAGE_PATH:-/data}:/data/sync
    ports:
      - "22000:22000/tcp"
      - "22000:22000/udp"
      - "21027:21027/udp"
    labels:
      - traefik.enable=true
      - "traefik.http.routers.syncthing.rule=Host(`syncthing.${DOMAIN}`)"
      - traefik.http.routers.syncthing.entrypoints=websecure
      - traefik.http.routers.syncthing.tls=true
      - traefik.http.services.syncthing.loadbalancer.server.port=8384
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:8384/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  proxy:
    external: true
  databases:
    external: true
  storage-internal:
    driver: bridge
    internal: true

volumes:
  nextcloud-data:
  minio-data:
  filebrowser-data:
  syncthing-data:
