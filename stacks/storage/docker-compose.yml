# =============================================================================
# HomeLab Stack — Storage Stack
# Services: Nextcloud (FPM+Nginx) + MinIO + FileBrowser + Syncthing
#
# Prerequisites:
#   1. cp .env.example .env && fill in required values
#   2. Ensure 'proxy' and 'databases' networks exist
#   3. docker compose up -d
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Nextcloud — File Sync & Collaboration
  # URL: https://nextcloud.${DOMAIN}
  # ---------------------------------------------------------------------------
  nextcloud-app:
    image: nextcloud:29.0.9-fpm-alpine
    container_name: nextcloud-app
    restart: unless-stopped
    networks:
      - proxy
      - databases
    volumes:
      - nextcloud-data:/var/www/html
      - nextcloud-custom:/var/www/html/custom_apps
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER:-admin}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=nextcloud.${DOMAIN}
      - POSTGRES_HOST=homelab-postgres
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=${NEXTCLOUD_DB_USER:-nextcloud}
      - POSTGRES_PASSWORD=${NEXTCLOUD_DB_PASSWORD}
      - REDIS_HOST=homelab-redis
      - REDIS_HOST_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      - nextcloud-redis
    labels:
      - traefik.enable=false
    healthcheck:
      test: [CMD-SHELL, "php-fpm-healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  nextcloud-web:
    image: nginx:1.27-alpine
    container_name: nextcloud-web
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - nextcloud-data:/var/www/html:ro
      - ../../config/nextcloud/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      nextcloud-app:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - "traefik.http.routers.nextcloud.rule=Host(`nextcloud.${DOMAIN}`)"
      - traefik.http.routers.nextcloud.entrypoints=websecure
      - traefik.http.routers.nextcloud.tls=true
      - traefik.http.services.nextcloud.loadbalancer.server.port=80
      - "traefik.http.middlewares.nextcloud-dav.redirectregex.regex=https://(.*)/.well-known/(card|cal)dav"
      - "traefik.http.middlewares.nextcloud-dav.redirectregex.replacement=https://$${1}/remote.php/dav/"
      - traefik.http.routers.nextcloud.middlewares=nextcloud-dav
    healthcheck:
      test: [CMD-SHELL, "wget -qO- http://localhost:80/fpm-ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Cron sidecar for Nextcloud
  nextcloud-cron:
    image: nextcloud:29.0.9-fpm-alpine
    container_name: nextcloud-cron
    restart: unless-stopped
    networks:
      - databases
    volumes:
      - nextcloud-data:/var/www/html
    entrypoint: /cron.sh
    depends_on:
      nextcloud-app:
        condition: service_healthy
    healthcheck:
      test: [CMD-SHELL, "pgrep -f 'cron.php' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3

  nextcloud-redis:
    image: redis:7-alpine
    container_name: nextcloud-redis
    restart: unless-stopped
    networks:
      - databases
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - nextcloud-redis-data:/data
    healthcheck:
      test: [CMD, "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MinIO — S3-Compatible Object Storage
  # Console: https://minio.${DOMAIN}   API: https://s3.${DOMAIN}
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: minio
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - minio-data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_BROWSER_REDIRECT_URL=https://minio.${DOMAIN}
    command: server /data --console-address ":9001"
    labels:
      - traefik.enable=true
      - "traefik.http.routers.minio.rule=Host(`minio.${DOMAIN}`)"
      - traefik.http.routers.minio.entrypoints=websecure
      - traefik.http.routers.minio.tls=true
      - traefik.http.services.minio.loadbalancer.server.port=9001
      - "traefik.http.routers.minio-api.rule=Host(`s3.${DOMAIN}`)"
      - traefik.http.routers.minio-api.entrypoints=websecure
      - traefik.http.routers.minio-api.tls=true
      - traefik.http.services.minio-api.loadbalancer.server.port=9000
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # FileBrowser — Web File Manager
  # URL: https://files.${DOMAIN}
  # ---------------------------------------------------------------------------
  filebrowser:
    image: filebrowser/filebrowser:v2.31.2
    container_name: filebrowser
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - filebrowser-data:/database
      - ${STORAGE_PATH:-/data}:/srv
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.filebrowser.rule=Host(`files.${DOMAIN}`)"
      - traefik.http.routers.filebrowser.entrypoints=websecure
      - traefik.http.routers.filebrowser.tls=true
      - traefik.http.services.filebrowser.loadbalancer.server.port=80
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Syncthing — Continuous File Synchronization
  # URL: https://sync.${DOMAIN}
  # ---------------------------------------------------------------------------
  syncthing:
    image: syncthing/syncthing:1.28.1
    container_name: syncthing
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - syncthing-data:/var/syncthing
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - STGUIADDRESS=0.0.0.0:8384
    ports:
      - "22000:22000/tcp"
      - "22000:22000/udp"
      - "21027:21027/udp"
    labels:
      - traefik.enable=true
      - "traefik.http.routers.syncthing.rule=Host(`sync.${DOMAIN}`)"
      - traefik.http.routers.syncthing.entrypoints=websecure
      - traefik.http.routers.syncthing.tls=true
      - traefik.http.services.syncthing.loadbalancer.server.port=8384
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:8384/rest/noauth/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# =============================================================================
# Networks
# =============================================================================
networks:
  proxy:
    external: true
  databases:
    external: true

# =============================================================================
# Volumes
# =============================================================================
volumes:
  nextcloud-data:
  nextcloud-custom:
  nextcloud-redis-data:
  minio-data:
  filebrowser-data:
  syncthing-data:
