# =============================================================================
# HomeLab Stack — Storage
# Services: Nextcloud (FPM + Nginx) + MinIO + FileBrowser + Syncthing
#
# Prerequisites:
#   1. cp .env.example .env && fill in required values
#   2. Databases stack must be running (PostgreSQL + Redis)
#   3. docker network create proxy  (if not exists)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Nextcloud — Personal Cloud (FPM mode)
  # URL: https://cloud.${DOMAIN}
  # DB:  PostgreSQL via shared 'databases' network
  # Docs: https://docs.nextcloud.com/server/stable/admin_manual/
  # ---------------------------------------------------------------------------
  nextcloud:
    image: nextcloud:29.0.7-fpm-alpine
    container_name: homelab-nextcloud
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - POSTGRES_HOST=homelab-postgres
      - POSTGRES_DB=${NEXTCLOUD_DB_NAME:-nextcloud}
      - POSTGRES_USER=${POSTGRES_USER:-nc_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=homelab-redis
      - REDIS_HOST_PORT=6379
      - REDIS_HOST_PASSWORD=${REDIS_PASSWORD}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=${NEXTCLOUD_DOMAIN:-cloud.${DOMAIN}}
      - OVERWRITEPROTOCOL=https
      - OVERWRITECLIURL=https://${NEXTCLOUD_DOMAIN:-cloud.${DOMAIN}}
    volumes:
      - nextcloud-data:/var/www/html
      - ${STORAGE_ROOT}/nextcloud/config:/var/www/html/config
      - ${STORAGE_ROOT}/nextcloud/data:/var/www/html/data
      - ${STORAGE_ROOT}/nextcloud/apps:/var/www/html/custom_apps
    networks:
      - internal
      - databases
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/status.php || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.enable=false"

  # ---------------------------------------------------------------------------
  # Nextcloud Nginx — FPM Frontend
  # URL: https://cloud.${DOMAIN}
  # ---------------------------------------------------------------------------
  nextcloud-nginx:
    image: nginx:1.27-alpine
    container_name: homelab-nextcloud-nginx
    restart: unless-stopped
    depends_on:
      nextcloud:
        condition: service_healthy
    volumes:
      - ./nginx/nextcloud.conf:/etc/nginx/conf.d/default.conf:ro
      - nextcloud-data:/var/www/html:ro
    networks:
      - internal
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/status.php || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextcloud.rule=Host(`${NEXTCLOUD_DOMAIN:-cloud.${DOMAIN}}`)"
      - "traefik.http.routers.nextcloud.entrypoints=websecure"
      - "traefik.http.routers.nextcloud.tls.certresolver=letsencrypt"
      - "traefik.http.routers.nextcloud.service=nextcloud"
      - "traefik.http.routers.nextcloud.middlewares=security-headers@file"
      - "traefik.http.services.nextcloud.loadbalancer.server.port=80"

  # ---------------------------------------------------------------------------
  # MinIO — S3-Compatible Object Storage
  # Console: https://minio.${DOMAIN}
  # API:     https://s3.${DOMAIN}
  # Docs:    https://min.io/docs/minio/linux/index.html
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: homelab-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - TZ=${TZ}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_BROWSER_REDIRECT_URL=https://minio.${DOMAIN}
      - MINIO_SERVER_URL=https://s3.${DOMAIN}
    volumes:
      - ${STORAGE_ROOT}/minio:/data
    networks:
      - internal
      - proxy
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=true"
      # API route — s3.${DOMAIN}
      - "traefik.http.routers.minio-api.rule=Host(`s3.${DOMAIN}`)"
      - "traefik.http.routers.minio-api.entrypoints=websecure"
      - "traefik.http.routers.minio-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.minio-api.service=minio-api"
      - "traefik.http.routers.minio-api.middlewares=security-headers@file"
      - "traefik.http.services.minio-api.loadbalancer.server.port=9000"
      # Console route — minio.${DOMAIN}
      - "traefik.http.routers.minio-console.rule=Host(`minio.${DOMAIN}`)"
      - "traefik.http.routers.minio-console.entrypoints=websecure"
      - "traefik.http.routers.minio-console.tls.certresolver=letsencrypt"
      - "traefik.http.routers.minio-console.service=minio-console"
      - "traefik.http.routers.minio-console.middlewares=security-headers@file"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"

  # ---------------------------------------------------------------------------
  # FileBrowser — Lightweight File Manager
  # URL: https://files.${DOMAIN}
  # Docs: https://filebrowser.org/
  # ---------------------------------------------------------------------------
  filebrowser:
    image: filebrowser/filebrowser:v2.31.1
    container_name: homelab-filebrowser
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - FB_NOAUTH=false
    volumes:
      - ${STORAGE_ROOT}:/srv
      - ./filebrowser/settings.json:/database/settings.json
      - ./filebrowser/filebrowser.db:/database/filebrowser.db
    networks:
      - internal
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.filebrowser.rule=Host(`files.${DOMAIN}`)"
      - "traefik.http.routers.filebrowser.entrypoints=websecure"
      - "traefik.http.routers.filebrowser.tls.certresolver=letsencrypt"
      - "traefik.http.routers.filebrowser.service=filebrowser"
      - "traefik.http.routers.filebrowser.middlewares=security-headers@file"
      - "traefik.http.services.filebrowser.loadbalancer.server.port=80"

  # ---------------------------------------------------------------------------
  # Syncthing — P2P File Synchronization
  # URL: https://sync.${DOMAIN}
  # Docs: https://docs.syncthing.net/
  # ---------------------------------------------------------------------------
  syncthing:
    image: lscr.io/linuxserver/syncthing:1.27.11
    container_name: homelab-syncthing
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    volumes:
      - ${STORAGE_ROOT}/syncthing/config:/config
      - ${STORAGE_ROOT}/syncthing/data:/data
    networks:
      - internal
      - proxy
    ports:
      - "22000:22000/tcp"
      - "22000:22000/udp"
      - "21027:21027/udp"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8384/rest/noauth/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.syncthing.rule=Host(`sync.${DOMAIN}`)"
      - "traefik.http.routers.syncthing.entrypoints=websecure"
      - "traefik.http.routers.syncthing.tls.certresolver=letsencrypt"
      - "traefik.http.routers.syncthing.service=syncthing"
      - "traefik.http.routers.syncthing.middlewares=security-headers@file"
      - "traefik.http.services.syncthing.loadbalancer.server.port=8384"

# =============================================================================
# Networks
# =============================================================================
networks:
  proxy:
    external: true
  internal:
    driver: bridge
  databases:
    external: true

# =============================================================================
# Volumes
# =============================================================================
volumes:
  nextcloud-data:
    driver: local
