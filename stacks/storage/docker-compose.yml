services:
  nextcloud:
    image: nextcloud:29.0.9-apache
    container_name: nextcloud
    restart: unless-stopped
    networks:
      - proxy
      - databases
    volumes:
      - nextcloud-data:/var/www/html
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER:-admin}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD:-changeme}
      - NEXTCLOUD_TRUSTED_DOMAINS=nextcloud.${DOMAIN}
      - POSTGRES_HOST=homelab-postgres
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=${POSTGRES_USER:-homelab}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - REDIS_HOST=homelab-redis
      # SSO: Trust Authentik headers when using ForwardAuth
      - OVERWRITEHOST=nextcloud.${DOMAIN}
      - OVERWRITEPROTOCOL=https
    labels:
      - traefik.enable=true
      - "traefik.http.routers.nextcloud.rule=Host(`nextcloud.${DOMAIN}`)"
      - traefik.http.routers.nextcloud.entrypoints=websecure
      - traefik.http.routers.nextcloud.tls=true
      - traefik.http.services.nextcloud.loadbalancer.server.port=80
      - "traefik.http.middlewares.nextcloud-dav.redirectregex.regex=https://(.*)/.well-known/(card|cal)dav"
      - "traefik.http.middlewares.nextcloud-dav.redirectregex.replacement=https://$${1}/remote.php/dav/"
      - traefik.http.routers.nextcloud.middlewares=nextcloud-dav
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:80/status.php || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: minio
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - minio-data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-changeme-minio}
      - MINIO_BROWSER_REDIRECT_URL=https://minio.${DOMAIN}
    command: server /data --console-address ":9001"
    labels:
      - traefik.enable=true
      - "traefik.http.routers.minio.rule=Host(`minio.${DOMAIN}`)"
      - traefik.http.routers.minio.entrypoints=websecure
      - traefik.http.routers.minio.tls=true
      - traefik.http.services.minio.loadbalancer.server.port=9001
      - "traefik.http.routers.minio-api.rule=Host(`s3.${DOMAIN}`)"
      - traefik.http.routers.minio-api.entrypoints=websecure
      - traefik.http.routers.minio-api.tls=true
      - traefik.http.services.minio-api.loadbalancer.server.port=9000
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  filebrowser:
    image: filebrowser/filebrowser:v2.31.2
    container_name: filebrowser
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - filebrowser-data:/database
      - ${STORAGE_PATH:-/data}:/srv
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.filebrowser.rule=Host(`files.${DOMAIN}`)"
      - traefik.http.routers.filebrowser.entrypoints=websecure
      - traefik.http.routers.filebrowser.tls=true
      - traefik.http.services.filebrowser.loadbalancer.server.port=80
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  proxy:
    external: true
  databases:
    external: true

volumes:
  nextcloud-data:
  minio-data:
  filebrowser-data:

# Nextcloud Social Login (OIDC) Setup Instructions
# ================================================
#
# Nextcloud supports OIDC login via the Social Login app.
# After starting Nextcloud for the first time:
#
# 1. Install the Social Login app inside Nextcloud:
#    docker exec nextcloud occ app:install sociallogin
#
# 2. Run the Authentik setup script to create the OIDC provider:
#    ./scripts/setup-authentik.sh
#
# 3. Get the Client ID and Client Secret from the script output
#
# 4. Configure the OIDC provider manually:
#    docker exec nextcloud occ config:app:set sociallogin custom_oidc_name \
#      --value="Authentik"
#
#    docker exec nextcloud occ config:app:set sociallogin oidc_config_authentik \
#      --value='{"name":"Authentik","clientId":"YOUR_CLIENT_ID","clientSecret":"YOUR_CLIENT_SECRET","issuer":"https://auth.yourdomain.com/application/o/nextcloud/","authorization_endpoint":"https://auth.yourdomain.com/application/o/authorize/","token_endpoint":"https://auth.yourdomain.com/application/o/token/","userinfo_endpoint":"https://auth.yourdomain.com/application/o/userinfo/","end_session_endpoint":"https://auth.yourdomain.com/application/o/end-session/"}'
#
# 5. Enable the provider:
#    docker exec nextcloud occ config:app:set sociallogin providers --value='["authentik"]'
#
# 6. (Optional) Restrict to SSO only:
#    docker exec nextcloud occ config:app:set sociallogin disable_registration --value="true"
#    docker exec nextcloud occ config:app:set sociallogin allow_new_providers --value="false"
#
# Alternative: Use ForwardAuth middleware (simple but less integrated):
# Add this label to Nextcloud service to protect with Authentik SSO:
#   - "traefik.http.routers.nextcloud.middlewares=authentik@file"
