# =============================================================================
# Storage Stack - Nextcloud + MinIO + FileBrowser + Syncthing
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Nextcloud - Personal cloud storage
  # https://nextcloud.com/
  # Image: nextcloud:29.0.7-fpm-alpine
  # ---------------------------------------------------------------------------
  nextcloud:
    image: nextcloud:29.0.7-fpm-alpine
    container_name: nextcloud
    restart: unless-stopped
    environment:
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=${POSTGRES_USER:-nextcloud}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      - POSTGRES_HOST=homelab-postgres
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER:-admin}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD:?NEXTCLOUD_ADMIN_PASSWORD required}
      - NEXTCLOUD_TRUSTED_DOMAINS=cloud.${DOMAIN}
      - REDIS_HOST=homelab-redis
      - REDIS_HOST_PASSWORD=${REDIS_PASSWORD:-}
    volumes:
      - nextcloud-html:/var/www/html
      - nextcloud-data:/var/www/html/data
      - nextcloud-apps:/var/www/html/custom_apps
      - nextcloud-config:/var/www/html/config
      - ${STORAGE_ROOT:-/data/storage}:/storage:ro
    networks:
      - proxy
      - databases
    healthcheck:
      test: ["CMD", "php-fpm-healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    depends_on:
      nextcloud-nginx:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ---------------------------------------------------------------------------
  # Nextcloud Nginx - Web frontend for FPM
  # Image: nginx:1.27-alpine
  # ---------------------------------------------------------------------------
  nextcloud-nginx:
    image: nginx:1.27-alpine
    container_name: nextcloud-nginx
    restart: unless-stopped
    volumes:
      - nextcloud-html:/var/www/html:ro
      - nextcloud-data:/var/www/html/data:ro
      - nextcloud-apps:/var/www/html/custom_apps:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - traefik.enable=true
      - "traefik.http.routers.nextcloud.rule=Host(`cloud.${DOMAIN}`)"
      - traefik.http.routers.nextcloud.entrypoints=websecure
      - traefik.http.routers.nextcloud.tls=true
      - traefik.http.routers.nextcloud.tls.certresolver=myresolver
      - traefik.http.services.nextcloud.loadbalancer.server.port=80
      - traefik.http.middlewares.nextcloud.headers.stsSeconds=15552000
      - traefik.http.middlewares.nextcloud.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.nextcloud.headers.stsPreload=true
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

  # ---------------------------------------------------------------------------
  # MinIO - S3-compatible object storage
  # https://min.io/
  # Image: minio/minio:RELEASE.2024-09-22T00-33-43Z
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD required}
      - MINIO_BROWSER_REDIRECT_URL=https://minio.${DOMAIN}
    volumes:
      - minio-data:/data
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - traefik.enable=true
      # Console
      - "traefik.http.routers.minio-console.rule=Host(`minio.${DOMAIN}`)"
      - traefik.http.routers.minio-console.entrypoints=websecure
      - traefik.http.routers.minio-console.tls=true
      - traefik.http.routers.minio-console.tls.certresolver=myresolver
      - traefik.http.services.minio-console.loadbalancer.server.port=9001
      # API
      - "traefik.http.routers.minio-api.rule=Host(`s3.${DOMAIN}`)"
      - traefik.http.routers.minio-api.entrypoints=websecure
      - traefik.http.routers.minio-api.tls=true
      - traefik.http.routers.minio-api.tls.certresolver=myresolver
      - traefik.http.services.minio-api.loadbalancer.server.port=9000
      - com.centurylinklabs.watchtower.enable=true
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ---------------------------------------------------------------------------
  # FileBrowser - Lightweight file manager
  # https://filebrowser.org/
  # Image: filebrowser/filebrowser:v2.31.1
  # ---------------------------------------------------------------------------
  filebrowser:
    image: filebrowser/filebrowser:v2.31.1
    container_name: filebrowser
    restart: unless-stopped
    environment:
      - FB_ROOT=/srv
      - FB_PORT=80
      - FB_DATABASE=/database/filebrowser.db
      - FB_NOAUTH=${FILEBROWSER_NOAUTH:-false}
    volumes:
      - ${STORAGE_ROOT:-/data/storage}:/srv
      - filebrowser-db:/database
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - "traefik.http.routers.filebrowser.rule=Host(`files.${DOMAIN}`)"
      - traefik.http.routers.filebrowser.entrypoints=websecure
      - traefik.http.routers.filebrowser.tls=true
      - traefik.http.routers.filebrowser.tls.certresolver=myresolver
      - traefik.http.services.filebrowser.loadbalancer.server.port=80
      - com.centurylinklabs.watchtower.enable=true
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

  # ---------------------------------------------------------------------------
  # Syncthing - P2P file synchronization
  # https://syncthing.net/
  # Image: lscr.io/linuxserver/syncthing:1.27.11
  # ---------------------------------------------------------------------------
  syncthing:
    image: lscr.io/linuxserver/syncthing:1.27.11
    container_name: syncthing
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - syncthing-config:/config
      - ${STORAGE_ROOT:-/data/storage}:/data/storage
    networks:
      - proxy
    ports:
      - "22000:22000/tcp"
      - "22000:22000/udp"
      - "21027:21027/udp"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8384/rest/noauth/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - traefik.enable=true
      - "traefik.http.routers.syncthing.rule=Host(`syncthing.${DOMAIN}`)"
      - traefik.http.routers.syncthing.entrypoints=websecure
      - traefik.http.routers.syncthing.tls=true
      - traefik.http.routers.syncthing.tls.certresolver=myresolver
      - traefik.http.services.syncthing.loadbalancer.server.port=8384
      - com.centurylinklabs.watchtower.enable=true
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

networks:
  proxy:
    external: true
  databases:
    external: true

volumes:
  nextcloud-html:
  nextcloud-data:
  nextcloud-apps:
  nextcloud-config:
  minio-data:
  filebrowser-db:
  syncthing-config:
