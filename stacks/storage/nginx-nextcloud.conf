upstream php-handler {
    server nextcloud:9000;
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name cloud.${DOMAIN:-example.com};

    root /var/www/html;
    index index.php index.html;

    # Security headers
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header X-Robots-Tag              "noindex, nofollow" always;
    add_header Referrer-Policy            "no-referrer" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json
               application/xml text/xml application/xml+rss;

    # Max upload size (matches PHP)
    client_max_body_size 10G;
    client_body_timeout 3600s;

    location / {
        try_files $uri $uri/ /index.php$request_uri;
    }

    # PHP-FPM
    location ~ \.php(?:$|/.*) {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_pass php-handler;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        fastcgi_read_timeout 600s;
        fastcgi_buffering off;
        fastcgi_request_buffering off;
        fastcgi_param HTTPS on;
    }

    # Deny access to sensitive files
    location ~ /\.
    { deny all; }

    location ~ ^/(?:build|tests|config|lib|3rdparty|templates|data)/ {
        deny all;
    }

    location ~ \.(?:flv|mov|mpeg|mp4|avi|wmv|e2vp|webm|up|ogv)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Content-Type-Options "nosniff";
    }

    # Static asset caching
    location ~* \.(?:css|js|svg|gif|png|jpg|jpeg|ico|webp|ttf|otf|woff2)$ {
        add_header Cache-Control "public, max-age=15778463";
        try_files $uri /index.php$request_uri;
    }

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
}
