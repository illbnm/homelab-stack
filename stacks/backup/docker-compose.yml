services:
  # =============================================================================
  # Restic REST Server - 本地备份仓库
  # =============================================================================
  restic-rest-server:
    image: restic/rest-server:0.13.0
    container_name: restic-rest-server
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - restic-data:/data
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - OPTIONS=--append-only --private-repos
      - USERNAME=${RESTIC_USERNAME:-homelab}
      - PASSWORD=${RESTIC_PASSWORD:-changeme-restic}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.restic.rule=Host(`restic.${DOMAIN}`)"
      - traefik.http.routers.restic.entrypoints=websecure
      - traefik.http.routers.restic.tls=true
      - traefik.http.services.restic.loadbalancer.server.port=8000
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # =============================================================================
  # Duplicati - 加密云备份
  # =============================================================================
  duplicati:
    image: lscr.io/linuxserver/duplicati:2.0.8
    container_name: duplicati
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - duplicati-config:/config
      - duplicati-backups:/backups
      - ${BACKUP_SOURCE_PATH:-/data}:/source:ro
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - PUID=1000
      - PGID=1000
    labels:
      - traefik.enable=true
      - "traefik.http.routers.duplicati.rule=Host(`backup.${DOMAIN}`)"
      - traefik.http.routers.duplicati.entrypoints=websecure
      - traefik.http.routers.duplicati.tls=true
      - traefik.http.services.duplicati.loadbalancer.server.port=8200
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8200 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # =============================================================================
  # Ntfy - 备份通知服务
  # =============================================================================
  ntfy:
    image: binwiederhier/ntfy:v2.11.0
    container_name: ntfy
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - ntfy-cache:/var/cache/ntfy
      - ntfy-data:/var/lib/ntfy
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - NTFY_BASE_URL=https://ntfy.${DOMAIN}
    command: serve
    labels:
      - traefik.enable=true
      - "traefik.http.routers.ntfy.rule=Host(`ntfy.${DOMAIN}`)"
      - traefik.http.routers.ntfy.entrypoints=websecure
      - traefik.http.routers.ntfy.tls=true
      - traefik.http.services.ntfy.loadbalancer.server.port=80
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  proxy:
    external: true

volumes:
  restic-data:
    driver: local
    driver_opts:
      type: none
      device: ${RESTIC_DATA_PATH:-/opt/homelab-backups/restic}
      o: bind
  duplicati-config:
  duplicati-backups:
  ntfy-cache:
  ntfy-data:
