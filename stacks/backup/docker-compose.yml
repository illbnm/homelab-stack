services:
  duplicati:
    image: lscr.io/linuxserver/duplicati:2.0.8
    container_name: duplicati
    restart: unless-stopped
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Asia/Shanghai}
      DUPLICATI__WEBSERVICE_PASSWORD: ${DUPLICATI_PASSWORD}
      DUPLICATI__TARGET_CONFIG_URL: ${DUPLICATI_CONFIG_URL:-}
    volumes:
      - duplicati_config:/config
      - duplicati_backups:/backups
      - duplicati_source:/source
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.duplicati.rule=Host(`duplicati.${DOMAIN:-home.local}`)"
      - "traefik.http.routers.duplicati.entrypoints=websecure"
      - "traefik.http.services.duplicati.loadbalancer.server.port=8200"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  restic-rest-server:
    image: restic/rest-server:0.13.0
    container_name: restic-rest-server
    restart: unless-stopped
    command:
      - "--path"
      - "/data"
      - "--htpasswd-file"
      - "/config/.htpasswd"
      - "--listen"
      - ":8000"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - restic_data:/data
      - ./config:/config:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  duplicati_config:
  duplicati_backups:
  duplicati_source:
  restic_data:

networks:
  proxy:
    external: true
  internal:
    external: true
