# =============================================================================
# HomeLab Stack — Shared Database Layer
# Services: PostgreSQL (multi-tenant) + Redis (multi-db) + MariaDB
#           + pgAdmin (Postgres UI) + Redis Commander (Redis UI)
#
# Prerequisites:
#   1. cp .env.example .env && fill in required values
#   2. docker network create databases (if not auto-created)
#   3. docker network create proxy (if base stack not running)
#   4. docker compose up -d
#
# Network isolation: databases are on the internal 'databases' network.
# Only admin UIs (pgAdmin, Redis Commander) join 'proxy' for Traefik access.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — Multi-tenant Primary Database
  # Serves: Nextcloud, Gitea, Outline, Authentik, Grafana, Vaultwarden
  # Connection: postgresql://SERVICE_USER:PASSWORD@homelab-postgres:5432/SERVICE_DB
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16.4-alpine
    container_name: homelab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_ROOT_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
      POSTGRES_DB: postgres
      # Pass service passwords to init script
      NEXTCLOUD_DB_PASSWORD: ${NEXTCLOUD_DB_PASSWORD:-changeme_nextcloud}
      GITEA_DB_PASSWORD: ${GITEA_DB_PASSWORD:-changeme_gitea}
      OUTLINE_DB_PASSWORD: ${OUTLINE_DB_PASSWORD:-changeme_outline}
      AUTHENTIK_DB_PASSWORD: ${AUTHENTIK_DB_PASSWORD:-changeme_authentik}
      GRAFANA_DB_PASSWORD: ${GRAFANA_DB_PASSWORD:-changeme_grafana}
      VAULTWARDEN_DB_PASSWORD: ${VAULTWARDEN_DB_PASSWORD:-changeme_vaultwarden}
      BOOKSTACK_DB_PASSWORD: ${BOOKSTACK_DB_PASSWORD:-changeme_bookstack}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    networks:
      - databases
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ROOT_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=false"
      - "com.centurylinklabs.watchtower.enable=true"

  # ---------------------------------------------------------------------------
  # Redis — Shared Cache & Queue
  # DB allocation: 0=Authentik, 1=Outline, 2=Gitea, 3=Nextcloud, 4=Grafana
  # Connection: redis://:PASSWORD@homelab-redis:6379/DB_NUMBER
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4.0-alpine
    container_name: homelab-redis
    restart: unless-stopped
    command: >-
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --databases 16
    volumes:
      - redis-data:/data
    networks:
      - databases
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=false"
      - "com.centurylinklabs.watchtower.enable=true"

  # ---------------------------------------------------------------------------
  # MariaDB — MySQL-compatible Database
  # Serves: BookStack, Nextcloud (alternative to PostgreSQL)
  # Connection: mysql://SERVICE_USER:PASSWORD@homelab-mariadb:3306/SERVICE_DB
  # ---------------------------------------------------------------------------
  mariadb:
    image: mariadb:11.5.2
    container_name: homelab-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_AUTO_UPGRADE: "1"
      BOOKSTACK_DB_PASSWORD: ${BOOKSTACK_DB_PASSWORD:-changeme_bookstack}
      NEXTCLOUD_DB_PASSWORD: ${NEXTCLOUD_DB_PASSWORD:-changeme_nextcloud}
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./initdb-mysql:/docker-entrypoint-initdb.d:ro
    networks:
      - databases
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=false"
      - "com.centurylinklabs.watchtower.enable=true"

  # ---------------------------------------------------------------------------
  # pgAdmin — PostgreSQL Management UI
  # URL: https://pgadmin.${DOMAIN}
  # Login with PGADMIN_EMAIL / PGADMIN_PASSWORD
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:8.11
    container_name: homelab-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "True"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./config/pgadmin-servers.json:/pgadmin4/servers.json:ro
    networks:
      - databases
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pgadmin.rule=Host(`pgadmin.${DOMAIN}`)"
      - "traefik.http.routers.pgadmin.entrypoints=websecure"
      - "traefik.http.routers.pgadmin.tls.certresolver=letsencrypt"
      - "traefik.http.routers.pgadmin.middlewares=security-headers@file"
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/misc/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redis Commander — Redis Management UI
  # URL: https://redis-ui.${DOMAIN}
  # ---------------------------------------------------------------------------
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: homelab-redis-commander
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOSTS: "local:homelab-redis:6379:0:${REDIS_PASSWORD}"
      HTTP_USER: ${REDIS_COMMANDER_USER:-admin}
      HTTP_PASSWORD: ${REDIS_COMMANDER_PASSWORD}
    networks:
      - databases
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.redis-commander.rule=Host(`redis-ui.${DOMAIN}`)"
      - "traefik.http.routers.redis-commander.entrypoints=websecure"
      - "traefik.http.routers.redis-commander.tls.certresolver=letsencrypt"
      - "traefik.http.routers.redis-commander.middlewares=security-headers@file"
      - "traefik.http.services.redis-commander.loadbalancer.server.port=8081"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://127.0.0.1:8081/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# =============================================================================
# Networks
# 'databases' is shared across all stacks that need DB access.
# Services join it in their own compose files.
# 'proxy' is external — only admin UIs join it for Traefik routing.
# =============================================================================
networks:
  databases:
    name: databases
    driver: bridge
  proxy:
    external: true

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  mariadb-data:
    driver: local
  pgadmin-data:
    driver: local
