version: '3.8'

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16.4-alpine}
    container_name: postgres
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init.sh:ro
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_ROOT_PASSWORD}
      - TZ=${TZ:-Asia/Shanghai}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    shm_size: 128mb

  redis:
    image: ${REDIS_IMAGE:-redis:7.4.0-alpine}
    container_name: redis
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - redis-data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mariadb:
    image: ${MARIADB_IMAGE:-mariadb:11.5.2}
    container_name: mariadb
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - mariadb-data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - TZ=${TZ:-Asia/Shanghai}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: ${PGADMIN_IMAGE:-dpage/pgadmin4:8.11}
    container_name: pgadmin
    restart: unless-stopped
    networks:
      - internal
      - proxy
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    environment:
      - PGADMIN_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_PASSWORD=${PGADMIN_PASSWORD}
      - TZ=${TZ:-Asia/Shanghai}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pgadmin.rule=Host(`pgadmin.${DOMAIN}`)"
      - "traefik.http.routers.pgadmin.entrypoints=websecure"
      - "traefik.http.routers.pgadmin.tls=true"
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/misc/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-commander:
    image: ${REDIS_COMMANDER_IMAGE:-rediscommander/redis-commander:0.8.0}
    container_name: redis-commander
    restart: unless-stopped
    networks:
      - internal
      - proxy
    environment:
      - REDIS_HOSTS=local:redis:6379
      - TZ=${TZ:-Asia/Shanghai}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.redis-commander.rule=Host(`redis-commander.${DOMAIN}`)"
      - "traefik.http.routers.redis-commander.entrypoints=websecure"
      - "traefik.http.routers.redis-commander.tls=true"
      - "traefik.http.services.redis-commander.loadbalancer.server.port=8081"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  internal:
    name: internal
    driver: bridge
  proxy:
    name: proxy
    external: true

volumes:
  postgres-data:
  redis-data:
  mariadb-data:
  pgadmin-data:
