services:
  db-postgres:
    image: postgres:16.4-alpine
    container_name: db-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - NEXTCLOUD_DB_PASSWORD=${NEXTCLOUD_DB_PASSWORD}
      - GITEA_DB_PASSWORD=${GITEA_DB_PASSWORD}
      - OUTLINE_DB_PASSWORD=${OUTLINE_DB_PASSWORD}
      - AUTHENTIK_DB_PASSWORD=${AUTHENTIK_DB_PASSWORD}
      - GRAFANA_DB_PASSWORD=${GRAFANA_DB_PASSWORD}
    volumes:
      # Restore data persistence for production use
      - postgres-data:/var/lib/postgresql/data
      - ../../scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    networks:
      - internal

  db-redis:
    image: redis:7.4.0-alpine
    container_name: db-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - internal

  db-mariadb:
    image: mariadb:11.5.2
    container_name: db-mariadb
    restart: unless-stopped
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - internal

  pgadmin:
    image: dpage/pgadmin4:8.11
    container_name: pgadmin
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
      - PGADMIN_CONFIG_SERVER_MODE=False
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pgadmin.rule=Host(`pgadmin.${DOMAIN}`)"
    depends_on:
      - db-postgres

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:db-redis:6379:${REDIS_PASSWORD}
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.redis-commander.rule=Host(`redis.${DOMAIN}`)"
    depends_on:
      - db-redis

volumes:
  postgres-data:
  redis-data:
  mariadb-data:

networks:
  internal:
    name: internal
    driver: bridge
  proxy:
    external: true

