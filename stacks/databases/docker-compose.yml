# =============================================================================
# HomeLab Stack — Databases (Shared Instance)
# PostgreSQL 16 + Redis 7 + MariaDB 11 + pgAdmin + Redis Commander
# =============================================================================
# Usage:
#   docker compose -f stacks/databases/docker-compose.yml --env-file .env up -d
#
# All database services live on the "internal" network only.
# Management UIs (pgAdmin, Redis Commander) also join "proxy" for Traefik.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — Primary multi-tenant database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16.4-alpine
    container_name: homelab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD:?POSTGRES_ROOT_PASSWORD is required}
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      # Performance tuning
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      # Per-service passwords (consumed by init-databases.sh)
      NEXTCLOUD_DB_PASSWORD: ${NEXTCLOUD_DB_PASSWORD:?NEXTCLOUD_DB_PASSWORD is required}
      GITEA_DB_PASSWORD: ${GITEA_DB_PASSWORD:?GITEA_DB_PASSWORD is required}
      OUTLINE_DB_PASSWORD: ${OUTLINE_DB_PASSWORD:?OUTLINE_DB_PASSWORD is required}
      AUTHENTIK_DB_PASSWORD: ${AUTHENTIK_DB_PASSWORD:?AUTHENTIK_DB_PASSWORD is required}
      GRAFANA_DB_PASSWORD: ${GRAFANA_DB_PASSWORD:?GRAFANA_DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/10-init-databases.sh:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Redis — Shared cache / queue (multi-DB isolation)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4.0-alpine
    container_name: homelab-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --databases 16
      --save 900 1
      --save 300 10
      --save 60 10000
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # MariaDB — MySQL-compatible database (Nextcloud optional)
  # ---------------------------------------------------------------------------
  mariadb:
    image: mariadb:11.5.2
    container_name: homelab-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?MARIADB_ROOT_PASSWORD is required}
      MARIADB_AUTO_UPGRADE: "1"
      MARIADB_DISABLE_UPGRADE_BACKUP: "1"
      # Per-service passwords (consumed by init-mariadb.sh)
      NEXTCLOUD_MARIADB_PASSWORD: ${NEXTCLOUD_MARIADB_PASSWORD:-nextcloud}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./scripts/init-mariadb.sh:/docker-entrypoint-initdb.d/10-init-mariadb.sh:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # pgAdmin — PostgreSQL management UI
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:8.11
    container_name: homelab-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:?PGADMIN_EMAIL is required}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?PGADMIN_PASSWORD is required}
      PGADMIN_CONFIG_SERVER_MODE: "True"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./config/pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - internal
      - proxy
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pgadmin.rule=Host(`pgadmin.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.pgadmin.entrypoints=websecure"
      - "traefik.http.routers.pgadmin.tls=true"
      - "traefik.http.routers.pgadmin.tls.certresolver=letsencrypt"
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/misc/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Redis Commander — Redis management UI
  # ---------------------------------------------------------------------------
  redis-commander:
    image: rediscommander/redis-commander:latest-sha
    container_name: homelab-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "local:redis:6379:0:${REDIS_PASSWORD}"
      HTTP_USER: ${REDIS_COMMANDER_USER:-admin}
      HTTP_PASSWORD: ${REDIS_COMMANDER_PASSWORD:-${REDIS_PASSWORD}}
    networks:
      - internal
      - proxy
    depends_on:
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.redis-commander.rule=Host(`redis.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.redis-commander.entrypoints=websecure"
      - "traefik.http.routers.redis-commander.tls=true"
      - "traefik.http.routers.redis-commander.tls.certresolver=letsencrypt"
      - "traefik.http.services.redis-commander.loadbalancer.server.port=8081"
      - "traefik.docker.network=proxy"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# =============================================================================
# Volumes — Named volumes for persistent data
# =============================================================================
volumes:
  postgres_data:
    driver: local
    name: homelab_postgres_data
  redis_data:
    driver: local
    name: homelab_redis_data
  mariadb_data:
    driver: local
    name: homelab_mariadb_data
  pgadmin_data:
    driver: local
    name: homelab_pgadmin_data

# =============================================================================
# Networks
# =============================================================================
networks:
  internal:
    external: true
    name: internal
  proxy:
    external: true
    name: proxy
