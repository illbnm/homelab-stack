services:
  # =============================================================================
  # PostgreSQL - Primary relational database
  # https://www.postgresql.org/
  # =============================================================================
  postgres:
    image: postgres:16.4-alpine
    container_name: homelab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_ROOT_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD:?POSTGRES_ROOT_PASSWORD is required}
      POSTGRES_DB: postgres
      # Pass database passwords for init script
      NEXTCLOUD_DB_PASSWORD: ${NEXTCLOUD_DB_PASSWORD:-}
      GITEA_DB_PASSWORD: ${GITEA_DB_PASSWORD:-}
      OUTLINE_DB_PASSWORD: ${OUTLINE_DB_PASSWORD:-}
      AUTHENTIK_DB_PASSWORD: ${AUTHENTIK_DB_PASSWORD:-}
      GRAFANA_DB_PASSWORD: ${GRAFANA_DB_PASSWORD:-}
      VAULTWARDEN_DB_PASSWORD: ${VAULTWARDEN_DB_PASSWORD:-}
      BOOKSTACK_DB_PASSWORD: ${BOOKSTACK_DB_PASSWORD:-}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    networks:
      - databases
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ROOT_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=false"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # Redis - In-memory data store (cache, sessions, queues)
  # https://redis.io/
  # Database allocation:
  #   DB 0: Authentik
  #   DB 1: Outline
  #   DB 2: Gitea
  #   DB 3: Nextcloud
  #   DB 4: Grafana sessions
  # =============================================================================
  redis:
    image: redis:7.4.0-alpine
    container_name: homelab-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    volumes:
      - redis-data:/data
    networks:
      - databases
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=false"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # MariaDB - MySQL-compatible database
  # https://mariadb.org/
  # For services that prefer MySQL (Nextcloud, BookStack, etc.)
  # =============================================================================
  mariadb:
    image: mariadb:11.5.2
    container_name: homelab-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?MARIADB_ROOT_PASSWORD is required}
      MARIADB_AUTO_UPGRADE: "1"
      MARIADB_INITDB_SKIP_TZINFO: "1"
      # Pass database passwords for init script
      NEXTCLOUD_DB_PASSWORD: ${NEXTCLOUD_DB_PASSWORD:-}
      BOOKSTACK_DB_PASSWORD: ${BOOKSTACK_DB_PASSWORD:-}
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./initdb-mysql:/docker-entrypoint-initdb.d:ro
    networks:
      - databases
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=false"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # pgAdmin - PostgreSQL management UI
  # https://www.pgadmin.org/
  # Access: https://pgadmin.${DOMAIN}
  # =============================================================================
  pgadmin:
    image: dpage/pgadmin4:8.11
    container_name: homelab-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@${DOMAIN}}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?PGADMIN_PASSWORD is required}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_LISTEN_PORT: 80
      # Pre-configure server connection
      PGADMIN_CONFIG_CONFIG_DATABASE_URI: "postgresql://postgres:${POSTGRES_ROOT_PASSWORD}@postgres:5432/postgres"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - databases
      - proxy
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/misc/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - traefik.enable=true
      - "traefik.http.routers.pgadmin.rule=Host(`pgadmin.${DOMAIN}`)"
      - traefik.http.routers.pgadmin.entrypoints=websecure
      - traefik.http.routers.pgadmin.tls=true
      - traefik.http.routers.pgadmin.tls.certresolver=letsencrypt
      - traefik.http.services.pgadmin.loadbalancer.server.port=80
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # Redis Commander - Redis management UI
  # https://github.com/joeferner/redis-commander
  # Access: https://redis.${DOMAIN}
  # =============================================================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: homelab-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD}
      HTTP_USER: ${REDIS_COMMANDER_USER:-admin}
      HTTP_PASSWORD: ${REDIS_COMMANDER_PASSWORD:-${REDIS_PASSWORD}}
      NO_LOG_DATA: "true"
    networks:
      - databases
      - proxy
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - traefik.enable=true
      - "traefik.http.routers.redis-cmd.rule=Host(`redis.${DOMAIN}`)"
      - traefik.http.routers.redis-cmd.entrypoints=websecure
      - traefik.http.routers.redis-cmd.tls=true
      - traefik.http.routers.redis-cmd.tls.certresolver=letsencrypt
      - traefik.http.services.redis-cmd.loadbalancer.server.port=8081
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres-data:
  redis-data:
  mariadb-data:
  pgadmin-data:

networks:
  databases:
    name: databases
    driver: bridge
  proxy:
    external: true