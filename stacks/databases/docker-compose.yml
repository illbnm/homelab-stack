services:
  postgres:
    image: postgres:16-alpine
    container_name: homelab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_ROOT_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    networks:
      - databases
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ROOT_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=false"

  redis:
    image: redis:7-alpine
    container_name: homelab-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - databases
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=false"

  mariadb:
    image: mariadb:11.4
    container_name: homelab-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_AUTO_UPGRADE: "1"
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./initdb-mysql:/docker-entrypoint-initdb.d:ro
    networks:
      - databases
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=false"

  pgadmin:
    image: dpage/pgadmin4:8.11
    container_name: homelab-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@${DOMAIN}}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-changeme}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - databases
      - proxy
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - "traefik.http.routers.pgadmin.rule=Host(`pgadmin.${DOMAIN}`)"
      - traefik.http.routers.pgadmin.entrypoints=websecure
      - traefik.http.routers.pgadmin.tls=true
      - traefik.http.services.pgadmin.loadbalancer.server.port=80
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/misc/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: homelab-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "local:homelab-redis:6379:0:${REDIS_PASSWORD}"
    networks:
      - databases
      - proxy
    depends_on:
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - "traefik.http.routers.redis-cmd.rule=Host(`redis.${DOMAIN}`)"
      - traefik.http.routers.redis-cmd.entrypoints=websecure
      - traefik.http.routers.redis-cmd.tls=true
      - traefik.http.services.redis-cmd.loadbalancer.server.port=8081
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8081/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres-data:
  redis-data:
  mariadb-data:
  pgadmin-data:

networks:
  databases:
    name: databases
    driver: bridge
  proxy:
    external: true
