# =============================================================================
# HomeLab Stack — Base Infrastructure
# Services: Traefik + Portainer + Watchtower + Docker Socket Proxy
#
# Prerequisites:
#   1. cp .env.example .env && fill in required values
#   2. ./scripts/check-deps.sh
#   3. docker network create proxy
#   4. touch config/traefik/acme.json && chmod 600 config/traefik/acme.json
#   5. docker compose up -d
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Docker Socket Proxy — Security Isolation Layer
  # Restricts Docker API access for Traefik and other services
  # Docs: https://github.com/tecnativa/docker-socket-proxy
  # ---------------------------------------------------------------------------
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.2.0
    container_name: socket-proxy
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - LOG_LEVEL=warning
      # Allow only necessary API endpoints (read-only for Traefik)
      - CONTAINERS=1      # List/start/stop containers
      - SERVICES=0        # Block Swarm services
      - TASKS=1           # Read tasks
      - SECRETS=0         # Block secrets
      - PLUGINS=0         # Block plugins
      - NETWORKS=1        # Read networks
      - VOLUMES=1         # Read volumes
      - IMAGES=1          # Read images
      - INFO=1            # Read system info
      - EVENTS=1          # Subscribe to events
      - PING=1            # Health check endpoint
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2375"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Traefik — Reverse Proxy & TLS Termination
  # Dashboard: https://traefik.${DOMAIN}
  # Docs: https://doc.traefik.io/traefik/
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.1.6
    container_name: traefik
    restart: unless-stopped
    networks:
      - proxy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - TZ=${TZ}
      - DOCKER_HOST=tcp://socket-proxy:2375
    volumes:
      - ../../config/traefik/traefik.yml:/traefik.yml:ro
      - ../../config/traefik/dynamic:/dynamic:ro
      - ../../config/traefik/acme.json:/acme.json
      - traefik-logs:/var/log/traefik
    depends_on:
      socket-proxy:
        condition: service_healthy
    labels:
      # Enable Traefik for this container
      - "traefik.enable=true"
      # Router: HTTPS dashboard
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      # Protect dashboard with BasicAuth
      - "traefik.http.routers.traefik-dashboard.middlewares=traefik-auth@file,security-headers@file"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Portainer — Docker Management UI
  # URL: https://portainer.${DOMAIN}
  # First login: set admin password within 5 minutes
  # Uses socket-proxy for secure Docker API access
  # ---------------------------------------------------------------------------
  portainer:
    image: portainer/portainer-ce:2.21.4
    container_name: portainer
    restart: unless-stopped
    networks:
      - proxy
    environment:
      - DOCKER_HOST=tcp://socket-proxy:2375
    volumes:
      - portainer-data:/data
    depends_on:
      socket-proxy:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.${DOMAIN}`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls.certresolver=letsencrypt"
      - "traefik.http.routers.portainer.service=portainer"
      - "traefik.http.routers.portainer.middlewares=security-headers@file"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
    healthcheck:
      test: ["CMD", "/portainer", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Watchtower — Automatic Container Updates
  # Checks for image updates daily at 3:00 AM
  # Notifications sent via Gotify/ntfy (integrates with Notifications Stack)
  # Uses socket-proxy for secure Docker API access
  # ---------------------------------------------------------------------------
  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: watchtower
    restart: unless-stopped
    networks:
      - proxy
    environment:
      - TZ=${TZ}
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_SCHEDULE=0 0 3 * * *
      - WATCHTOWER_TIMEOUT=60s
      - WATCHTOWER_NOTIFICATIONS_LEVEL=warn
      # Scope: only update containers with this label
      - WATCHTOWER_LABEL_ENABLE=true
      - DOCKER_HOST=tcp://socket-proxy:2375
      - DOCKER_API_VERSION=1.44
      # Notification integration (optional — works with Notifications Stack)
      - WATCHTOWER_NOTIFICATIONS=gotify,ntfy
      - WATCHTOWER_NOTIFICATION_GOTIFY_URL=${GOTIFY_URL:-http://gotify:80}
      - WATCHTOWER_NOTIFICATION_GOTIFY_TOKEN=${GOTIFY_TOKEN:-}
      - WATCHTOWER_NOTIFICATION_NTFY_SERVER_URL=${NTFY_URL:-https://ntfy.sh}
      - WATCHTOWER_NOTIFICATION_NTFY_TOPIC=${NTFY_TOPIC:-homelab-updates}
    volumes:
      - watchtower-data:/tmp/watchtower
    depends_on:
      socket-proxy:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "/watchtower", "--health-check"]
      interval: 30s
      timeout: 10s
      retries: 3

# =============================================================================
# Networks
# NOTE: 'proxy' network is EXTERNAL — create it before first run:
#   docker network create proxy
# All other stacks join this network to be accessible via Traefik.
# =============================================================================
networks:
  proxy:
    external: true

# =============================================================================
# Volumes
# =============================================================================
volumes:
  portainer-data:
    driver: local
  traefik-logs:
    driver: local
  watchtower-data:
    driver: local
