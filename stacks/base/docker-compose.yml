---
# Base Infrastructure Stack
# Services: Traefik v3, Portainer CE, Watchtower, Docker Socket Proxy
# All other stacks depend on this stack being running first.

networks:
  proxy:
    name: proxy
    driver: bridge
  socket_proxy:
    name: socket_proxy
    driver: bridge
    internal: true

volumes:
  portainer_data:
  traefik_acme:

services:
  # ─────────────────────────────────────────────
  # Docker Socket Proxy — exposes minimal Docker API to Traefik safely
  # ─────────────────────────────────────────────
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.2.0
    container_name: socket-proxy
    restart: unless-stopped
    networks:
      - socket_proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      SERVICES: 1
      TASKS: 1
      NETWORKS: 1
      EVENTS: 1
      PING: 1
      VERSION: 1
      INFO: 0
      IMAGES: 0
      VOLUMES: 0
      AUTH: 0
      SECRETS: 0
      POST: 0
    labels:
      com.centurylinklabs.watchtower.enable: "false"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:2375/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─────────────────────────────────────────────
  # Traefik v3 — reverse proxy + automatic TLS
  # ─────────────────────────────────────────────
  traefik:
    image: traefik:v3.1.6
    container_name: traefik
    restart: unless-stopped
    depends_on:
      socket-proxy:
        condition: service_healthy
    networks:
      - proxy
      - socket_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../../config/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ../../config/traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik_acme:/acme
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    labels:
      traefik.enable: "true"
      traefik.http.routers.traefik-dashboard.rule: "Host(`traefik.${DOMAIN}`)"
      traefik.http.routers.traefik-dashboard.entrypoints: "websecure"
      traefik.http.routers.traefik-dashboard.tls: "true"
      traefik.http.routers.traefik-dashboard.tls.certresolver: "letsencrypt"
      traefik.http.routers.traefik-dashboard.service: "api@internal"
      traefik.http.routers.traefik-dashboard.middlewares: "traefik-auth@file"
      # Redirect http -> https
      traefik.http.routers.http-catchall.rule: "HostRegexp(`{host:.+}`)"
      traefik.http.routers.http-catchall.entrypoints: "web"
      traefik.http.routers.http-catchall.middlewares: "redirect-to-https@file"
      com.centurylinklabs.watchtower.enable: "true"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─────────────────────────────────────────────
  # Portainer CE — Docker management UI
  # ─────────────────────────────────────────────
  portainer:
    image: portainer/portainer-ce:2.21.3
    container_name: portainer
    restart: unless-stopped
    depends_on:
      traefik:
        condition: service_healthy
    networks:
      - proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    labels:
      traefik.enable: "true"
      traefik.http.routers.portainer.rule: "Host(`portainer.${DOMAIN}`)"
      traefik.http.routers.portainer.entrypoints: "websecure"
      traefik.http.routers.portainer.tls: "true"
      traefik.http.routers.portainer.tls.certresolver: "letsencrypt"
      traefik.http.services.portainer.loadbalancer.server.port: "9000"
      com.centurylinklabs.watchtower.enable: "true"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:9000/api/system/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────
  # Watchtower — automated container updates
  # ─────────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      WATCHTOWER_SCHEDULE: "0 0 3 * * *"   # 3 AM daily
      WATCHTOWER_LABEL_ENABLE: "true"       # only update containers with watchtower label
      WATCHTOWER_CLEANUP: "true"            # remove old images
      WATCHTOWER_ROLLING_RESTART: "true"
      WATCHTOWER_TIMEOUT: "60"
      # Notifications (optional — configure in .env)
      WATCHTOWER_NOTIFICATION_URL: ${WATCHTOWER_NOTIFICATION_URL:-}
    labels:
      com.centurylinklabs.watchtower.enable: "false"  # don't self-update
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8080/v1/update"]
      interval: 60s
      timeout: 10s
      retries: 2
      start_period: 30s
