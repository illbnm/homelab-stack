# =============================================================================
# HomeLab Stack — Base Infrastructure
# Services: Traefik (reverse proxy) + Portainer (container management)
#           + Watchtower (auto-updates) + Docker Socket Proxy (security)
#
# Prerequisites:
#   1. cp .env.example .env && fill in required values
#   2. ./scripts/check-deps.sh
#   3. docker network create proxy
#   4. touch config/traefik/acme.json && chmod 600 config/traefik/acme.json
#   5. docker compose up -d
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Docker Socket Proxy — Secure Docker API Access
  # Isolates Docker socket access, only exposing necessary API endpoints.
  # Traefik and Watchtower connect here instead of direct socket access.
  # Docs: https://github.com/Tecnativa/docker-socket-proxy
  # ---------------------------------------------------------------------------
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.2.0
    container_name: docker-socket-proxy
    restart: unless-stopped
    networks:
      - proxy
    environment:
      # Logging
      - LOG_LEVEL=warn
      # Permissions: read-only access to what Traefik/Watchtower need
      - CONTAINERS=1          # List/inspect containers
      - SERVICES=1            # List services (swarm)
      - TASKS=1               # List tasks (swarm)
      - IMAGES=1              # List/pull images (Watchtower needs this)
      - NETWORKS=1            # List networks
      - VOLUMES=1             # List volumes
      - POST=0                # Disable POST (no create/update)
      - DELETE=0              # Disable DELETE
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2375/_ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ---------------------------------------------------------------------------
  # Traefik — Reverse Proxy & TLS Termination
  # Dashboard: https://traefik.${DOMAIN}
  # Docs: https://doc.traefik.io/traefik/
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.1.6
    container_name: traefik
    restart: unless-stopped
    networks:
      - proxy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - TZ=${TZ}
    volumes:
      # Use socket proxy instead of direct Docker socket
      - ../../config/traefik/traefik.yml:/traefik.yml:ro
      - ../../config/traefik/dynamic:/dynamic:ro
      - ../../config/traefik/acme.json:/acme.json
      - traefik-logs:/var/log/traefik
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
    labels:
      # Enable Traefik for this container
      - "traefik.enable=true"
      # Router: HTTPS dashboard
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      # Protect dashboard with BasicAuth
      - "traefik.http.routers.traefik-dashboard.middlewares=traefik-auth@file,security-headers@file"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Portainer — Docker Management UI
  # URL: https://portainer.${DOMAIN}
  # First login: set admin password within 5 minutes
  # ---------------------------------------------------------------------------
  portainer:
    image: portainer/portainer-ce:2.21.4
    container_name: portainer
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      # Portainer needs full Docker access for management operations
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer-data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.${DOMAIN}`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls.certresolver=letsencrypt"
      - "traefik.http.routers.portainer.service=portainer"
      - "traefik.http.routers.portainer.middlewares=security-headers@file"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "/portainer", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Watchtower — Automatic Container Updates
  # Checks for image updates daily at 3:00 AM (configurable via .env)
  # Notifications sent via Gotify/ntfy (integrate with Notifications Stack)
  # ---------------------------------------------------------------------------
  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: watchtower
    restart: unless-stopped
    networks:
      - proxy
    environment:
      - TZ=${TZ}
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
      # Schedule: 3:00 AM daily (configurable)
      - WATCHTOWER_SCHEDULE=0 0 3 * * *
      - WATCHTOWER_TIMEOUT=60s
      - WATCHTOWER_NOTIFICATIONS_LEVEL=info
      # Scope: only update containers with this label
      - WATCHTOWER_LABEL_ENABLE=true
      - DOCKER_API_VERSION=1.44
      # Notification URL (optional - set in .env for Gotify/ntfy)
      - WATCHTOWER_NOTIFICATION_URL=${WATCHTOWER_NOTIFICATION_URL:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "/watchtower", "--health-check"]
      interval: 30s
      timeout: 10s
      retries: 3

# =============================================================================
# Networks
# NOTE: 'proxy' network is EXTERNAL — create it before first run:
#   docker network create proxy
# All other stacks join this network to be accessible via Traefik.
# =============================================================================
networks:
  proxy:
    external: true

# =============================================================================
# Volumes
# =============================================================================
volumes:
  portainer-data:
    driver: local
  traefik-logs:
    driver: local
