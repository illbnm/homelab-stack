version: "3.8"

# Create external network first with: docker network create proxy
networks:
  proxy:
    external: true

services:
  # Traefik reverse proxy
  traefik:
    image: traefik:v3.1.6
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    ports:
      - 80:80
      - 443:443
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      - ${ACME_PATH:-./acme}:/acme
      - ${CONFIG_PATH}/traefik:/config
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN}`)
      - traefik.http.routers.traefik-dashboard.service=api@internal
      - traefik.http.routers.traefik-dashboard.entrypoints=https
      - traefik.http.routers.traefik-dashboard.tls=true
      - traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt
      - traefik.http.routers.traefik-dashboard.middlewares=traefik-auth
      - traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_AUTH}
      - traefik.http.routers.traefik-dashboard.middlewares=security-headers@file
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Docker Socket Proxy - security proxy for Docker socket
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.2.0
    container_name: socket-proxy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    environment:
      - CONTAINERS=1
      - SERVICES=1
      - TASKS=1
      - VERSION=1
      - NETWORKS=1
      - PLUGINS=0
      - NODES=0
      - SWARM=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:2375/version"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Portainer - Docker management UI
  portainer:
    image: portainer/portainer-ce:2.21.3
    container_name: portainer
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    depends_on:
      - socket-proxy
    environment:
      - TZ=${TZ}
      # OAuth Authentication (Authentik)
      - EDGE_AGENT=false
      # Enable OAuth
      - AUTHENTICATION=${PORTAINER_AUTHENTICATION:-standard}
      # Authentik OAuth2/OIDC settings
      - OAUTH_CLIENT_ID=${PORTAINER_OAUTH_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${PORTAINER_OAUTH_CLIENT_SECRET}
      - OAUTH_REDIRECT_URL=https://portainer.${DOMAIN}/"
      - OAUTH_LOGOUT_URL=${PORTAINER_OAUTH_LOGOUT_URL:-}
      # OAuth provider settings
      - OAUTH_PROVIDER=${PORTAINER_OAUTH_PROVIDER:-OIDC}
      - OAUTH_AUTO_PROVISION=${PORTAINER_OAUTH_AUTO_PROVISION:-true}
      - OAUTH_AUTO_PROVISION_EFFICIENT=${PORTAINER_OAUTH_AUTO_PROVISION_EFFICIENT:-false}
      # User role mapping (if using OpenID)
      - OAUTH_DEFAULT_ADMIN_ROLE=${PORTAINER_OAUTH_DEFAULT_ADMIN_ROLE:-standard}
      # Override settings for OIDC
      - OAUTH_OIDC_ISSUER=${AUTHENTIK_DOMAIN}/application/o/portainer/
      # Optional: restrict to specific email domains
      # - OAUTH_EMAIL_DOMAIN=${PORTAINER_OAUTH_EMAIL_DOMAIN:-}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${PORTAINER_DATA:-./portainer-data}:/data
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - traefik.enable=true
      - traefik.http.routers.portainer.rule=Host(`portainer.${DOMAIN}`)
      - traefik.http.routers.portainer.entrypoints=https
      - traefik.http.routers.portainer.tls=true
      - traefik.http.routers.portainer.tls.certresolver=letsencrypt
      - traefik.http.services.portainer.loadbalancer.server.port=9000
      - traefik.http.routers.portainer.middlewares=security-headers@file
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9000"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Watchtower - automatic container updates
  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: watchtower
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    depends_on:
      - socket-proxy
    environment:
      - TZ=${TZ}
      - WATCHTOWER_POLL_INTERVAL=86400
      - WATCHTOWER_SCHEDULE=0 0 3 * * *
      - WATCHTOWER_LABEL_ENABLE=true
      # Notification settings (optional, for Notifications stack integration)
      # - WATCHTOWER_NOTIFICATIONS=gotify
      # - WATCHTOWER_NOTIFICATION_GOTIFY_URL=${GOTIFY_URL}
      # - WATCHTOWER_NOTIFICATION_GOTIFY_TOKEN=${GOTIFY_TOKEN}
      # - WATCHTOWER_NOTIFICATION_TITLE_TAG=[Watchtower]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - traefik.enable=false
    healthcheck:
      test: ["CMD", "watchtower", "--version"] || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

# Portainer OAuth (Authentik) Setup Instructions
# ===============================================
#
# Portainer supports OIDC authentication via OAuth2/OpenID Connect.
# To enable OAuth login with Authentik:
#
# 1. Ensure the Portainer OAuth provider was created by running:
#    ./scripts/setup-authentik.sh
#
# 2. Set the following environment variables in .env:
#    PORTAINER_AUTHENTICATION=oidc
#    PORTAINER_OAUTH_CLIENT_ID=<from setup-authentik.sh output>
#    PORTAINER_OAUTH_CLIENT_SECRET=<from setup-authentik.sh output>
#    PORTAINER_OAUTH_LOGOUT_URL=https://auth.yourdomain.com/application/o/portainer/end-session/
#
# 3. Restart Portainer:
#    docker compose -f stacks/base/docker-compose.yml up -d portainer
#
# 4. Login via OAuth:
#    - Access Portainer at https://portainer.yourdomain.com
#    - Click "Login with Authentik" or use the admin credentials first
#    - The first user to login via OAuth will be created as admin
#
# 5. (Optional) Restrict access to specific email domains:
#    PORTAINER_OAUTH_EMAIL_DOMAIN=yourdomain.com
#
# 6. (Optional) Set default role for new OAuth users:
#    PORTAINER_OAUTH_DEFAULT_ADMIN_ROLE=standard  # regular user, not admin
