---
# ntfy server configuration
# https://github.com/binwiederhier/ntfy

#基础设置
base-url: "https://ntfy.${DOMAIN}"
listen: ":80"
cache-file: /var/cache/ntfy/cache.db
auth-file: /var/lib/ntfy/user.db

#访问控制
auth-default-access: deny-all

#代理设置（Traefik处理SSL）
behind-proxy: true

#匿名访问（可发布，无账户）
enable-anon: true
anon-scope: ",ps-sh-all"

#邮件（可选）
#smtp-sender-addr: "smtp.example.com:587"
#smtp-sender-user: "notify"
#smtp-sender-password: "REPLACE_WITH_PASSWORD"

# Firebase（可选，APP推送用）
#firebase-key-file: /etc/ntfy/firebase.json

#附件存储（可选）
#attachment-cache-dir: /var/cache/ntfy/attachments

#日志
log-level: warn

#连接限制
max-body-size: 262144

#访问令牌（API密钥）
#auth-passwd-file: /etc/ntfy/auth.db
