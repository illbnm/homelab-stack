# =============================================================================
# Notifications Stack - ntfy + Gotify
# Unified notification center for all homelab services
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # ntfy - Primary push notification server
  # https://ntfy.sh/
  # ---------------------------------------------------------------------------
  ntfy:
    image: binwiederhier/ntfy:v2.11.0
    container_name: ntfy
    restart: unless-stopped
    networks:
      - proxy
      - notifications
    volumes:
      - ntfy-data:/var/lib/ntfy
      - ntfy-cache:/var/cache/ntfy
      - ../../config/ntfy/server.yml:/etc/ntfy/server.yml:ro
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - NTFY_BASE_URL=https://ntfy.${DOMAIN}
    command: serve /etc/ntfy/server.yml
    labels:
      - traefik.enable=true
      - "traefik.http.routers.ntfy.rule=Host(`ntfy.${DOMAIN}`)"
      - traefik.http.routers.ntfy.entrypoints=websecure
      - traefik.http.routers.ntfy.tls=true
      - traefik.http.routers.ntfy.tls.certresolver=myresolver
      - traefik.http.services.ntfy.loadbalancer.server.port=80
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:80/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Gotify - Backup/alternative push notification server
  # https://gotify.net/
  # ---------------------------------------------------------------------------
  gotify:
    image: gotify/server:2.5.0
    container_name: gotify
    restart: unless-stopped
    networks:
      - proxy
      - notifications
    volumes:
      - gotify-data:/app/data
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.gotify.rule=Host(`gotify.${DOMAIN}`)"
      - traefik.http.routers.gotify.entrypoints=websecure
      - traefik.http.routers.gotify.tls=true
      - traefik.http.routers.gotify.tls.certresolver=myresolver
      - traefik.http.services.gotify.loadbalancer.server.port=80
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  proxy:
    external: true
  notifications:
    driver: bridge

volumes:
  ntfy-data:
  ntfy-cache:
  gotify-data:
