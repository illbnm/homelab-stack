version: '3.8'

services:
  ntfy:
    image: binwiederhier/ntfy:v2.11.0
    container_name: ntfy
    restart: unless-stopped
    command: serve --config /etc/ntfy/server.yml
    ports:
      - "${NTFY_PORT:-8086}:80"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - ntfy-cache:/var/cache/ntfy
      - ntfy-data:/var/lib/ntfy
      - ./config/ntfy/server.yml:/etc/ntfy/server.yml:ro
    networks:
      - homelab
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/-/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ntfy.rule=Host(`ntfy.${DOMAIN}`)"
      - "traefik.http.routers.ntfy.entrypoints=websecure"
      - "traefik.http.routers.ntfy.tls.certresolver=letsencrypt"
      - "traefik.http.services.ntfy.loadbalancer.server.port=80"
      - "com.centurylinklabs.watchtower.enable=true"

  gotify:
    image: gotify/server:2.5.0
    container_name: gotify
    restart: unless-stopped
    ports:
      - "${GOTIFY_PORT:-8087}:80"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - GOTIFY_DEFAULTUSER_NAME=admin
      - GOTIFY_DEFAULTUSER_PASSWORD=${GOTIFY_PASSWORD:-changeme}
    volumes:
      - gotify-data:/app/data
    networks:
      - homelab
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/-/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gotify.rule=Host(`gotify.${DOMAIN}`)"
      - "traefik.http.routers.gotify.entrypoints=websecure"
      - "traefik.http.routers.gotify.tls.certresolver=letsencrypt"
      - "traefik.http.services.gotify.loadbalancer.server.port=80"
      - "com.centurylinklabs.watchtower.enable=true"

networks:
  homelab:
    external: true

volumes:
  ntfy-cache:
  ntfy-data:
  gotify-data:
