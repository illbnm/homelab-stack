version: '3.8'

services:
  ntfy:
    image: binwiederhier/ntfy:v2.11.0
    container_name: ntfy
    restart: unless-stopped
    command:
      - serve
      - --config=/etc/ntfy/server.yml
      - --cache-file=/var/cache/ntfy/cache.db
      - --auth-file=/var/lib/ntfy/user.db
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ./config/ntfy/server.yml:/etc/ntfy/server.yml:ro
      - ntfy_cache:/var/cache/ntfy
      - ntfy_data:/var/lib/ntfy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/-/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.ntfy.rule=Host(`ntfy.${DOMAIN}`)
      - traefik.http.routers.ntfy.entrypoints=websecure
      - traefik.http.routers.ntfy.tls=true
      - traefik.http.routers.ntfy.middlewares=authentik@file
      - traefik.http.services.ntfy.loadbalancer.server.port=80
    networks:
      - notifications
      - monitoring
      - proxy

  gotify:
    image: gotify/server:2.5.0
    container_name: gotify
    restart: unless-stopped
    environment:
      - GOTIFY_PRIMARYUSER_PASSWORD=${GOTIFY_PASSWORD:-changeme}
      - GOTIFY_SERVER_PORT=80
      - TZ=${TZ:-UTC}
    volumes:
      - gotify_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - traefik.enable=true
      - traefik.http.routers.gotify.rule=Host(`gotify.${DOMAIN}`)
      - traefik.http.routers.gotify.entrypoints=websecure
      - traefik.http.routers.gotify.tls=true
      - traefik.http.routers.gotify.middlewares=authentik@file
      - traefik.http.services.gotify.loadbalancer.server.port=80
    networks:
      - notifications
      - proxy

networks:
  notifications:
    driver: bridge
  monitoring:
    external: true
    name: homelab-stack_monitoring
  proxy:
    external: true

volumes:
  ntfy_cache:
  ntfy_data:
  gotify_data:
