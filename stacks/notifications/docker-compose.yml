version: '3.8'

services:
  ntfy:
    image: binwiederhier/ntfy:v2.11.0
    container_name: ntfy
    restart: unless-stopped
    networks:
      - proxy
      - internal
    expose:
      - "80"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - NTFY_BASE_URL=${NTFY_BASE_URL:-https://ntfy.${DOMAIN}}
      - NTFY_AUTH_DEFAULT_ACCESS=deny-all
      - NTFY_BEHIND_PROXY=true
      - NTFY_CACHE_FILE=/var/cache/ntfy/cache.db
      - NTFY_AUTH_FILE=/var/lib/ntfy/user.db
      - NTFY_LISTEN=0.0.0.0:80
    volumes:
      - ./config/ntfy:/config:ro
      - ntfy-data:/var/cache/ntfy
      - ntfy-auth:/var/lib/ntfy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ntfy.rule=Host(`ntfy.${DOMAIN}`)"
      - "traefik.http.routers.ntfy.entrypoints=websecure"
      - "traefik.http.routers.ntfy.tls=true"
      - "traefik.http.routers.ntfy.tls.certResolver=letsencrypt"
      - "traefik.http.services.ntfy.loadbalancer.server.port=80"

  gotify:
    image: gotify/server:2.5.0
    container_name: gotify
    restart: unless-stopped
    networks:
      - proxy
      - internal
    expose:
      - "80"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - GOTIFY_SERVER_PORT=80
    volumes:
      - gotify-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gotify.rule=Host(`gotify.${DOMAIN}`)"
      - "traefik.http.routers.gotify.entrypoints=websecure"
      - "traefik.http.routers.gotify.tls=true"
      - "traefik.http.routers.gotify.tls.certResolver=letsencrypt"
      - "traefik.http.services.gotify.loadbalancer.server.port=80"

volumes:
  ntfy-data:
    driver: local
  ntfy-auth:
    driver: local
  gotify-data:
    driver: local

networks:
  proxy:
    external: true
  internal:
    external: true