version: '3.8'

services:
  gotify:
    image: gotify/server:latest
    container_name: gotify
    restart: unless-stopped
    environment:
      GOTIFY_DEFAULTUSER_NAME: ${GOTIFY_ADMIN_USER:-admin}
      GOTIFY_DEFAULTUSER_PASS: ${GOTIFY_ADMIN_PASSWORD:-changeme123}
      GOTIFY_DATABASE_DIALECT: sqlite3
      GOTIFY_DATABASE_CONNECTION: data/gotify.db
      GOTIFY_PASSSTRENGTH: 10
      GOTIFY_UPLOADEDIMAGESDIR: data/images
      GOTIFY_PLUGINSDIR: data/plugins
      GOTIFY_REGISTRATION: ${GOTIFY_ALLOW_REGISTRATION:-false}
      TZ: ${TZ:-UTC}
    ports:
      - "8078:80"
    volumes:
      - gotify_data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gotify.rule=Host(`gotify.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.gotify.entrypoints=websecure"
      - "traefik.http.routers.gotify.tls.certresolver=letsencrypt"
      - "traefik.http.services.gotify.loadbalancer.server.port=80"
      - "homepage.group=Notifications"
      - "homepage.name=Gotify"
      - "homepage.icon=gotify.png"
      - "homepage.href=https://gotify.${DOMAIN:-localhost}"
      - "homepage.description=Push notification server"
    networks:
      - notifications
      - traefik
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  apprise-api:
    image: caronc/apprise:latest
    container_name: apprise-api
    restart: unless-stopped
    environment:
      APPRISE_STATEFUL_MODE: ${APPRISE_STATEFUL_MODE:-yes}
      APPRISE_CONFIG_LOCK: ${APPRISE_CONFIG_LOCK:-yes}
      APPRISE_ATTACH_SIZE: ${APPRISE_ATTACH_SIZE:-200}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-UTC}
    ports:
      - "8000:8000"
    volumes:
      - apprise_config:/config
      - apprise_attach:/attach
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.apprise.rule=Host(`apprise.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.apprise.entrypoints=websecure"
      - "traefik.http.routers.apprise.tls.certresolver=letsencrypt"
      - "traefik.http.services.apprise.loadbalancer.server.port=8000"
      - "homepage.group=Notifications"
      - "homepage.name=Apprise API"
      - "homepage.icon=apprise.png"
      - "homepage.href=https://apprise.${DOMAIN:-localhost}"
      - "homepage.description=Universal notification gateway"
    networks:
      - notifications
      - traefik
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ntfy
    restart: unless-stopped
    command:
      - serve
    environment:
      NTFY_BASE_URL: https://ntfy.${DOMAIN:-localhost}
      NTFY_UPSTREAM_BASE_URL: https://ntfy.sh
      NTFY_LISTEN_HTTP: :80
      NTFY_CACHE_FILE: /var/cache/ntfy/cache.db
      NTFY_AUTH_FILE: /var/lib/ntfy/user.db
      NTFY_AUTH_DEFAULT_ACCESS: ${NTFY_DEFAULT_ACCESS:-deny-all}
      NTFY_BEHIND_PROXY: true
      NTFY_ATTACHMENT_CACHE_DIR: /var/cache/ntfy/attachments
      NTFY_ATTACHMENT_TOTAL_SIZE_LIMIT: 5G
      NTFY_ATTACHMENT_FILE_SIZE_LIMIT: 15M
      NTFY_VISITOR_SUBSCRIPTION_LIMIT: 50
      TZ: ${TZ:-UTC}
    ports:
      - "8080:80"
    volumes:
      - ntfy_cache:/var/cache/ntfy
      - ntfy_data:/var/lib/ntfy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ntfy.rule=Host(`ntfy.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.ntfy.entrypoints=websecure"
      - "traefik.http.routers.ntfy.tls.certresolver=letsencrypt"
      - "traefik.http.services.ntfy.loadbalancer.server.port=80"
      - "homepage.group=Notifications"
      - "homepage.name=Ntfy"
      - "homepage.icon=ntfy.png"
      - "homepage.href=https://ntfy.${DOMAIN:-localhost}"
      - "homepage.description=Simple HTTP-based pub-sub"
    networks:
      - notifications
      - traefik
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "--spider", "http://localhost/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  gotify_data:
  apprise_config:
  apprise_attach:
  ntfy_cache:
  ntfy_data:

networks:
  notifications:
    name: notifications
    driver: bridge
  traefik:
    external: true
