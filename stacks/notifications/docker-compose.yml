services:
  ntfy:
    image: binwiederhier/ntfy:v2.11.0
    container_name: ntfy
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - ntfy-data:/var/lib/ntfy
      - ntfy-cache:/var/cache/ntfy
      - ./ntfy/ntfy.conf:/etc/ntfy/ntfy.conf:ro
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    command: serve --config-file /etc/ntfy/ntfy.conf
    labels:
      - traefik.enable=true
      - "traefik.http.routers.ntfy.rule=Host(`ntfy.${DOMAIN}`)"
      - traefik.http.routers.ntfy.entrypoints=websecure
      - traefik.http.routers.ntfy.tls=true
      - traefik.http.services.ntfy.loadbalancer.server.port=80
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:80/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  gotify:
    image: gotify/server:2.5.0
    container_name: gotify
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - gotify-data:/app/data
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - GOTIFY_SERVER_PORT=8080
    labels:
      - traefik.enable=true
      - "traefik.http.routers.gotify.rule=Host(`gotify.${DOMAIN}`)"
      - traefik.http.routers.gotify.entrypoints=websecure
      - traefik.http.routers.gotify.tls=true
      - traefik.http.services.gotify.loadbalancer.server.port=8080
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  apprise:
    image: caronc/apprise:v1.1.6
    container_name: apprise
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - apprise-config:/config
      - ./apprise/apprise.yml:/etc/apprise/apprise.yml:ro
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.apprise.rule=Host(`apprise.${DOMAIN}`)"
      - traefik.http.routers.apprise.entrypoints=websecure
      - traefik.http.routers.apprise.tls=true
      - traefik.http.services.apprise.loadbalancer.server.port=8000
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:8000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  proxy:
    external: true

volumes:
  ntfy-data:
  ntfy-cache:
  apprise-config:
  gotify-data:
