version: '3.8'

services:
  ntfy:
    image: binwiederhier/ntfy:v2.11.0
    container_name: ntfy
    restart: unless-stopped
    networks:
      - proxy
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ntfy-cache:/cache
      - ntfy-data:/data
      - ./config/ntfy:/etc/ntfy
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ntfy.rule=Host(`ntfy.${DOMAIN}`)"
      - "traefik.http.routers.ntfy.entrypoints=websecure"
      - "traefik.http.routers.ntfy.tls=true"
      - "traefik.http.services.ntfy.loadbalancer.server.port=80"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  gotify:
    image: gotify/server:2.5.0
    container_name: gotify
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - gotify-data:/app/data
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - GOTIFY_DEFAULTUSER_NAME=${GOTIFY_ADMIN_USER:-admin}
      - GOTIFY_DEFAULTUSER_PASSWORD=${GOTIFY_ADMIN_PASSWORD}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gotify.rule=Host(`gotify.${DOMAIN}`)"
      - "traefik.http.routers.gotify.entrypoints=websecure"
      - "traefik.http.routers.gotify.tls=true"
      - "traefik.http.services.gotify.loadbalancer.server.port=80"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  proxy:
    name: proxy
    external: true

volumes:
  ntfy-cache:
  ntfy-data:
  gotify-data:
