services:
  # ---------------------------------------------------------------------------
  # ntfy — HTTP pub/sub push notification server
  # ---------------------------------------------------------------------------
  ntfy:
    image: binwiederhier/ntfy:v2.11.0
    container_name: ntfy
    restart: unless-stopped
    command: serve
    volumes:
      - ntfy-data:/var/lib/ntfy
      - ntfy-cache:/var/cache/ntfy
      - ../../config/ntfy/server.yml:/etc/ntfy/server.yml:ro
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - traefik.enable=true
      - "traefik.http.routers.ntfy.rule=Host(`ntfy.${DOMAIN}`)"
      - traefik.http.routers.ntfy.entrypoints=websecure
      - traefik.http.routers.ntfy.tls=true
      - traefik.http.services.ntfy.loadbalancer.server.port=80
    networks:
      - notifications
      - proxy

  # ---------------------------------------------------------------------------
  # Gotify — Self-hosted push notification server
  # ---------------------------------------------------------------------------
  gotify:
    image: gotify/server:2.5.0
    container_name: gotify
    restart: unless-stopped
    volumes:
      - gotify-data:/app/data
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - GOTIFY_SERVER_PORT=80
      - GOTIFY_DEFAULTUSER_PASS=${GOTIFY_PASSWORD:-changeme}
      - GOTIFY_PASSSTRENGTH=10
      - GOTIFY_REGISTRATION=false
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - traefik.enable=true
      - "traefik.http.routers.gotify.rule=Host(`gotify.${DOMAIN}`)"
      - traefik.http.routers.gotify.entrypoints=websecure
      - traefik.http.routers.gotify.tls=true
      - traefik.http.services.gotify.loadbalancer.server.port=80
    networks:
      - notifications
      - proxy

networks:
  notifications:
    driver: bridge
  proxy:
    external: true

volumes:
  ntfy-data:
  ntfy-cache:
  gotify-data:
