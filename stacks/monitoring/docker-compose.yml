services:
  # ─── Metrics Collection ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}
      - --web.enable-lifecycle
      - --web.enable-admin-api
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
    volumes:
      - ../../config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../config/prometheus/alerts:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "promtool", "check", "healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.http.routers.prometheus.rule=Host(`prometheus.${DOMAIN}`)
      - traefik.http.routers.prometheus.entrypoints=websecure
      - traefik.http.routers.prometheus.tls=true
      - traefik.http.routers.prometheus.middlewares=authentik@file
      - traefik.http.services.prometheus.loadbalancer.server.port=9090
    networks:
      - monitoring
      - proxy
    depends_on:
      alertmanager:
        condition: service_healthy

  # ─── Visualization & Dashboards ─────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.2
    container_name: grafana
    restart: unless-stopped
    environment:
      # Server
      - GF_SERVER_DOMAIN=grafana.${DOMAIN}
      - GF_SERVER_ROOT_URL=https://grafana.${DOMAIN}
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      # Authentik OIDC
      - GF_AUTH_GENERIC_OAUTH_ENABLED=true
      - GF_AUTH_GENERIC_OAUTH_NAME=Authentik
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=${GRAFANA_OAUTH_CLIENT_ID}
      - GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=${GRAFANA_OAUTH_CLIENT_SECRET}
      - GF_AUTH_GENERIC_OAUTH_SCOPES=openid profile email
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=https://${AUTHENTIK_DOMAIN}/application/o/authorize/
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=https://${AUTHENTIK_DOMAIN}/application/o/token/
      - GF_AUTH_GENERIC_OAUTH_API_URL=https://${AUTHENTIK_DOMAIN}/application/o/userinfo/
      - GF_AUTH_SIGNOUT_REDIRECT_URL=https://${AUTHENTIK_DOMAIN}/application/o/grafana/end-session/
      - GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH=contains(groups, 'homelab-admins') && 'Admin' || contains(groups, 'homelab-users') && 'Viewer' || 'Viewer'
      # User management
      - GF_USERS_AUTO_ASSIGN_ORG=true
      - GF_USERS_AUTO_ASSIGN_ORG_ROLE=Viewer
      - GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP=true
      # Disable telemetry
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      # Unified Alerting
      - GF_UNIFIED_ALERTING_ENABLED=true
      - GF_ALERTING_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ../../config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)
      - traefik.http.routers.grafana.entrypoints=websecure
      - traefik.http.routers.grafana.tls=true
      - traefik.http.services.grafana.loadbalancer.server.port=3000
    networks:
      - monitoring
      - proxy
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy

  # ─── Download Grafana Dashboards ────────────────────────────────
  grafana-dashboards-init:
    image: curlimages/curl:8.10.1
    container_name: grafana-dashboards-init
    restart: "no"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        DASH_DIR=/dashboards
        mkdir -p $$DASH_DIR
        download() {
          ID=$$1; NAME=$$2
          if [ ! -f "$$DASH_DIR/$$NAME.json" ]; then
            echo "Downloading dashboard $$NAME (ID: $$ID)..."
            curl -sSL "https://grafana.com/api/dashboards/$$ID/revisions/latest/download" \
              | sed 's/$${DS_PROMETHEUS}/Prometheus/g' \
              | sed 's/$${DS_LOKI}/Loki/g' \
              > "$$DASH_DIR/$$NAME.json"
          fi
        }
        download 1860  "node-exporter-full"
        download 179   "docker-container-host-metrics"
        download 17346 "traefik-official"
        download 13639 "loki-dashboard"
        download 18278 "uptime-kuma"
        echo "All dashboards downloaded."
    volumes:
      - ../../config/grafana/dashboards:/dashboards

  # ─── Log Aggregation ────────────────────────────────────────────
  loki:
    image: grafana/loki:3.2.0
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ../../config/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - monitoring

  # ─── Log Collection Agent ──────────────────────────────────────
  promtail:
    image: grafana/promtail:3.2.0
    container_name: promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ../../config/loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitoring
    depends_on:
      loki:
        condition: service_healthy

  # ─── Distributed Tracing ────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.6.0
    container_name: tempo
    restart: unless-stopped
    command: -config.file=/etc/tempo/tempo.yml
    volumes:
      - ../../config/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3200/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - monitoring

  # ─── Alert Routing ─────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --web.external-url=https://alertmanager.${DOMAIN}
    volumes:
      - ../../config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - traefik.enable=true
      - traefik.http.routers.alertmanager.rule=Host(`alertmanager.${DOMAIN}`)
      - traefik.http.routers.alertmanager.entrypoints=websecure
      - traefik.http.routers.alertmanager.tls=true
      - traefik.http.routers.alertmanager.middlewares=authentik@file
      - traefik.http.services.alertmanager.loadbalancer.server.port=9093
    networks:
      - monitoring
      - proxy

  # ─── Container Metrics ─────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.50.0
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /cgroup:/cgroup:ro
    command:
      - --housekeeping_interval=15s
      - --docker_only=true
      - --store_container_labels=true
    networks:
      - monitoring

  # ─── Host Metrics ──────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    command:
      - --path.procfs=/host/proc
      - --path.rootfs=/rootfs
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      - --collector.textfile.directory=/host/textfile
      - --no-collector.ipvs
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - monitoring

  # ─── Service Uptime Monitoring ─────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1.23.15
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "extra/healthcheck"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.http.routers.uptime-kuma.rule=Host(`status.${DOMAIN}`)
      - traefik.http.routers.uptime-kuma.entrypoints=websecure
      - traefik.http.routers.uptime-kuma.tls=true
      - traefik.http.services.uptime-kuma.loadbalancer.server.port=3001
    networks:
      - monitoring
      - proxy

  # ─── On-Call & Incident Management ─────────────────────────────
  grafana-oncall:
    image: grafana/oncall:v1.9.22
    container_name: grafana-oncall
    restart: unless-stopped
    environment:
      - BASE_URL=https://oncall.${DOMAIN}
      - SECRET_KEY=${ONCALL_SECRET_KEY:-change-me-to-random-secret}
      - RABBITMQ_USERNAME=
      - RABBITMQ_PASSWORD=
      - CELERY_WORKER_QUEUE=default,critical,long,slack,telegram,webhook,retry,celery,grafana
      - DJANGO_SETTINGS_MODULE=settings.hobby
      - OSS_INSTALLATION=true
      - GRAFANA_API_URL=http://grafana:3000
    volumes:
      - oncall_data:/var/lib/oncall
    labels:
      - traefik.enable=true
      - traefik.http.routers.oncall.rule=Host(`oncall.${DOMAIN}`)
      - traefik.http.routers.oncall.entrypoints=websecure
      - traefik.http.routers.oncall.tls=true
      - traefik.http.routers.oncall.middlewares=authentik@file
      - traefik.http.services.oncall.loadbalancer.server.port=8080
    networks:
      - monitoring
      - proxy
    depends_on:
      grafana:
        condition: service_healthy

networks:
  monitoring:
    driver: bridge
  proxy:
    external: true

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  alertmanager_data:
  tempo_data:
  uptime_kuma_data:
  oncall_data:
