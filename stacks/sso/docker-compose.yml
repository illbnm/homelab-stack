# =============================================================================
# HomeLab Stack — SSO Stack
# Services: Authentik (Server + Worker) + PostgreSQL + Redis + Embedded Outpost
#
# Authentik is an open-source Identity Provider supporting OIDC, SAML, LDAP.
# All other stacks authenticate through this stack.
#
# Usage:
#   cd stacks/sso && cp .env.example .env && nano .env
#   docker compose up -d
#   # Wait ~60s for first boot, then run:
#   ../../scripts/setup-authentik.sh
# =============================================================================

x-authentik-base: &authentik-base
  image: ghcr.io/goauthentik/server:2024.8.3
  # CN mirror fallback (uncomment if ghcr.io is inaccessible):
  # image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/ghcr.io/goauthentik/server:2024.8.3
  env_file:
    - .env
  environment:
    AUTHENTIK_REDIS__HOST: redis
    AUTHENTIK_REDIS__PASSWORD: ${AUTHENTIK_REDIS_PASSWORD}
    AUTHENTIK_POSTGRESQL__HOST: postgresql
    AUTHENTIK_POSTGRESQL__USER: authentik
    AUTHENTIK_POSTGRESQL__NAME: authentik
    AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD}
    AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
    AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    AUTHENTIK_LOG_LEVEL: warning
    # Email / SMTP backend
    AUTHENTIK_EMAIL__HOST: ${SMTP_HOST}
    AUTHENTIK_EMAIL__PORT: ${SMTP_PORT}
    AUTHENTIK_EMAIL__USERNAME: ${SMTP_USER}
    AUTHENTIK_EMAIL__PASSWORD: ${SMTP_PASSWORD}
    AUTHENTIK_EMAIL__FROM: ${SMTP_FROM}
    AUTHENTIK_EMAIL__USE_TLS: "${SMTP_USE_TLS}"
    AUTHENTIK_EMAIL__TIMEOUT: 15
    # Outpost configuration
    AUTHENTIK_OUTPOSTS__embedded_docker_port: 9001

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — Authentik database
  # ---------------------------------------------------------------------------
  postgresql:
    image: postgres:16-alpine
    container_name: authentik-postgres
    restart: unless-stopped
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD}
      POSTGRES_DB: authentik
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik -d authentik"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - sso

  # ---------------------------------------------------------------------------
  # Redis — Authentik cache/queue
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: authentik-redis
    restart: unless-stopped
    command: redis-server --requirepass ${AUTHENTIK_REDIS_PASSWORD} --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${AUTHENTIK_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sso

  # ---------------------------------------------------------------------------
  # Authentik Server — Web UI + API + OIDC/SAML endpoints
  # ---------------------------------------------------------------------------
  authentik-server:
    <<: *authentik-base
    container_name: authentik-server
    restart: unless-stopped
    command: server
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authentik.rule=Host(`${AUTHENTIK_DOMAIN}`)"
      - "traefik.http.routers.authentik.entrypoints=websecure"
      - "traefik.http.routers.authentik.tls.certresolver=letsencrypt"
      - "traefik.http.services.authentik.loadbalancer.server.port=9000"
      - "traefik.http.routers.authentik-outpost.rule=HostRegexp(`{subdomain:[a-z0-9-]+}.${DOMAIN}`) && PathPrefix(`/outpost.goauthentik.io`)"
      - "traefik.http.routers.authentik-outpost.entrypoints=websecure"
      - "traefik.http.routers.authentik-outpost.tls.certresolver=letsencrypt"
      - "traefik.http.routers.authentik-outpost.service=authentik-outpost"
      - "traefik.http.services.authentik-outpost.loadbalancer.server.port=9000"
    networks:
      - sso
      - proxy

  # ---------------------------------------------------------------------------
  # Authentik Worker — Background tasks (flows, policies, email, outposts)
  # ---------------------------------------------------------------------------
  authentik-worker:
    <<: *authentik-base
    container_name: authentik-worker
    restart: unless-stopped
    command: worker
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "echo '1' | nc -w 5 127.0.0.1 8000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - sso

  # ---------------------------------------------------------------------------
  # Authentik Embedded Outpost (Proxy provider for ForwardAuth)
  # Handles Traefik ForwardAuth for non-OIDC-native services
  # Runs as a sidecar — all Docker containers can use authentik@file middleware
  # ---------------------------------------------------------------------------
  authentik-outpost:
    <<: *authentik-base
    container_name: authentik-outpost
    restart: unless-stopped
    command: server --type proxy
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_REDIS__PASSWORD: ${AUTHENTIK_REDIS_PASSWORD}
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_LOG_LEVEL: warning
      AUTHENTIK_HOST: "http://authentik-server:9000"
      AUTHENTIK_PORT: "9001"
      # The outpost authenticates against the Authentik server
      AUTHENTIK_AUTHENTIK__HOST: "http://authentik-server:9000"
      AUTHENTIK_AUTHENTIK__OUTPOST_SETUP: "embedded"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/-/health/ready/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - sso

volumes:
  postgresql_data:
  redis_data:
  authentik_media:
  authentik_templates:

networks:
  sso:
    name: sso
  proxy:
    external: true
    name: proxy
