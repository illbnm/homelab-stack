version: '3.8'

volumes:
  authentik-data:
    driver: local
  authentik-media:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  proxy:
    external: true
  internal:
    external: true

services:
  # ------------------------------------------------------------------------
  # PostgreSQL - Authentik 专用数据库
  # ------------------------------------------------------------------------
  postgres:
    image: postgres:16.4-alpine
    container_name: authentik-postgres
    restart: unless-stopped
    networks:
      - internal
    environment:
      - POSTGRES_DB=authentik
      - POSTGRES_USER=authentik
      - POSTGRES_PASSWORD=${AUTHENTIK_DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ------------------------------------------------------------------------
  # Redis - Authentik 缓存
  # ------------------------------------------------------------------------
  redis:
    image: redis:7.4.0-alpine
    container_name: authentik-redis
    restart: unless-stopped
    networks:
      - internal
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ------------------------------------------------------------------------
  # Authentik Server - OIDC/SAML 提供商
  # ------------------------------------------------------------------------
  authentik-server:
    image: ghcr.io/goauthentik/server:2024.8.3
    container_name: authentik-server
    restart: unless-stopped
    networks:
      - proxy
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "9000"  # Web UI / API
      - "9443"  # HTTPS (if using built-in)
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY:-}
      - AUTHENTIK_BOOTSTRAP_EMAIL=${AUTHENTIK_BOOTSTRAP_EMAIL:-admin@example.com}
      - AUTHENTIK_BOOTSTRAP_PASSWORD=${AUTHENTIK_BOOTSTRAP_PASSWORD:-}
      - AUTHENTIK_BOOTSTRAP_TOKEN=${AUTHENTIK_BOOTSTRAP_TOKEN:-}
      - AUTHENTIK_DB_HOST=postgres
      - AUTHENTIK_DB_NAME=authentik
      - AUTHENTIK_DB_USER=authentik
      - AUTHENTIK_DB_PASSWORD=${AUTHENTIK_DB_PASSWORD}
      - AUTHENTIK_REDIS_HOST=redis
      - AUTHENTIK_REDIS_PORT=6379
      # 可选: 电子邮件配置 (用于密码重置等)
      # - AUTHENTIK_EMAIL_HOST=smtp.example.com
      # - AUTHENTIK_EMAIL_PORT=587
      # - AUTHENTIK_EMAIL_HOST_USER=admin@example.com
      # - AUTHENTIK_EMAIL_HOST_PASSWORD=
    volumes:
      - authentik-media:/media
      - authentik-data:/tmp/authentik  # 用于 bootstrap 输出
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authentik.rule=Host(`auth.${DOMAIN}`)"
      - "traefik.http.routers.authentik.entrypoints=websecure"
      - "traefik.http.routers.authentik.tls=true"
      - "traefik.http.routers.authentik.tls.certResolver=letsencrypt"
      - "traefik.http.services.authentik.loadbalancer.server.port=9000"

  # ------------------------------------------------------------------------
  # Authentik Worker - 后台任务处理
  # ------------------------------------------------------------------------
  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.8.3
    container_name: authentik-worker
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      authentik-server:
        condition: service_healthy
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY:-}
      - AUTHENTIK_BOOTSTRAP_EMAIL=${AUTHENTIK_BOOTSTRAP_EMAIL:-admin@example.com}
      - AUTHENTIK_BOOTSTRAP_PASSWORD=${AUTHENTIK_BOOTSTRAP_PASSWORD:-}
      - AUTHENTIK_DB_HOST=postgres
      - AUTHENTIK_DB_NAME=authentik
      - AUTHENTIK_DB_USER=authentik
      - AUTHENTIK_DB_PASSWORD=${AUTHENTIK_DB_PASSWORD}
      - AUTHENTIK_REDIS_HOST=redis
      - AUTHENTIK_REDIS_PORT=6379
    volumes:
      - authentik-media:/media
      - authentik-data:/tmp/authentik
    command: ["authentik", "worker"]