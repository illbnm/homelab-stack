# Mosquitto MQTT Broker 配置
# 参考: https://mosquitto.org/man/mosquitto-conf-5.html

# ============================================================================
# 基本设置
# ============================================================================
persistence true
persistence_location /mosquitto/data
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# 日志级别 (debug, info, notice, warning, error)
log_type error
log_type warning
log_type notice
log_type information

# ============================================================================
# 网络设置
# ============================================================================
listener 1883
protocol mqtt

# TLS 端口 (可选，生产环境建议启用)
listener 8883
protocol mqtt
cafile /mosquitto/config/certs/ca.crt
certfile /mosquitto/config/certs/server.crt
keyfile /mosquitto/config/certs/server.key
# require_certificate false  # 如需客户端证书设为 true

# WebSocket 端口 (用于 Web UI、Node-RED 等)
listener 9001
protocol websockets

# 绑定地址 (0.0.0.0 表示所有接口)
# 生产环境建议限制为内网
# bind_address 127.0.0.1
# 或通过 Traefik 代理，可设为 127.0.0.1 仅本地访问

# ============================================================================
# 认证与安全
# ============================================================================

# 密码文件 (使用 mosquitto_passwd 工具生成)
password_file /mosquitto/config/passwords

# ACL (访问控制列表) 文件
acl_file /mosquitto/config/acl

# 允许匿名连接 (生产环境应关闭)
allow_anonymous false

# ============================================================================
# 连接限制
# ============================================================================
max_connections -1  # 无限制 (或设置具体数字)
max_inflight_messages 20
max_queued_messages 100
retry_interval 20

# ============================================================================
# 消息保留与 QoS
# ============================================================================
max_retained_dessages 1000
persistent_client_expiration 1d

# ============================================================================
# 系统用户
# ============================================================================
# 指定运行用户 (由 Docker entrypoint 处理，此处无需设置)

# ============================================================================
# 桥接 (可选，用于多 MQTT 服务器互联)
# ============================================================================
# connection other-broker
# address other-broker:1883
# topic # both 2 "" ""

# ============================================================================
# 插件 (如需要)
# ============================================================================
# plugin /usr/lib/mosquitto/auth-plug.so
# plugin_opt_backends mysql