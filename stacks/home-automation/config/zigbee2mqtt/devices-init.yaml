# Zigbee2MQTT 设备初始化示例
# 这些设备会在首次配对后自动应用配置
#
# 参考: https://www.zigbee2mqtt.io/advanced/002-devices-configuration.html

# ============================================================================
# 示例: 小米温湿度传感器 (CG1142)
# ============================================================================
# '0x00158d0001a2b3c4':
#   friendly_name: xiaomi_sensor_livingroom
#   retain: false
#   quito:
#     force_enabled: true

# ============================================================================
# 示例: IKEA 灯泡 (TRADFRI)
# ============================================================================
# '0x<CN Phone Number>abcdef':
#   friendly_name: ikea_bulb_bedroom
#   retain: false
#   state_change: true  # 状态变化时发送

# ============================================================================
# 示例: Sonoff 智能开关 (Zigbee 版)
# ============================================================================
# '0x<CN Phone Number>abcdef':
#   friendly_name: sonoff_switch_kitchen
#   retain: false
#   action_hold_step_size: 50

# ============================================================================
# 说明
# ============================================================================
# 1. 设备 MAC (IEEE 地址) 在首次配对后可从日志获取
# 2. 添加到此文件后重启 Zigbee2MQTT 生效
# 3. 避免了每次配对后手动调整配置
# 4. 可选功能: 亮度范围、动作配置、传感器校准等