# Zigbee2MQTT 配置
# 参考: https://www.zigbee2mqtt.io/guide/configuration/

# ============================================================================
# 基础设置
# ============================================================================
homeassistant: true  # 启用 Home Assistant 自动发现
discovery:
  enabled: true
  prefix: homeassistant

mqtt:
  server: 'mqtt://mosquitto:1883'
  user: zigbee2mqtt
  password: ${ZIGBEE2MQTT_PASSWORD:-change-me}
  # 可选: 客户端 ID
  # client_id: zigbee2mqtt

# ============================================================================
# Zigbee 适配器设置
# ============================================================================
serial:
  port: /dev/ttyUSB0  # 根据实际 USB 设备修改 (/dev/ttyACM0 等)
  adapter: z-stack  # 或: zigator, conbee, deconz

# 高级 serial 配置 (可选)
# baudrate: 115200
# rtscts: false

# ============================================================================
# 高级设置
# ============================================================================
advanced:
  # 网络密钥 (首次启动自动生成，可备份)
  networkkey: []
  # pan_id: 0x1a62  # 可选，自定义 PAN ID
  # ext_pan_id: 0x0000000000000000  # 可选
  # channel: 11  # Zigbee 信道 (11-26)，中国推荐 15/20/25

  # 传输功率 (0-20)
  # transmit_power: 20

  # 缓存路径 (默认 /app/data)
  cache_path: /app/data/zigbee2mqtt/cache

  # 运行模式
  # run_as_daemon: false

# ============================================================================
# 设备特定配置 (可选)
# ============================================================================
devices:
  # '0x1234567890abcdef1234567890abcdef':
  #   friendly_name: my_device
  #   retain: false

# ============================================================================
# 组 (Groups)
# ============================================================================
groups:
  # '0x1234567890abcdef1234567890abcdef':
  #   friendly_name: my_group
  #   retain: false

# ============================================================================
# 映射 (Map 转换，如亮度 0-254 → 0-100%)
# ============================================================================
# mappings:
#   light_brightness:
#     - [0, 254, 0, 100]

# ============================================================================
# 实验性/可选模块
# ============================================================================
experimental:
  # 新设备支持，通常保持 false
  # new_device_discovery: true
  pass_through: false

# ============================================================================
# 性能调优
# ============================================================================
# queue:
#   - 可以设置消息队列大小

# ============================================================================
# 日志
# ============================================================================
log_level: info
# debug, info, warn, error

# ============================================================================
# 外部转换器 (可选)
# ============================================================================
# external_converters:
#   - extension.js

# ============================================================================
# 说明
# ============================================================================
# 1. 首次启动自动生成 networkkey，保存到 /app/data/network.key
# 2. 设备配对: 点击 Zigbee 适配器按钮或启用 "permit join"
# 3. Home Assistant 会自动发现新设备
# 4. MQTT 用户需与 mosquitto 的密码文件匹配