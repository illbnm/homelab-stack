# =============================================================================
# Mosquitto ACL Configuration
# HomeLab Stack — Home Automation
# =============================================================================

# 定义用户和主题访问权限
# 语法：
# user <username>
# topic [read|write|readwrite] <topic>

# ------------------------------
# Home Assistant 用户
# ------------------------------
user ha
topic readwrite homeassistant/#
topic readwrite ha/#
topic readwrite discovery/#
topic readwrite node-red/#
topic readwrite zigbee2mqtt/#
topic readwrite esphome/#

# Home Assistant 自动发现
pattern readwrite homeassistant/%c/#
pattern readwrite %c/discovery/#

# ------------------------------
# Node-RED 用户
# ------------------------------
user nodered
topic readwrite homeassistant/#
topic readwrite node-red/#
topic readwrite discovery/#
topic readwrite zigbee2mqtt/#
topic readwrite esphome/#
topic readwrite homeassistant/+/config
topic readwrite homeassistant/sensor/+/config
topic readwrite homeassistant/binary_sensor/+/config
topic readwrite homeassistant/switch/+/config
topic readwrite homeassistant/light/+/config
topic readwrite homeassistant/climate/+/config

# ------------------------------
# Zigbee2MQTT 用户
# ------------------------------
user zigbee2mqtt
topic readwrite zigbee2mqtt/#
topic readwrite homeassistant/#
topic readwrite discovery/#

# ------------------------------
# ESPHome 用户
# ------------------------------
user esphome
topic readwrite esphome/#
topic readwrite homeassistant/#

# ------------------------------
# 默认规则（未匹配上述用户的连接）
# ------------------------------
pattern readwrite homeassistant/%c/#
pattern readwrite %c/discovery/#
