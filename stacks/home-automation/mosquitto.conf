# =============================================================================
# Mosquitto Configuration — Home Automation Stack
# =============================================================================

# --- Listeners ---
listener 1883
allow_anonymous false

# WebSocket listener for browser-based dashboards
listener 9001
protocol websockets
allow_anonymous false

# --- Authentication ---
# Password file: create with —
#   docker exec mosquitto mosquitto_passwd -c /mosquitto/config/auth/passwd <username>
# Then restart the container.
password_file /mosquitto/config/auth/passwd

# --- ACL ---
# acl_file /mosquitto/config/auth/acl
# Uncomment above after creating the ACL file.
# Example acl content:
#   user zigbee2mqtt
#   topic readwrite zigbee2mqtt/#
#   user homeassistant
#   topic readwrite #
#   pattern write %u/#

# --- Persistence ---
persistence true
persistence_location /mosquitto/data/
autosave_interval 1800

# --- Logging ---
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
