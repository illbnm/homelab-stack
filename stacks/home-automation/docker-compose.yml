networks:
  proxy:
    external: true

services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:2024.9.3
    restart: unless-stopped
    network_mode: host
    volumes:
      - ha-config:/config
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    privileged: true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8123/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  node-red:
    container_name: node-red
    image: nodered/node-red:4.0.3
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - node-red-data:/data
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.nodered.rule=Host(`nodered.${DOMAIN}`)"
      - traefik.http.routers.nodered.entrypoints=websecure
      - traefik.http.routers.nodered.tls=true
      - traefik.http.services.nodered.loadbalancer.server.port=1880
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:1880/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mosquitto:
    container_name: mosquitto
    image: eclipse-mosquitto:2.0.19
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - mosquitto-data:/mosquitto/data
      - mosquitto-logs:/mosquitto/log
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "1883:1883"
      - "8883:8883"
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  zigbee2mqtt:
    container_name: zigbee2mqtt
    image: koenkk/zigbee2mqtt:1.40.2
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - zigbee2mqtt-data:/app/data
      - /run/udev:/run/udev:ro
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - ZIGBEE2MQTT_DATA=/app/data
    devices:
      - /dev/ttyACM0:/dev/ttyACM0
    depends_on:
      mosquitto:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - "traefik.http.routers.zigbee2mqtt.rule=Host(`zigbee.${DOMAIN}`)"
      - traefik.http.routers.zigbee2mqtt.entrypoints=websecure
      - traefik.http.routers.zigbee2mqtt.tls=true
      - traefik.http.services.zigbee2mqtt.loadbalancer.server.port=8080
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  esphome:
    container_name: esphome
    image: ghcr.io/esphome/esphome:2024.9.3
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - esphome-config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.esphome.rule=Host(`esphome.${DOMAIN}`)"
      - traefik.http.routers.esphome.entrypoints=websecure
      - traefik.http.routers.esphome.tls=true
      - traefik.http.services.esphome.loadbalancer.server.port=6052
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6052/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  proxy:
    external: true

volumes:
  ha-config:
  node-red-data:
  mosquitto-data:
  mosquitto-logs:
  zigbee2mqtt-data:
  esphome-config:
