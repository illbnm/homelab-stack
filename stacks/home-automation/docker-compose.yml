services:
  # ---------------------------------------------------------------------------
  # Home Assistant — 智能家居中枢
  # ---------------------------------------------------------------------------
  # ⚠️ network_mode: host is REQUIRED for mDNS/UPnP device discovery.
  #    Bridge mode breaks SSDP, mDNS, and some Zigbee/Z-Wave integrations.
  #    See the bridge-mode alternative below (commented out).
  homeassistant:
    image: homeassistant/home-assistant:2024.12.5
    container_name: homeassistant
    restart: unless-stopped
    # === Recommended: host mode (full mDNS / UPnP / discovery support) ===
    network_mode: host
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - ha_config:/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      mosquitto:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Alternative: Home Assistant in bridge mode
  # Uncomment below and comment out the host-mode service above.
  # NOTE: Bridge mode does NOT support mDNS/UPnP device discovery.
  #       Some integrations (Cast, HomeKit, certain Zigbee dongles) may not work.
  # ---------------------------------------------------------------------------
  # homeassistant:
  #   image: homeassistant/home-assistant:2024.12.5
  #   container_name: homeassistant
  #   restart: unless-stopped
  #   environment:
  #     - TZ=${TZ:-Asia/Shanghai}
  #   volumes:
  #     - ha_config:/config
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8123"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 60s
  #   depends_on:
  #     mosquitto:
  #       condition: service_healthy
  #   labels:
  #     - traefik.enable=true
  #     - traefik.http.routers.homeassistant.rule=Host(`ha.${DOMAIN}`)
  #     - traefik.http.routers.homeassistant.entrypoints=websecure
  #     - traefik.http.routers.homeassistant.tls=true
  #     - traefik.http.routers.homeassistant.middlewares=authentik@file
  #     - traefik.http.services.homeassistant.loadbalancer.server.port=8123
  #   networks:
  #     - homeautomation
  #     - proxy

  # ---------------------------------------------------------------------------
  # Node-RED — 可视化流程编排
  # ---------------------------------------------------------------------------
  nodered:
    image: nodered/node-red:3.1.9
    container_name: nodered
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - nodered_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1880"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      mosquitto:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.nodered.rule=Host(`nodered.${DOMAIN}`)
      - traefik.http.routers.nodered.entrypoints=websecure
      - traefik.http.routers.nodered.tls=true
      - traefik.http.routers.nodered.middlewares=authentik@file
      - traefik.http.services.nodered.loadbalancer.server.port=1880
    networks:
      - homeautomation
      - proxy

  # ---------------------------------------------------------------------------
  # Mosquitto — MQTT Broker (internal only, no proxy exposure)
  # ---------------------------------------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2.0.20
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ../../config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "health", "-m", "ok"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - homeautomation

  # ---------------------------------------------------------------------------
  # Zigbee2MQTT — Zigbee 设备桥接
  # ---------------------------------------------------------------------------
  zigbee2mqtt:
    image: koenkk/zigbee2mqtt:1.40.0
    container_name: zigbee2mqtt
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - zigbee2mqtt_data:/app/data
    devices:
      - /dev/ttyACM0:/dev/ttyACM0  # USB Zigbee adapter — adjust as needed
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      mosquitto:
        condition: service_healthy
    networks:
      - homeautomation

networks:
  homeautomation:
    driver: bridge
  proxy:
    external: true

volumes:
  ha_config:
  nodered_data:
  mosquitto_data:
  mosquitto_log:
  zigbee2mqtt_data:
