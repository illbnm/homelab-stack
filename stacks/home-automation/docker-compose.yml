# =============================================================================
# HomeLab Stack — Home Automation
# =============================================================================

services:
  # --------------------------------------------------------------------------
  # Home Assistant — 智能家居中枢
  # --------------------------------------------------------------------------
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:2024.9.3
    restart: unless-stopped
    network_mode: host
    volumes:
      - ha-config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    privileged: true
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8123/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # --------------------------------------------------------------------------
  # Node-RED — 流程自动化
  # --------------------------------------------------------------------------
  node-red:
    container_name: node-red
    image: nodered/node-red:4.0.3
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - node-red-data:/data
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - NODE_RED_ENABLE_SAFE_MODE=false
    labels:
      - traefik.enable=true
      - "traefik.http.routers.node-red.rule=Host(`nodered.${DOMAIN}`)"
      - traefik.http.routers.node-red.entrypoints=websecure
      - traefik.http.routers.node-red.tls=true
      - traefik.http.services.node-red.loadbalancer.server.port=1880
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:1880/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # --------------------------------------------------------------------------
  # Mosquitto — MQTT 消息代理
  # --------------------------------------------------------------------------
  mosquitto:
    container_name: mosquitto
    image: eclipse-mosquitto:2.0.19
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - mosquitto-data:/mosquitto/data
      - mosquitto-logs:/mosquitto/log
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./passwords:/mosquitto/config/passwords:ro
      - ./acl.conf:/mosquitto/config/acl.conf:ro
    ports:
      - "1883:1883"   # MQTT plain
      - "8883:8883"   # MQTT TLS
      - "9001:9001"   # WebSockets
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # --------------------------------------------------------------------------
  # Zigbee2MQTT — Zigbee 网关
  # --------------------------------------------------------------------------
  zigbee2mqtt:
    container_name: zigbee2mqtt
    image: koenkk/zigbee2mqtt:1.40.2
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - zigbee2mqtt-data:/app/data
      - /run/udev:/run/udev:ro
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - ZIGBEE2MQTT_DATA=/app/data
    devices:
      - ${ZIGBEE_USB_DEVICE:-/dev/ttyACM0}:/dev/ttyACM0
    depends_on:
      mosquitto:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - "traefik.http.routers.zigbee2mqtt.rule=Host(`zigbee.${DOMAIN}`)"
      - traefik.http.routers.zigbee2mqtt.entrypoints=websecure
      - traefik.http.routers.zigbee2mqtt.tls=true
      - traefik.http.services.zigbee2mqtt.loadbalancer.server.port=8080
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # --------------------------------------------------------------------------
  # ESPHome — IoT 设备编程
  # --------------------------------------------------------------------------
  esphome:
    container_name: esphome
    image: ghcr.io/esphome/esphome:2024.9.3
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - esphome-config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.esphome.rule=Host(`esphome.${DOMAIN}`)"
      - traefik.http.routers.esphome.entrypoints=websecure
      - traefik.http.routers.esphome.tls=true
      - traefik.http.services.esphome.loadbalancer.server.port=6052
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6052/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  proxy:
    external: true

volumes:
  ha-config:
  node-red-data:
  mosquitto-data:
  mosquitto-logs:
  zigbee2mqtt-data:
  esphome-config:

version: "3.8"
