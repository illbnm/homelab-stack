services:
# TRAEFIK NOTE: HA and ESPHome use network_mode:host for device discovery (mDNS/Zeroconf).
# These services bypass Traefik. Access via: http://YOUR_HOST_IP:8123 (HA) / :6052 (ESPHome)
# For HTTPS, configure your external reverse proxy (e.g. NPM) pointing to host IP.

  homeassistant:
    image: homeassistant/home-assistant:2024.11.3
    container_name: homeassistant
    restart: unless-stopped
    network_mode: host
    volumes:
      - ha-config:/config
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    privileged: true
    # NOTE: network_mode:host — HA is accessible directly at http://HOST_IP:8123
    # Traefik reverse proxy is NOT used with network_mode:host
    # Configure access via your reverse proxy externally, pointing to HOST_IP:8123
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:8123/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  esphome:
    image: ghcr.io/esphome/esphome:2024.11.0
    container_name: esphome
    restart: unless-stopped
    network_mode: host
    volumes:
      - esphome-config:/config
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    # NOTE: network_mode:host — ESPHome accessible at http://HOST_IP:6052
    # Traefik cannot proxy network_mode:host services directly
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:6052/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  node-red:
    image: nodered/node-red:4.0.3
    container_name: node-red
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - node-red-data:/data
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.nodered.rule=Host(`nodered.${DOMAIN}`)"
      - traefik.http.routers.nodered.entrypoints=websecure
      - traefik.http.routers.nodered.tls=true
      - traefik.http.services.nodered.loadbalancer.server.port=1880
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:1880/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mosquitto:
    image: eclipse-mosquitto:2.0.20
    container_name: mosquitto
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - mosquitto-data:/mosquitto/data
      - mosquitto-logs:/mosquitto/log
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto_passwd:/mosquitto/config/passwd:ro
    ports:
      - "1883:1883"
    healthcheck:
      test: [CMD-SHELL, "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  zigbee2mqtt:
    image: koenkk/zigbee2mqtt:1.41.0
    container_name: zigbee2mqtt
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - zigbee2mqtt-data:/app/data
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - ZIGBEE_ADAPTER=${ZIGBEE_ADAPTER:-/dev/ttyUSB0}
    devices:
      - ${ZIGBEE_ADAPTER:-/dev/ttyUSB0}:${ZIGBEE_ADAPTER:-/dev/ttyUSB0}
    depends_on:
      mosquitto:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - "traefik.http.routers.zigbee2mqtt.rule=Host(`zigbee.${DOMAIN}`)"
      - traefik.http.routers.zigbee2mqtt.entrypoints=websecure
      - traefik.http.routers.zigbee2mqtt.tls=true
      - traefik.http.services.zigbee2mqtt.loadbalancer.server.port=8080
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  proxy:
    external: true

volumes:
  ha-config:
  node-red-data:
  mosquitto-data:
  mosquitto-logs:
  zigbee2mqtt-data:
  esphome-config:
