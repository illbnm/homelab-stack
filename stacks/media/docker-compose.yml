# =============================================================================
# HomeLab Stack — Media Stack
# Services: Jellyfin + Sonarr + Radarr + Prowlarr + qBittorrent + Jellyseerr
#
# Prerequisites:
#   1. cp .env.example .env && fill in required values
#   2. Ensure 'proxy' network exists (created by base stack)
#   3. Create host directories:
#        mkdir -p ${MEDIA_PATH} ${DOWNLOAD_PATH}
#   4. docker compose up -d
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Jellyfin — Media Server
  # URL: https://media.${DOMAIN}
  # ---------------------------------------------------------------------------
  jellyfin:
    image: jellyfin/jellyfin:10.9.11
    container_name: jellyfin
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - jellyfin-config:/config
      - jellyfin-cache:/cache
      - ${MEDIA_PATH}:/media:ro
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - JELLYFIN_PublishedServerUrl=https://media.${DOMAIN}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.jellyfin.rule=Host(`media.${DOMAIN}`)"
      - traefik.http.routers.jellyfin.entrypoints=websecure
      - traefik.http.routers.jellyfin.tls=true
      - traefik.http.services.jellyfin.loadbalancer.server.port=8096
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:8096/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Jellyseerr — Media Request Management
  # URL: https://requests.${DOMAIN}
  # ---------------------------------------------------------------------------
  jellyseerr:
    image: fallenbagel/jellyseerr:2.1.0
    container_name: jellyseerr
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - jellyseerr-config:/app/config
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    depends_on:
      jellyfin:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - "traefik.http.routers.jellyseerr.rule=Host(`requests.${DOMAIN}`)"
      - traefik.http.routers.jellyseerr.entrypoints=websecure
      - traefik.http.routers.jellyseerr.tls=true
      - traefik.http.services.jellyseerr.loadbalancer.server.port=5055
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:5055/api/v1/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Sonarr — TV Series Management
  # URL: https://sonarr.${DOMAIN}
  # ---------------------------------------------------------------------------
  sonarr:
    image: linuxserver/sonarr:4.0.9
    container_name: sonarr
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - sonarr-config:/config
      - ${MEDIA_PATH}:/media
      - ${DOWNLOAD_PATH}:/downloads
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Asia/Shanghai}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.${DOMAIN}`)"
      - traefik.http.routers.sonarr.entrypoints=websecure
      - traefik.http.routers.sonarr.tls=true
      - traefik.http.services.sonarr.loadbalancer.server.port=8989
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:8989/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Radarr — Movie Management
  # URL: https://radarr.${DOMAIN}
  # ---------------------------------------------------------------------------
  radarr:
    image: linuxserver/radarr:5.11.0
    container_name: radarr
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - radarr-config:/config
      - ${MEDIA_PATH}:/media
      - ${DOWNLOAD_PATH}:/downloads
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Asia/Shanghai}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.radarr.rule=Host(`radarr.${DOMAIN}`)"
      - traefik.http.routers.radarr.entrypoints=websecure
      - traefik.http.routers.radarr.tls=true
      - traefik.http.services.radarr.loadbalancer.server.port=7878
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:7878/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Prowlarr — Indexer Manager
  # URL: https://prowlarr.${DOMAIN}
  # ---------------------------------------------------------------------------
  prowlarr:
    image: linuxserver/prowlarr:1.24.3
    container_name: prowlarr
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - prowlarr-config:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Asia/Shanghai}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.${DOMAIN}`)"
      - traefik.http.routers.prowlarr.entrypoints=websecure
      - traefik.http.routers.prowlarr.tls=true
      - traefik.http.services.prowlarr.loadbalancer.server.port=9696
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:9696/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # qBittorrent — Download Client
  # URL: https://bt.${DOMAIN}
  # ---------------------------------------------------------------------------
  qbittorrent:
    image: linuxserver/qbittorrent:4.6.7
    container_name: qbittorrent
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - qbittorrent-config:/config
      - ${DOWNLOAD_PATH}:/downloads
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Asia/Shanghai}
      - WEBUI_PORT=8080
    labels:
      - traefik.enable=true
      - "traefik.http.routers.qbittorrent.rule=Host(`bt.${DOMAIN}`)"
      - traefik.http.routers.qbittorrent.entrypoints=websecure
      - traefik.http.routers.qbittorrent.tls=true
      - traefik.http.services.qbittorrent.loadbalancer.server.port=8080
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# =============================================================================
# Networks
# =============================================================================
networks:
  proxy:
    external: true

# =============================================================================
# Volumes
# =============================================================================
volumes:
  jellyfin-config:
  jellyfin-cache:
  jellyseerr-config:
  sonarr-config:
  radarr-config:
  prowlarr-config:
  qbittorrent-config:
