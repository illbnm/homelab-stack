version: "3.8"

services:
  # =============================================================================
  # qBittorrent - 下载器
  # =============================================================================
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:4.6.7
    container_name: qbittorrent
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Asia/Shanghai}
      - WEBUI_PORT=8080
    volumes:
      - ${CONFIG_ROOT:-./config}/qbittorrent:/config
      - ${DOWNLOADS_ROOT:-/data/downloads}:/data/downloads
      - ${MEDIA_ROOT:-/data/media}:/data/media
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.${DOMAIN}`)"
      - "traefik.http.routers.qbittorrent.entrypoints=websecure"
      - "traefik.http.routers.qbittorrent.tls.certresolver=letsencrypt"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - media_network

  # =============================================================================
  # Prowlarr - 索引器管理
  # =============================================================================
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:1.22.0
    container_name: prowlarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - ${CONFIG_ROOT:-./config}/prowlarr:/config
      - ${DOWNLOADS_ROOT:-/data/downloads}:/data/downloads
      - ${MEDIA_ROOT:-/data/media}:/data/media
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.${DOMAIN}`)"
      - "traefik.http.routers.prowlarr.entrypoints=websecure"
      - "traefik.http.routers.prowlarr.tls.certresolver=letsencrypt"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - media_network
    depends_on:
      qbittorrent:
        condition: service_healthy

  # =============================================================================
  # Sonarr - 剧集管理
  # =============================================================================
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.11
    container_name: sonarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - ${CONFIG_ROOT:-./config}/sonarr:/config
      - ${DOWNLOADS_ROOT:-/data/downloads}/tv:/data/downloads/tv
      - ${MEDIA_ROOT:-/data/media}/tv:/data/media/tv
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.${DOMAIN}`)"
      - "traefik.http.routers.sonarr.entrypoints=websecure"
      - "traefik.http.routers.sonarr.tls.certresolver=letsencrypt"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - media_network
    depends_on:
      prowlarr:
        condition: service_healthy
      qbittorrent:
        condition: service_healthy

  # =============================================================================
  # Radarr - 电影管理
  # =============================================================================
  radarr:
    image: lscr.io/linuxserver/radarr:5.8.1
    container_name: radarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - ${CONFIG_ROOT:-./config}/radarr:/config
      - ${DOWNLOADS_ROOT:-/data/downloads}/movies:/data/downloads/movies
      - ${MEDIA_ROOT:-/data/media}/movies:/data/media/movies
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.${DOMAIN}`)"
      - "traefik.http.routers.radarr.entrypoints=websecure"
      - "traefik.http.routers.radarr.tls.certresolver=letsencrypt"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - media_network
    depends_on:
      prowlarr:
        condition: service_healthy
      qbittorrent:
        condition: service_healthy

  # =============================================================================
  # Jellyseerr - 请求管理
  # =============================================================================
  jellyseerr:
    image: fallenbagel/jellyseerr:2.1.1
    container_name: jellyseerr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - ${CONFIG_ROOT:-./config}/jellyseerr:/app/config
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyseerr.rule=Host(`jellyseerr.${DOMAIN}`)"
      - "traefik.http.routers.jellyseerr.entrypoints=websecure"
      - "traefik.http.routers.jellyseerr.tls.certresolver=letsencrypt"
      - "traefik.http.services.jellyseerr.loadbalancer.server.port=5055"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5055"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - media_network
    depends_on:
      sonarr:
        condition: service_healthy
      radarr:
        condition: service_healthy

  # =============================================================================
  # Jellyfin - 媒体服务器
  # =============================================================================
  jellyfin:
    image: jellyfin/jellyfin:10.9.11
    container_name: jellyfin
    user: ${PUID:-1000}:${PGID:-1000}
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - ${CONFIG_ROOT:-./config}/jellyfin:/config
      - ${CACHE_ROOT:-./cache}/jellyfin:/cache
      - ${MEDIA_ROOT:-/data/media}:/data/media:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.${DOMAIN}`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls.certresolver=letsencrypt"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - media_network
    depends_on:
      sonarr:
        condition: service_healthy
      radarr:
        condition: service_healthy

networks:
  media_network:
    name: media_network
    external: false
