services:
  # ─────────────────────────────────────────────
  # Jellyfin — 媒体服务器
  # ─────────────────────────────────────────────
  jellyfin:
    image: jellyfin/jellyfin:10.9.11
    container_name: jellyfin
    restart: unless-stopped
    networks:
      - internal
      - proxy
    volumes:
      - jellyfin-config:/config
      - jellyfin-cache:/cache
      - ${MEDIA_ROOT:-/data/media}:/data/media:ro
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Asia/Shanghai}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.${DOMAIN}`)"
      - traefik.http.routers.jellyfin.entrypoints=websecure
      - traefik.http.routers.jellyfin.tls=true
      - traefik.http.services.jellyfin.loadbalancer.server.port=8096
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:8096/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────
  # Sonarr — 剧集管理
  # ─────────────────────────────────────────────
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.11
    container_name: sonarr
    restart: unless-stopped
    networks:
      - internal
      - proxy
    volumes:
      - sonarr-config:/config
      - ${DATA_ROOT:-/data}:/data
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Asia/Shanghai}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.${DOMAIN}`)"
      - traefik.http.routers.sonarr.entrypoints=websecure
      - traefik.http.routers.sonarr.tls=true
      - traefik.http.services.sonarr.loadbalancer.server.port=8989
    depends_on:
      prowlarr:
        condition: service_healthy
      qbittorrent:
        condition: service_healthy
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:8989/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────
  # Radarr — 电影管理
  # ─────────────────────────────────────────────
  radarr:
    image: lscr.io/linuxserver/radarr:5.8.1
    container_name: radarr
    restart: unless-stopped
    networks:
      - internal
      - proxy
    volumes:
      - radarr-config:/config
      - ${DATA_ROOT:-/data}:/data
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Asia/Shanghai}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.radarr.rule=Host(`radarr.${DOMAIN}`)"
      - traefik.http.routers.radarr.entrypoints=websecure
      - traefik.http.routers.radarr.tls=true
      - traefik.http.services.radarr.loadbalancer.server.port=7878
    depends_on:
      prowlarr:
        condition: service_healthy
      qbittorrent:
        condition: service_healthy
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:7878/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────
  # Prowlarr — 索引器管理
  # ─────────────────────────────────────────────
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:1.22.0
    container_name: prowlarr
    restart: unless-stopped
    networks:
      - internal
      - proxy
    volumes:
      - prowlarr-config:/config
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Asia/Shanghai}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.${DOMAIN}`)"
      - traefik.http.routers.prowlarr.entrypoints=websecure
      - traefik.http.routers.prowlarr.tls=true
      - traefik.http.services.prowlarr.loadbalancer.server.port=9696
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:9696/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────────
  # qBittorrent — 下载器
  # ─────────────────────────────────────────────
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:4.6.7
    container_name: qbittorrent
    restart: unless-stopped
    networks:
      - internal
      - proxy
    volumes:
      - qbittorrent-config:/config
      - ${DATA_ROOT:-/data}/torrents:/data/torrents
    ports:
      - "6881:6881/tcp"
      - "6881:6881/udp"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Asia/Shanghai}
      - WEBUI_PORT=8080
    labels:
      - traefik.enable=true
      - "traefik.http.routers.qbittorrent.rule=Host(`qbt.${DOMAIN}`)"
      - traefik.http.routers.qbittorrent.entrypoints=websecure
      - traefik.http.routers.qbittorrent.tls=true
      - traefik.http.services.qbittorrent.loadbalancer.server.port=8080
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:8080/api/v2/app/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────────
  # Jellyseerr — 请求管理
  # ─────────────────────────────────────────────
  jellyseerr:
    image: fallenbagel/jellyseerr:2.1.1
    container_name: jellyseerr
    restart: unless-stopped
    networks:
      - internal
      - proxy
    volumes:
      - jellyseerr-config:/app/config
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.jellyseerr.rule=Host(`request.${DOMAIN}`)"
      - traefik.http.routers.jellyseerr.entrypoints=websecure
      - traefik.http.routers.jellyseerr.tls=true
      - traefik.http.services.jellyseerr.loadbalancer.server.port=5055
    depends_on:
      jellyfin:
        condition: service_healthy
    healthcheck:
      test: [CMD-SHELL, "wget -qO /dev/null http://localhost:5055/api/v1/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  internal:
    external: true
  proxy:
    external: true

volumes:
  jellyfin-config:
  jellyfin-cache:
  sonarr-config:
  radarr-config:
  prowlarr-config:
  qbittorrent-config:
  jellyseerr-config:
