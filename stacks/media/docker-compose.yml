version: '3.8'

volumes:
  # Media volumes (遵循 TRaSH Guides 硬链接最佳实践)
  torrents:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DOWNLOADS_ROOT:-/data/torrents}
  media:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${MEDIA_ROOT:-/data/media}

networks:
  proxy:
    external: true
  internal:
    external: true

services:
  # ------------------------------------------------------------------------
  # 下载器: qBittorrent
  # ------------------------------------------------------------------------
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:4.6.7
    container_name: qbittorrent
    restart: unless-stopped
    networks:
      - proxy
      - internal
    expose:
      - "8080"
      - "6881"
      - "6881/udp"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - WEBUI_PORT=8080
      # 可选: 设置连接限制
      # - MAX_CONNECTIONS=300
    volumes:
      - ./config/qbittorrent:/config
      - torrents:/downloads
      - media:/media
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.${DOMAIN}`)"
      - "traefik.http.routers.qbittorrent.entrypoints=websecure"
      - "traefik.http.routers.qbittorrent.tls=true"
      - "traefik.http.routers.qbittorrent.tls.certResolver=letsencrypt"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8080"

  # ------------------------------------------------------------------------
  # 索引器: Prowlarr
  # ------------------------------------------------------------------------
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:1.22.0
    container_name: prowlarr
    restart: unless-stopped
    networks:
      - proxy
      - internal
    depends_on:
      qbittorrent:
        condition: service_healthy
    expose:
      - "9696"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    volumes:
      - ./config/prowlarr:/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.${DOMAIN}`)"
      - "traefik.http.routers.prowlarr.entrypoints=websecure"
      - "traefik.http.routers.prowlarr.tls=true"
      - "traefik.http.routers.prowlarr.tls.certResolver=letsencrypt"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"

  # ------------------------------------------------------------------------
  # 剧集管理: Sonarr
  # ------------------------------------------------------------------------
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.11
    container_name: sonarr
    restart: unless-stopped
    networks:
      - proxy
      - internal
    depends_on:
      prowlarr:
        condition: service_healthy
      qbittorrent:
        condition: service_healthy
    expose:
      - "8989"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    volumes:
      - ./config/sonarr:/config
      - media:/tv
      - torrents:/downloads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/api/v3/system/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.${DOMAIN}`)"
      - "traefik.http.routers.sonarr.entrypoints=websecure"
      - "traefik.http.routers.sonarr.tls=true"
      - "traefik.http.routers.sonarr.tls.certResolver=letsencrypt"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"

  # ------------------------------------------------------------------------
  # 电影管理: Radarr
  # ------------------------------------------------------------------------
  radarr:
    image: lscr.io/linuxserver/radarr:5.8.1
    container_name: radarr
    restart: unless-stopped
    networks:
      - proxy
      - internal
    depends_on:
      prowlarr:
        condition: service_healthy
      qbittorrent:
        condition: service_healthy
    expose:
      - "7878"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    volumes:
      - ./config/radarr:/config
      - media:/movies
      - torrents:/downloads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878/api/v3/system/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.${DOMAIN}`)"
      - "traefik.http.routers.radarr.entrypoints=websecure"
      - "traefik.http.routers.radarr.tls=true"
      - "traefik.http.routers.radarr.tls.certResolver=letsencrypt"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"

  # ------------------------------------------------------------------------
  # 请求管理: Jellyseerr
  # ------------------------------------------------------------------------
  jellyseerr:
    image: fallenbagel/jellyseerr:2.1.1
    container_name: jellyseerr
    restart: unless-stopped
    networks:
      - proxy
      - internal
    depends_on:
      sonarr:
        condition: service_healthy
      radarr:
        condition: service_healthy
    expose:
      - "5055"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    volumes:
      - ./config/jellyseerr:/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5055"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyseerr.rule=Host(`jellyseerr.${DOMAIN}`)"
      - "traefik.http.routers.jellyseerr.entrypoints=websecure"
      - "traefik.http.routers.jellyseerr.tls=true"
      - "traefik.http.routers.jellyseerr.tls.certResolver=letsencrypt"
      - "traefik.http.services.jellyseerr.loadbalancer.server.port=5055"

  # ------------------------------------------------------------------------
  # 媒体服务器: Jellyfin
  # ------------------------------------------------------------------------
  jellyfin:
    image: jellyfin/jellyfin:10.9.11
    container_name: jellyfin
    restart: unless-stopped
    networks:
      - proxy
      - internal
    depends_on:
      sonarr:
        condition: service_healthy
      radarr:
        condition: service_healthy
    expose:
      - "8096"
      - "8920"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      # 可选: 硬件加速 (根据实际硬件选择)
      # - JELLYFIN_HW_DEVICE=vaapi
      # - JELLYFIN_HW_DEVICE_TYPE=vaapi
      # - JELLYFIN_VAAPI_DEVICE=/dev/dri/renderD128
    volumes:
      - ./config/jellyfin:/config
      - ./config/cache:/cache
      - media:/media
      - ./scripts/jellyfin-hw-detection.sh:/jellyfin-hw-detection.sh:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.${DOMAIN}`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls=true"
      - "traefik.http.routers.jellyfin.tls.certResolver=letsencrypt"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"