# =============================================================================
# HomeLab Stack — Media Services
# Services: Jellyfin (media server) + Sonarr (TV) + Radarr (movies)
#           + Prowlarr (indexers) + qBittorrent (downloads) + Jellyseerr (requests)
#
# Directory layout follows TRaSH Guides hardlink best practices:
#   /data/torrents/{movies,tv}   — download directories
#   /data/media/{movies,tv}      — organized media library
#
# Prerequisites:
#   1. cp .env.example .env && fill in required values
#   2. mkdir -p /data/{torrents/{movies,tv},media/{movies,tv}}
#   3. docker network create proxy  (if not already created)
#   4. docker compose up -d
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Jellyfin — Media Server
  # URL: https://jellyfin.${DOMAIN}
  # Docs: https://jellyfin.org/docs/
  # ---------------------------------------------------------------------------
  jellyfin:
    image: jellyfin/jellyfin:10.9.11
    container_name: homelab-jellyfin
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ}
      - JELLYFIN_PublishedServerUrl=https://jellyfin.${DOMAIN}
    volumes:
      - jellyfin-config:/config
      - jellyfin-cache:/cache
      # TRaSH Guides: mount entire /data so hardlinks work across media + torrents
      - ${DATA_ROOT:-/data}:/data:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.${DOMAIN}`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls.certresolver=letsencrypt"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
      - "traefik.docker.network=proxy"
      # Optional: Authentik forward-auth middleware
      # - "traefik.http.routers.jellyfin.middlewares=authentik@file"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      sonarr:
        condition: service_healthy
      radarr:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Sonarr — TV Series Management
  # URL: https://sonarr.${DOMAIN}
  # Docs: https://wiki.servarr.com/sonarr
  # ---------------------------------------------------------------------------
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: homelab-sonarr
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ}
    volumes:
      - sonarr-config:/config
      # TRaSH Guides: single /data mount for hardlinks
      - ${DATA_ROOT:-/data}:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.${DOMAIN}`)"
      - "traefik.http.routers.sonarr.entrypoints=websecure"
      - "traefik.http.routers.sonarr.tls.certresolver=letsencrypt"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
      - "traefik.docker.network=proxy"
      # Optional: Authentik forward-auth middleware
      # - "traefik.http.routers.sonarr.middlewares=authentik@file"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8989/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      prowlarr:
        condition: service_healthy
      qbittorrent:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Radarr — Movie Management
  # URL: https://radarr.${DOMAIN}
  # Docs: https://wiki.servarr.com/radarr
  # ---------------------------------------------------------------------------
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: homelab-radarr
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ}
    volumes:
      - radarr-config:/config
      # TRaSH Guides: single /data mount for hardlinks
      - ${DATA_ROOT:-/data}:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.${DOMAIN}`)"
      - "traefik.http.routers.radarr.entrypoints=websecure"
      - "traefik.http.routers.radarr.tls.certresolver=letsencrypt"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
      - "traefik.docker.network=proxy"
      # Optional: Authentik forward-auth middleware
      # - "traefik.http.routers.radarr.middlewares=authentik@file"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7878/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      prowlarr:
        condition: service_healthy
      qbittorrent:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Prowlarr — Indexer Manager
  # URL: https://prowlarr.${DOMAIN}
  # Docs: https://wiki.servarr.com/prowlarr
  # Connects Sonarr + Radarr to indexers automatically
  # ---------------------------------------------------------------------------
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: homelab-prowlarr
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ}
    volumes:
      - prowlarr-config:/config
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.${DOMAIN}`)"
      - "traefik.http.routers.prowlarr.entrypoints=websecure"
      - "traefik.http.routers.prowlarr.tls.certresolver=letsencrypt"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
      - "traefik.docker.network=proxy"
      # Optional: Authentik forward-auth middleware
      # - "traefik.http.routers.prowlarr.middlewares=authentik@file"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9696/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # qBittorrent — Download Client
  # URL: https://bt.${DOMAIN}
  # Default credentials: admin / check container logs for temp password
  # Docs: https://github.com/qbittorrent/qBittorrent/wiki
  # ---------------------------------------------------------------------------
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: homelab-qbittorrent
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    ports:
      # BitTorrent incoming connections (TCP + UDP)
      - "${BT_PORT:-6881}:6881"
      - "${BT_PORT:-6881}:6881/udp"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - qbittorrent-config:/config
      # TRaSH Guides: single /data mount for hardlinks
      - ${DATA_ROOT:-/data}:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qbittorrent.rule=Host(`bt.${DOMAIN}`)"
      - "traefik.http.routers.qbittorrent.entrypoints=websecure"
      - "traefik.http.routers.qbittorrent.tls.certresolver=letsencrypt"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8080"
      - "traefik.docker.network=proxy"
      # Optional: Authentik forward-auth middleware
      # - "traefik.http.routers.qbittorrent.middlewares=authentik@file"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Jellyseerr — Media Request Manager
  # URL: https://requests.${DOMAIN}
  # Users can request movies/shows, auto-sends to Sonarr/Radarr
  # Docs: https://docs.jellyseerr.dev/
  # ---------------------------------------------------------------------------
  jellyseerr:
    image: fallenbagel/jellyseerr:2.1.0
    container_name: homelab-jellyseerr
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    environment:
      - TZ=${TZ}
      - LOG_LEVEL=info
    volumes:
      - jellyseerr-config:/app/config
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyseerr.rule=Host(`requests.${DOMAIN}`)"
      - "traefik.http.routers.jellyseerr.entrypoints=websecure"
      - "traefik.http.routers.jellyseerr.tls.certresolver=letsencrypt"
      - "traefik.http.services.jellyseerr.loadbalancer.server.port=5055"
      - "traefik.docker.network=proxy"
      # Optional: Authentik forward-auth middleware
      # - "traefik.http.routers.jellyseerr.middlewares=authentik@file"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5055/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      jellyfin:
        condition: service_healthy
      sonarr:
        condition: service_healthy
      radarr:
        condition: service_healthy

# =============================================================================
# Networks
# NOTE: 'proxy' network is EXTERNAL — create it before first run:
#   docker network create proxy
# =============================================================================
networks:
  proxy:
    external: true

# =============================================================================
# Volumes — named volumes for persistent config data
# Media files live on host filesystem via DATA_ROOT bind mount
# =============================================================================
volumes:
  jellyfin-config:
    driver: local
  jellyfin-cache:
    driver: local
  sonarr-config:
    driver: local
  radarr-config:
    driver: local
  prowlarr-config:
    driver: local
  qbittorrent-config:
    driver: local
  jellyseerr-config:
    driver: local
