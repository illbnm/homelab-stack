# =============================================================================
# HomeLab Stack — Media Stack
# Services: Jellyfin + Sonarr + Radarr + Prowlarr + qBittorrent + Jellyseerr
# =============================================================================

services:
  # Jellyfin - Media server
  jellyfin:
    image: jellyfin/jellyfin:10.9.11
    container_name: jellyfin
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - jellyfin-config:/config
      - jellyfin-cache:/cache
      - ${MEDIA_PATH:-/data/media}:/data/media:ro
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    devices:
      - /dev/dri:/dev/dri  # For hardware transcoding (Intel QuickSync)
    labels:
      - traefik.enable=true
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.${DOMAIN}`)"
      - traefik.http.routers.jellyfin.entrypoints=websecure
      - traefik.http.routers.jellyfin.tls=true
      - traefik.http.services.jellyfin.loadbalancer.server.port=8096
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8096/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Sonarr - TV show automation
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.9
    container_name: sonarr
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - sonarr-config:/config
      - ${MEDIA_PATH:-/data/media}/tv:/data/tv
      - ${DOWNLOADS_PATH:-/data/downloads}:/downloads
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Asia/Shanghai}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.${DOMAIN}`)"
      - traefik.http.routers.sonarr.entrypoints=websecure
      - traefik.http.routers.sonarr.tls=true
      - traefik.http.services.sonarr.loadbalancer.server.port=8989
    depends_on:
      - jellyfin
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8989/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Radarr - Movie automation
  radarr:
    image: lscr.io/linuxserver/radarr:5.9.1
    container_name: radarr
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - radarr-config:/config
      - ${MEDIA_PATH:-/data/media}/movies:/data/movies
      - ${DOWNLOADS_PATH:-/data/downloads}:/downloads
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Asia/Shanghai}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.radarr.rule=Host(`radarr.${DOMAIN}`)"
      - traefik.http.routers.radarr.entrypoints=websecure
      - traefik.http.routers.radarr.tls=true
      - traefik.http.services.radarr.loadbalancer.server.port=7878
    depends_on:
      - jellyfin
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7878/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Prowlarr - Indexer manager
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:1.21.3
    container_name: prowlarr
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - prowlarr-config:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Asia/Shanghai}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.${DOMAIN}`)"
      - traefik.http.routers.prowlarr.entrypoints=websecure
      - traefik.http.routers.prowlarr.tls=true
      - traefik.http.services.prowlarr.loadbalancer.server.port=9696
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9696/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # qBittorrent - Download client
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.0.3
    container_name: qbittorrent
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - qbittorrent-config:/config
      - ${DOWNLOADS_PATH:-/data/downloads}:/downloads
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Asia/Shanghai}
      - WEBUI_PORT=8080
    ports:
      - "6881:6881/tcp"
      - "6881:6881/udp"
    labels:
      - traefik.enable=true
      - "traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.${DOMAIN}`)"
      - traefik.http.routers.qbittorrent.entrypoints=websecure
      - traefik.http.routers.qbittorrent.tls=true
      - traefik.http.services.qbittorrent.loadbalancer.server.port=8080
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v2/app/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Jellyseerr - Request management
  jellyseerr:
    image: fallenbagel/jellyseerr:1.9.1
    container_name: jellyseerr
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - jellyseerr-config:/app/config
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - LOG_LEVEL=info
    labels:
      - traefik.enable=true
      - "traefik.http.routers.jellyseerr.rule=Host(`requests.${DOMAIN}`)"
      - traefik.http.routers.jellyseerr.entrypoints=websecure
      - traefik.http.routers.jellyseerr.tls=true
      - traefik.http.services.jellyseerr.loadbalancer.server.port=5055
    depends_on:
      - jellyfin
      - sonarr
      - radarr
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5055/api/v1/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  proxy:
    external: true
    name: proxy

volumes:
  jellyfin-config:
  jellyfin-cache:
  sonarr-config:
  radarr-config:
  prowlarr-config:
  qbittorrent-config:
  jellyseerr-config:
