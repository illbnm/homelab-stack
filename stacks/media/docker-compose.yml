---
# Media Stack
# Services: Jellyfin, Sonarr, Radarr, Prowlarr, qBittorrent, Jellyseerr
# Depends on: base stack (proxy network + Traefik)

networks:
  proxy:
    external: true
  media_internal:
    name: media_internal
    driver: bridge
    internal: true

volumes:
  jellyfin_config:
  sonarr_config:
  radarr_config:
  prowlarr_config:
  qbittorrent_config:
  jellyseerr_config:

services:
  # ─────────────────────────────────────────────
  # qBittorrent — torrent downloader
  # Must start first as arr-stack depends on it
  # ─────────────────────────────────────────────
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:4.6.7
    container_name: qbittorrent
    restart: unless-stopped
    networks:
      - proxy
      - media_internal
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Asia/Shanghai}
      WEBUI_PORT: 8080
    volumes:
      - qbittorrent_config:/config
      - ${DOWNLOADS_ROOT:-/data/torrents}:/downloads
      - ${DOWNLOADS_ROOT:-/data/torrents}/movies:/downloads/movies
      - ${DOWNLOADS_ROOT:-/data/torrents}/tv:/downloads/tv
    labels:
      traefik.enable: "true"
      traefik.http.routers.qbittorrent.rule: "Host(`qbittorrent.${DOMAIN}`)"
      traefik.http.routers.qbittorrent.entrypoints: "websecure"
      traefik.http.routers.qbittorrent.tls: "true"
      traefik.http.routers.qbittorrent.tls.certresolver: "letsencrypt"
      traefik.http.services.qbittorrent.loadbalancer.server.port: "8080"
      com.centurylinklabs.watchtower.enable: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v2/app/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────────────────────────────────
  # Prowlarr — indexer manager (feeds Sonarr/Radarr)
  # ─────────────────────────────────────────────
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:1.22.0
    container_name: prowlarr
    restart: unless-stopped
    depends_on:
      qbittorrent:
        condition: service_healthy
    networks:
      - proxy
      - media_internal
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - prowlarr_config:/config
    labels:
      traefik.enable: "true"
      traefik.http.routers.prowlarr.rule: "Host(`prowlarr.${DOMAIN}`)"
      traefik.http.routers.prowlarr.entrypoints: "websecure"
      traefik.http.routers.prowlarr.tls: "true"
      traefik.http.routers.prowlarr.tls.certresolver: "letsencrypt"
      traefik.http.services.prowlarr.loadbalancer.server.port: "9696"
      com.centurylinklabs.watchtower.enable: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────
  # Sonarr — TV series management
  # ─────────────────────────────────────────────
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.11
    container_name: sonarr
    restart: unless-stopped
    depends_on:
      qbittorrent:
        condition: service_healthy
      prowlarr:
        condition: service_healthy
    networks:
      - proxy
      - media_internal
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - sonarr_config:/config
      - ${MEDIA_ROOT:-/data/media}:/data/media
      - ${DOWNLOADS_ROOT:-/data/torrents}:/data/torrents
    labels:
      traefik.enable: "true"
      traefik.http.routers.sonarr.rule: "Host(`sonarr.${DOMAIN}`)"
      traefik.http.routers.sonarr.entrypoints: "websecure"
      traefik.http.routers.sonarr.tls: "true"
      traefik.http.routers.sonarr.tls.certresolver: "letsencrypt"
      traefik.http.services.sonarr.loadbalancer.server.port: "8989"
      com.centurylinklabs.watchtower.enable: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────
  # Radarr — movie management
  # ─────────────────────────────────────────────
  radarr:
    image: lscr.io/linuxserver/radarr:5.8.1
    container_name: radarr
    restart: unless-stopped
    depends_on:
      qbittorrent:
        condition: service_healthy
      prowlarr:
        condition: service_healthy
    networks:
      - proxy
      - media_internal
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - radarr_config:/config
      - ${MEDIA_ROOT:-/data/media}:/data/media
      - ${DOWNLOADS_ROOT:-/data/torrents}:/data/torrents
    labels:
      traefik.enable: "true"
      traefik.http.routers.radarr.rule: "Host(`radarr.${DOMAIN}`)"
      traefik.http.routers.radarr.entrypoints: "websecure"
      traefik.http.routers.radarr.tls: "true"
      traefik.http.routers.radarr.tls.certresolver: "letsencrypt"
      traefik.http.services.radarr.loadbalancer.server.port: "7878"
      com.centurylinklabs.watchtower.enable: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────
  # Jellyfin — media server
  # ─────────────────────────────────────────────
  jellyfin:
    image: jellyfin/jellyfin:10.9.11
    container_name: jellyfin
    restart: unless-stopped
    networks:
      - proxy
      - media_internal
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      JELLYFIN_PublishedServerUrl: "https://jellyfin.${DOMAIN}"
    volumes:
      - jellyfin_config:/config
      - ${MEDIA_ROOT:-/data/media}:/data/media:ro
    # Uncomment for hardware acceleration (Intel Quick Sync):
    # devices:
    #   - /dev/dri:/dev/dri
    # Uncomment for hardware acceleration (NVIDIA):
    # runtime: nvidia
    # environment:
    #   NVIDIA_VISIBLE_DEVICES: all
    labels:
      traefik.enable: "true"
      traefik.http.routers.jellyfin.rule: "Host(`jellyfin.${DOMAIN}`)"
      traefik.http.routers.jellyfin.entrypoints: "websecure"
      traefik.http.routers.jellyfin.tls: "true"
      traefik.http.routers.jellyfin.tls.certresolver: "letsencrypt"
      traefik.http.services.jellyfin.loadbalancer.server.port: "8096"
      # Required for Jellyfin media streaming
      traefik.http.routers.jellyfin.middlewares: "compress@file"
      com.centurylinklabs.watchtower.enable: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────────────────────────────────
  # Jellyseerr — media request management
  # ─────────────────────────────────────────────
  jellyseerr:
    image: fallenbagel/jellyseerr:2.1.1
    container_name: jellyseerr
    restart: unless-stopped
    depends_on:
      jellyfin:
        condition: service_healthy
      sonarr:
        condition: service_healthy
      radarr:
        condition: service_healthy
    networks:
      - proxy
      - media_internal
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LOG_LEVEL: info
    volumes:
      - jellyseerr_config:/app/config
    labels:
      traefik.enable: "true"
      traefik.http.routers.jellyseerr.rule: "Host(`jellyseerr.${DOMAIN}`)"
      traefik.http.routers.jellyseerr.entrypoints: "websecure"
      traefik.http.routers.jellyseerr.tls: "true"
      traefik.http.routers.jellyseerr.tls.certresolver: "letsencrypt"
      traefik.http.services.jellyseerr.loadbalancer.server.port: "5055"
      com.centurylinklabs.watchtower.enable: "true"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:5055/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
