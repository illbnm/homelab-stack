# ============================================================================
# Gitea Configuration
# 参考: https://docs.gitea.com/installation/configuration
# ============================================================================

APP_NAME = Homelab Git
RUN_MODE = prod

[server]
DOMAIN           = gitea.homelab.local
HTTP_PORT        = 3000
ROOT_URL         = https://gitea.homelab.local/
DISABLE_SSH      = false
SSH_PORT         = 22
SSH_DOMAIN       = gitea.homelab.local
START_SSH_SERVER = false
OFFLINE_MODE     = false

[database]
DB_TYPE  = postgres
HOST     = postgres:5432
NAME     = gitea
USER     = gitea
PASSWD   = change-me
SSL_MODE = disable

[repository]
ROOT = /data/git/repositories

[repository.local]
LOCAL_COPY_PATH = /data/gitea/tmp/local-repo

[repository.upload]
TEMP_PATH = /data/gitea/tmp/uploads

[server]
APP_DATA_PATH    = /data/gitea
LFS_START_SERVER = true
LFS_JWT_SECRET   = change-me-$(date +%s)

[mailer]
ENABLED = false
# 示例 SMTP 配置 (取消注释启用)
# FROM       = noreply@homelab.local
# MAILER_TYPE = smtp
# SMTP_HOST  = smtp.example.com:587
# SMTP_USER  = user
# SMTP_PASSWD= password

[service]
REGISTER_EMAIL_CONFIRM            = false
ENABLE_NOTIFY_MAIL                = false
DISABLE_REGISTRATION              = true
ALLOW_ONLY_EXTERNAL_REGISTRATION  = false
ENABLE_CAPTCHA                     = false
REQUIRE_SIGNIN_VIEW                = true

[auth]
ENABLE_REGISTRATION = false
DISABLE_GITHUB_OAUTH = true
DISABLE_GOOGLE_OAUTH = true
ENABLE_OPENID_SIGNIN = false
ENABLE_OPENID_SIGNUP = false

[openid]
ENABLE_OPENID_SIGNIN = true
ENABLE_OPENID_SIGNUP = false
WHITELISTED_URIS = https://sso.homelab.local/application/o/gitea/

# Authentik 配置
ISSUERS = https://sso.homelab.local/application/o/gitea/
ISSUER = https://sso.homelab.local/application/o/gitea/

[oauth2_client]
ENABLE_AUTO_REGISTRATION = true
REGISTRATION_CAN_CREATE_ORG = false
UPDATE_PROFILE_ON_LOGIN = true

[repository.pull-request]
DEFAULT_MERGE_STYLE = merge

[repository.signing]
DEFAULT_SIGNING_KEY = default
ENABLED = false

[repository.issue]
DEFAULT_REPO_ISSUE_CONFIGS = default

[cache]
ENABLED = true
ADAPTER = memory
INTERVAL = 60

[session]
PROVIDER = file

[log]
MODE      = console,file
LEVEL     = Info
ROOT_PATH = /data/gitea/log