# Stirling PDF 额外配置
# 参考: https://github.com/Stirling-Tools/Stirling-PDF

# 应用设置
app:
  name: "Homelab PDF Studio"
  version: "0.30.2"

# 安全设置
security:
  enableSecurity: false  # 生产环境建议启用
  # 基本认证 (如启用)
  # basicAuth:
  #   username: "admin"
  #   password: "change-me"

# 限制设置
limits:
  maxFileSize: 5000  # MB (5GB)
  maxFiles: 10
  maxConcurrentJobs: 10

# 日志
logging:
  level: INFO
  file: /logs/stirling-pdf.log

# 性能调优
performance:
  threadPoolSize: 4
  memoryLimit: 2g

# 自定义配置
custom:
  # 允许的源 (CORS)
  allowedOrigins:
    - "https://pdf.homelab.local"
    - "https://*.homelab.local"
  # 默认语言
  defaultLanguage: zh-CN