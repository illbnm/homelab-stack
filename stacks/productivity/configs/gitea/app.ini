[security]
INSTALL_LOCK = true
SECRET_KEY = gitea_secret_key_change_me
INTERNAL_TOKEN = gitea_internal_token_change_me

[database]
DB_TYPE = postgres
HOST = postgres:5432
NAME = gitea
USER = gitea
PASSWD = gitea_password
SSL_MODE = disable
CHARSET = utf8

[repository]
ROOT = /data/git/repositories
SCRIPT_TYPE = bash
DEFAULT_BRANCH = main
DEFAULT_PRIVATE = last
ENABLE_PUSH_CREATE_USER = true
ENABLE_PUSH_CREATE_ORG = true

[server]
APP_DATA_PATH = /data
DOMAIN = git.homelab.local
SSH_DOMAIN = git.homelab.local
HTTP_PORT = 3000
ROOT_URL = https://git.homelab.local
DISABLE_SSH = false
SSH_PORT = 22
LFS_START_SERVER = true
LFS_CONTENT_PATH = /data/lfs
OFFLINE_MODE = false

[log]
MODE = console
LEVEL = Info
ROOT_PATH = /data/log

[mailer]
ENABLED = false

[service]
REGISTER_EMAIL_CONFIRM = false
ENABLE_NOTIFY_MAIL = false
DISABLE_REGISTRATION = false
ALLOW_ONLY_EXTERNAL_REGISTRATION = false
ENABLE_CAPTCHA = false
REQUIRE_SIGNIN_VIEW = false
DEFAULT_KEEP_EMAIL_PRIVATE = false
DEFAULT_ALLOW_CREATE_ORGANIZATION = true
DEFAULT_ENABLE_TIMETRACKING = true
NO_REPLY_ADDRESS = noreply.homelab.local

[openid]
ENABLE_OPENID_SIGNIN = true
ENABLE_OPENID_SIGNUP = true
WHITELISTED_URIS = authelia.homelab.local

[oauth2_client]
REGISTER_EMAIL_CONFIRM = false
OPENID_CONNECT_SCOPES = openid email profile groups
ENABLE_AUTO_REGISTRATION = true
USERNAME = preferred_username
ACCOUNT_LINKING = auto

[session]
PROVIDER = memory
COOKIE_SECURE = true
COOKIE_NAME = i_like_gitea
GC_INTERVAL_TIME = 86400

[picture]
DISABLE_GRAVATAR = false
ENABLE_FEDERATED_AVATAR = true

[attachment]
ENABLED = true
PATH = /data/attachments
ALLOWED_TYPES = image/jpeg,image/png,application/zip,application/gzip,application/pdf,text/plain
MAX_SIZE = 50
MAX_FILES = 10

[time]
DEFAULT_UI_LOCATION = UTC

[cron.update_mirrors]
SCHEDULE = @every 10m

[cron.repo_health_check]
SCHEDULE = @every 24h

[cron.check_repo_stats]
SCHEDULE = @every 24h

[git]
DEFAULT_PULL_REQUEST_MERGE_STYLE = merge

[indexer]
ISSUE_INDEXER_TYPE = bleve
ISSUE_INDEXER_PATH = /data/indexers/issues.bleve
REPO_INDEXER_ENABLED = true
REPO_INDEXER_PATH = /data/indexers/repos.bleve
MAX_FILE_SIZE = 1048576

[admin]
DISABLE_REGULAR_ORG_CREATION = false

[security]
PASSWORD_COMPLEXITY = lower,upper,digit
MIN_PASSWORD_LENGTH = 8
PASSWORD_CHECK_PWN = false
SUCCESSFUL_TOKENS_CACHE_SIZE = 20

[other]
SHOW_FOOTER_BRANDING = false
SHOW_FOOTER_VERSION = false
SHOW_FOOTER_TEMPLATE_LOAD_TIME = false
