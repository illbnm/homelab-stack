services:
  # ─────────────────────────────────────────────
  # Gitea — Git 代码托管
  # ─────────────────────────────────────────────
  gitea:
    image: gitea/gitea:1.22.2
    container_name: gitea
    restart: unless-stopped
    networks:
      - internal
      - proxy
    volumes:
      - gitea-data:/data
    ports:
      - "2222:22"
    environment:
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=postgres:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=gitea
      - GITEA__database__PASSWD=${GITEA_DB_PASSWORD:-changeme}
      - GITEA__server__ROOT_URL=https://git.${DOMAIN}/
      - GITEA__server__SSH_DOMAIN=git.${DOMAIN}
      - GITEA__server__SSH_PORT=2222
      - GITEA__server__LFS_START_SERVER=true
      - GITEA__service__DISABLE_REGISTRATION=${GITEA_DISABLE_REGISTRATION:-true}
      - GITEA__service__REQUIRE_SIGNIN_VIEW=true
      - GITEA__cache__ADAPTER=redis
      - GITEA__cache__HOST=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/2?pool_size=100&idle_timeout=180s
      - GITEA__session__PROVIDER=redis
      - GITEA__session__PROVIDER_CONFIG=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/2
      - GITEA__queue__TYPE=redis
      - GITEA__queue__CONN_STR=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/2
      - TZ=${TZ:-Asia/Shanghai}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - "traefik.http.routers.gitea.rule=Host(`git.${DOMAIN}`)"
      - traefik.http.routers.gitea.entrypoints=websecure
      - traefik.http.routers.gitea.tls=true
      - traefik.http.services.gitea.loadbalancer.server.port=3000
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:3000/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────
  # Vaultwarden — 密码管理器 (Bitwarden 兼容)
  # ─────────────────────────────────────────────
  vaultwarden:
    image: vaultwarden/server:1.32.0
    container_name: vaultwarden
    restart: unless-stopped
    networks:
      - internal
      - proxy
    volumes:
      - vaultwarden-data:/data
    environment:
      - DOMAIN=https://vault.${DOMAIN}
      - SIGNUPS_ALLOWED=${VAULTWARDEN_SIGNUPS:-false}
      - INVITATIONS_ALLOWED=true
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN:?VAULTWARDEN_ADMIN_TOKEN required}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_FROM=${SMTP_FROM:-vault@${DOMAIN}}
      - SMTP_USERNAME=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASS:-}
      - SMTP_SECURITY=starttls
      - WEBSOCKET_ENABLED=true
      - TZ=${TZ:-Asia/Shanghai}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.vaultwarden.rule=Host(`vault.${DOMAIN}`)"
      - traefik.http.routers.vaultwarden.entrypoints=websecure
      - traefik.http.routers.vaultwarden.tls=true
      - traefik.http.services.vaultwarden.loadbalancer.server.port=80
      # WebSocket
      - "traefik.http.routers.vaultwarden-ws.rule=Host(`vault.${DOMAIN}`) && Path(`/notifications/hub`)"
      - traefik.http.routers.vaultwarden-ws.entrypoints=websecure
      - traefik.http.routers.vaultwarden-ws.tls=true
      - traefik.http.routers.vaultwarden-ws.service=vaultwarden-ws
      - traefik.http.services.vaultwarden-ws.loadbalancer.server.port=3012
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:80/alive || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────────
  # Outline — 团队知识库
  # ─────────────────────────────────────────────
  outline:
    image: outlinewiki/outline:0.80.2
    container_name: outline
    restart: unless-stopped
    networks:
      - internal
      - proxy
    volumes:
      - outline-data:/var/lib/outline/data
    environment:
      - NODE_ENV=production
      - SECRET_KEY=${OUTLINE_SECRET_KEY:?OUTLINE_SECRET_KEY required}
      - UTILS_SECRET=${OUTLINE_UTILS_SECRET:?OUTLINE_UTILS_SECRET required}
      - DATABASE_URL=postgres://outline:${OUTLINE_DB_PASSWORD:-changeme}@postgres:5432/outline
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/1
      - URL=https://wiki.${DOMAIN}
      - PORT=3000
      - FILE_STORAGE=s3
      - FILE_STORAGE_UPLOAD_MAX_SIZE=26214400
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-changeme}
      - AWS_REGION=us-east-1
      - AWS_S3_UPLOAD_BUCKET_URL=https://s3.${DOMAIN}
      - AWS_S3_UPLOAD_BUCKET_NAME=outline
      - AWS_S3_FORCE_PATH_STYLE=true
      - AWS_S3_ACL=private
      - OIDC_CLIENT_ID=${OUTLINE_OIDC_CLIENT_ID:-}
      - OIDC_CLIENT_SECRET=${OUTLINE_OIDC_CLIENT_SECRET:-}
      - OIDC_AUTH_URI=${OUTLINE_OIDC_AUTH_URI:-}
      - OIDC_TOKEN_URI=${OUTLINE_OIDC_TOKEN_URI:-}
      - OIDC_USERINFO_URI=${OUTLINE_OIDC_USERINFO_URI:-}
      - OIDC_DISPLAY_NAME=Authentik
      - TZ=${TZ:-Asia/Shanghai}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - "traefik.http.routers.outline.rule=Host(`wiki.${DOMAIN}`)"
      - traefik.http.routers.outline.entrypoints=websecure
      - traefik.http.routers.outline.tls=true
      - traefik.http.services.outline.loadbalancer.server.port=3000
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:3000/_health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────
  # Stirling PDF — PDF 处理工具
  # ─────────────────────────────────────────────
  stirling-pdf:
    image: frooodle/s-pdf:0.30.2
    container_name: stirling-pdf
    restart: unless-stopped
    networks:
      - internal
      - proxy
    volumes:
      - stirling-data:/usr/share/tessdata
    environment:
      - DOCKER_ENABLE_SECURITY=false
      - TZ=${TZ:-Asia/Shanghai}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.stirling.rule=Host(`pdf.${DOMAIN}`)"
      - traefik.http.routers.stirling.entrypoints=websecure
      - traefik.http.routers.stirling.tls=true
      - traefik.http.services.stirling.loadbalancer.server.port=8080
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:8080/api/v1/info/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────
  # Excalidraw — 在线白板
  # ─────────────────────────────────────────────
  excalidraw:
    image: excalidraw/excalidraw:latest
    container_name: excalidraw
    restart: unless-stopped
    networks:
      - internal
      - proxy
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.excalidraw.rule=Host(`draw.${DOMAIN}`)"
      - traefik.http.routers.excalidraw.entrypoints=websecure
      - traefik.http.routers.excalidraw.tls=true
      - traefik.http.services.excalidraw.loadbalancer.server.port=80
    healthcheck:
      test: [CMD-SHELL, "wget -qO /dev/null http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  internal:
    external: true
  proxy:
    external: true

volumes:
  gitea-data:
  vaultwarden-data:
  outline-data:
  stirling-data:
