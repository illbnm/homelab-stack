version: '3.8'

services:
  # Shared Database
  productivity-postgres:
    image: postgres:16-alpine
    container_name: productivity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PRODUCTIVITY_DB_NAME:-productivity}
      POSTGRES_USER: ${PRODUCTIVITY_DB_USER:-productivity}
      POSTGRES_PASSWORD: ${PRODUCTIVITY_DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - productivity_postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - productivity-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PRODUCTIVITY_DB_USER:-productivity}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Shared Redis Cache
  productivity-redis:
    image: redis:7-alpine
    container_name: productivity-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - productivity_redis_data:/data
    networks:
      - productivity-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 3s
      retries: 5

  # Gitea - Git Repository Management
  gitea:
    image: gitea/gitea:1.21-rootless
    container_name: gitea
    restart: unless-stopped
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=productivity-postgres:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=${PRODUCTIVITY_DB_USER:-productivity}
      - GITEA__database__PASSWD=${PRODUCTIVITY_DB_PASSWORD}
      - GITEA__service__DISABLE_REGISTRATION=${GITEA_DISABLE_REGISTRATION:-true}
      - GITEA__server__DOMAIN=${GITEA_DOMAIN:-git.${DOMAIN}}
      - GITEA__server__SSH_DOMAIN=${GITEA_DOMAIN:-git.${DOMAIN}}
      - GITEA__server__ROOT_URL=https://${GITEA_DOMAIN:-git.${DOMAIN}}
      - GITEA__openid__ENABLE_OPENID_SIGNIN=true
      - GITEA__oauth2_client__ENABLE_AUTO_REGISTRATION=true
      - GITEA__security__SECRET_KEY=${GITEA_SECRET_KEY}
      - GITEA__security__INTERNAL_TOKEN=${GITEA_INTERNAL_TOKEN}
    volumes:
      - gitea_data:/var/lib/gitea
      - gitea_config:/etc/gitea
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "${GITEA_SSH_PORT:-2222}:2222"
    networks:
      - productivity-network
      - traefik-network
    depends_on:
      - productivity-postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gitea.rule=Host(`${GITEA_DOMAIN:-git.${DOMAIN}}`)"
      - "traefik.http.routers.gitea.entrypoints=websecure"
      - "traefik.http.routers.gitea.tls.certresolver=letsencrypt"
      - "traefik.http.services.gitea.loadbalancer.server.port=3000"

  # Vaultwarden - Password Manager
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      DOMAIN: https://${VAULTWARDEN_DOMAIN:-vault.${DOMAIN}}
      DATABASE_URL: postgresql://${PRODUCTIVITY_DB_USER:-productivity}:${PRODUCTIVITY_DB_PASSWORD}@productivity-postgres:5432/vaultwarden
      ADMIN_TOKEN: ${VAULTWARDEN_ADMIN_TOKEN}
      SENDS_ALLOWED: ${VAULTWARDEN_SENDS_ALLOWED:-true}
      EMERGENCY_ACCESS_ALLOWED: ${VAULTWARDEN_EMERGENCY_ACCESS:-true}
      WEB_VAULT_ENABLED: ${VAULTWARDEN_WEB_VAULT:-true}
      SIGNUPS_ALLOWED: ${VAULTWARDEN_SIGNUPS_ALLOWED:-false}
      INVITATIONS_ALLOWED: ${VAULTWARDEN_INVITATIONS_ALLOWED:-true}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURITY: ${SMTP_SECURITY:-starttls}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
    volumes:
      - vaultwarden_data:/data
    networks:
      - productivity-network
      - traefik-network
    depends_on:
      - productivity-postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vaultwarden.rule=Host(`${VAULTWARDEN_DOMAIN:-vault.${DOMAIN}}`)"
      - "traefik.http.routers.vaultwarden.entrypoints=websecure"
      - "traefik.http.routers.vaultwarden.tls.certresolver=letsencrypt"
      - "traefik.http.services.vaultwarden.loadbalancer.server.port=80"

  # Outline - Knowledge Base
  outline:
    image: outlinewiki/outline:latest
    container_name: outline
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SECRET_KEY: ${OUTLINE_SECRET_KEY}
      UTILS_SECRET: ${OUTLINE_UTILS_SECRET}
      DATABASE_URL: postgresql://${PRODUCTIVITY_DB_USER:-productivity}:${PRODUCTIVITY_DB_PASSWORD}@productivity-postgres:5432/outline
      REDIS_URL: redis://:${REDIS_PASSWORD}@productivity-redis:6379
      URL: https://${OUTLINE_DOMAIN:-docs.${DOMAIN}}
      PORT: 3000
      FILE_STORAGE: local
      FILE_STORAGE_LOCAL_ROOT_DIR: /var/lib/outline/data
      FILE_STORAGE_UPLOAD_MAX_SIZE: 26214400
      OIDC_CLIENT_ID: ${OUTLINE_OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OUTLINE_OIDC_CLIENT_SECRET}
      OIDC_AUTH_URI: ${OUTLINE_OIDC_AUTH_URI}
      OIDC_TOKEN_URI: ${OUTLINE_OIDC_TOKEN_URI}
      OIDC_USERINFO_URI: ${OUTLINE_OIDC_USERINFO_URI}
      OIDC_USERNAME_CLAIM: preferred_username
      OIDC_DISPLAY_NAME: ${OUTLINE_OIDC_DISPLAY_NAME:-SSO}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM}
      SMTP_REPLY_EMAIL: ${SMTP_FROM}
    volumes:
      - outline_data:/var/lib/outline/data
    networks:
      - productivity-network
      - traefik-network
    depends_on:
      - productivity-postgres
      - productivity-redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.outline.rule=Host(`${OUTLINE_DOMAIN:-docs.${DOMAIN}}`)"
      - "traefik.http.routers.outline.entrypoints=websecure"
      - "traefik.http.routers.outline.tls.certresolver=letsencrypt"
      - "traefik.http.services.outline.loadbalancer.server.port=3000"

  # Stirling PDF - PDF Tools
  stirling-pdf:
    image: frooodle/s-pdf:latest
    container_name: stirling-pdf
    restart: unless-stopped
    environment:
      DOCKER_ENABLE_SECURITY: ${STIRLING_SECURITY_ENABLED:-false}
      SECURITY_ENABLE_LOGIN: ${STIRLING_LOGIN_ENABLED:-false}
      SYSTEM_DEFAULTLOCALE: ${STIRLING_LOCALE:-en-US}
      UI_APPNAME: ${STIRLING_APP_NAME:-Stirling PDF}
      UI_HOMEDESCRIPTION: ${STIRLING_HOME_DESCRIPTION:-PDF Tools}
      UI_APPNAMENAVBAR: ${STIRLING_NAVBAR_NAME:-Stirling PDF}
    volumes:
      - stirling_data:/usr/share/tessdata
      - stirling_config:/configs
    networks:
      - productivity-network
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stirling.rule=Host(`${STIRLING_DOMAIN:-pdf.${DOMAIN}}`)"
      - "traefik.http.routers.stirling.entrypoints=websecure"
      - "traefik.http.routers.stirling.tls.certresolver=letsencrypt"
      - "traefik.http.services.stirling.loadbalancer.server.port=8080"

  # Excalidraw - Collaborative Whiteboard
  excalidraw:
    image: excalidraw/excalidraw:latest
    container_name: excalidraw
    restart: unless-stopped
    environment:
      REACT_APP_BACKEND_V2_GET_URL: https://${EXCALIDRAW_DOMAIN:-draw.${DOMAIN}}/api/v2/scenes/
      REACT_APP_BACKEND_V2_POST_URL: https://${EXCALIDRAW_DOMAIN:-draw.${DOMAIN}}/api/v2/scenes/
      REACT_APP_LIBRARY_URL: https://libraries.excalidraw.com
      REACT_APP_LIBRARY_BACKEND: https://us-central1-excalidraw-room-persistence.cloudfunctions.net/libraries
    networks:
      - productivity-network
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.excalidraw.rule=Host(`${EXCALIDRAW_DOMAIN:-draw.${DOMAIN}}`)"
      - "traefik.http.routers.excalidraw.entrypoints=websecure"
      - "traefik.http.routers.excalidraw.tls.certresolver=letsencrypt"
      - "traefik.http.services.excalidraw.loadbalancer.server.port=80"

volumes:
  productivity_postgres_data:
    driver: local
  productivity_redis_data:
    driver: local
  gitea_data:
    driver: local
  gitea_config:
    driver: local
  vaultwarden_data:
    driver: local
  outline_data:
    driver: local
  stirling_data:
    driver: local
  stirling_config:
    driver: local

networks:
  productivity-network:
    driver: bridge
  traefik-network:
    external: true
