# =============================================================================
# Productivity Stack
# Gitea (Self-hosted Git) + Vaultwarden (Bitwarden-compatible Password Manager)
# =============================================================================
# Usage:
#   cp .env.example .env && nano .env
#   docker compose up -d
# =============================================================================

networks:
  proxy:
    external: true
  productivity:
    name: productivity
    driver: bridge

services:
  # ---------------------------------------------------------------------------
  # Gitea — Self-hosted Git service
  # Dashboard: https://git.${DOMAIN}
  # Features: repositories, issues, CI/CD (Gitea Actions), packages
  # ---------------------------------------------------------------------------
  gitea:
    image: gitea/gitea:1.22
    container_name: gitea
    restart: unless-stopped
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__database__PATH=/data/gitea/gitea.db
      - GITEA__server__DOMAIN=${DOMAIN}
      - GITEA__server__ROOT_URL=https://git.${DOMAIN}
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__SSH_PORT=2222
      - GITEA__server__SSH_LISTEN_PORT=2222
      - GITEA__service__DISABLE_REGISTRATION=${GITEA_DISABLE_REGISTRATION:-true}
      - GITEA__service__REQUIRE_SIGNIN_VIEW=${GITEA_REQUIRE_SIGNIN:-true}
      - GITEA__mailer__ENABLED=false
      - GITEA__security__INSTALL_LOCK=true
      - TZ=${TZ}
    volumes:
      - gitea_data:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "2222:2222"   # SSH — for git clone via SSH
    networks:
      - proxy
      - productivity
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gitea.rule=Host(`git.${DOMAIN}`)"
      - "traefik.http.routers.gitea.entrypoints=websecure"
      - "traefik.http.routers.gitea.tls.certresolver=letsencrypt"
      - "traefik.http.routers.gitea.middlewares=lan-only@docker"
      - "traefik.http.services.gitea.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Vaultwarden — Bitwarden-compatible Password Manager Server
  # Dashboard: https://vault.${DOMAIN}
  # Compatible with all official Bitwarden clients
  # ---------------------------------------------------------------------------
  vaultwarden:
    image: vaultwarden/server:1.32.7
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      - DOMAIN=https://vault.${DOMAIN}
      - SIGNUPS_ALLOWED=${VAULTWARDEN_SIGNUPS:-false}
      - INVITATIONS_ALLOWED=${VAULTWARDEN_INVITATIONS:-true}
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN}
      - WEBSOCKET_ENABLED=true
      - LOG_LEVEL=warn
      - TZ=${TZ}
    volumes:
      - vaultwarden_data:/data
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      # Main web interface
      - "traefik.http.routers.vaultwarden.rule=Host(`vault.${DOMAIN}`)"
      - "traefik.http.routers.vaultwarden.entrypoints=websecure"
      - "traefik.http.routers.vaultwarden.tls.certresolver=letsencrypt"
      - "traefik.http.services.vaultwarden.loadbalancer.server.port=80"
      # WebSocket for live sync
      - "traefik.http.routers.vaultwarden-ws.rule=Host(`vault.${DOMAIN}`) && Path(`/notifications/hub`)"
      - "traefik.http.routers.vaultwarden-ws.entrypoints=websecure"
      - "traefik.http.routers.vaultwarden-ws.tls.certresolver=letsencrypt"
      - "traefik.http.services.vaultwarden-ws.loadbalancer.server.port=3012"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/alive || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  gitea_data:
    driver: local
  vaultwarden_data:
    driver: local
