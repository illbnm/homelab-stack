# =============================================================================
# HomeLab Stack — Productivity Stack
# Services: Gitea (git hosting) + Vaultwarden (password manager)
#           + Outline (knowledge base) + BookStack (wiki)
#           + Stirling-PDF (PDF tools) + Excalidraw (whiteboard)
#
# Prerequisites:
#   1. Base stack running (Traefik)
#   2. Databases stack running (PostgreSQL, Redis, MariaDB)
#   3. SSO stack running (Authentik) - optional but recommended
#   4. cp .env.example .env && fill in all values
#   5. docker compose up -d
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Gitea — Lightweight Git Hosting
  # URL: https://git.${DOMAIN}
  # Docs: https://docs.gitea.io/
  # ---------------------------------------------------------------------------
  gitea:
    image: gitea/gitea:1.22.3
    container_name: gitea
    restart: unless-stopped
    networks:
      - proxy
      - databases
    environment:
      - USER_UID=${PUID:-1000}
      - USER_GID=${PGID:-1000}
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=homelab-postgres:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=gitea
      - GITEA__database__PASSWD=${GITEA_DB_PASSWORD}
      - GITEA__server__DOMAIN=${DOMAIN}
      - GITEA__server__ROOT_URL=https://git.${DOMAIN}
      - GITEA__server__HTTP_PORT=3000
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__security__SECRET_KEY=${GITEA_SECRET_KEY}
      - GITEA__security__INTERNAL_TOKEN=${GITEA_INTERNAL_TOKEN}
      - GITEA__mailer__ENABLED=${GITEA_MAILER_ENABLED:-false}
      - GITEA__mailer__SMTP_ADDR=${SMTP_HOST}:${SMTP_PORT}
      - GITEA__mailer__FROM=${GITEA_MAIL_FROM:-git@${DOMAIN}}
      - GITEA__mailer__USER=${SMTP_USER}
      - GITEA__mailer__PASSWD=${SMTP_PASS}
      - GITEA__service__DISABLE_REGISTRATION=${GITEA_DISABLE_REGISTRATION:-true}
      - GITEA__service__REQUIRE_SIGNIN_VIEW=${GITEA_REQUIRE_SIGNIN_VIEW:-false}
      - GITEA__openid__ENABLE_OPENID_SIGNIN=${GITEA_OPENID_ENABLED:-true}
      - GITEA__openid__ENABLE_OPENID_SIGNUP=${GITEA_OPENID_SIGNUP:-false}
      - GITEA__oauth2__ENABLE=true
      - GITEA__oauth2__JWT_SECRET=${GITEA_OAUTH2_JWT_SECRET}
      - GITEA__actions__ENABLED=${GITEA_ACTIONS_ENABLED:-true}
      - GITEA__actions__DEFAULT_ACTIONS_URL=https://github.com
    volumes:
      - gitea-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gitea.rule=Host(`git.${DOMAIN}`)"
      - "traefik.http.routers.gitea.entrypoints=websecure"
      - "traefik.http.routers.gitea.tls.certresolver=letsencrypt"
      - "traefik.http.services.gitea.loadbalancer.server.port=3000"
      - "traefik.http.routers.gitea.middlewares=security-headers@file"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      - gitea-runner

  # ---------------------------------------------------------------------------
  # Gitea Actions Runner — CI/CD for Gitea repositories
  # Auto-registers with Gitea on first start
  # ---------------------------------------------------------------------------
  gitea-runner:
    image: gitea/act_runner:0.2.11
    container_name: gitea-runner
    restart: unless-stopped
    networks:
      - databases
    environment:
      - GITEA_INSTANCE_URL=https://git.${DOMAIN}
      - GITEA_RUNNER_REGISTRATION_TOKEN=${GITEA_RUNNER_TOKEN}
      - GITEA_RUNNER_NAME=homelab-runner
      - GITEA_RUNNER_LABELS=docker,linux,ubuntu
      - CONFIG_FILE=/config/config.yaml
    volumes:
      - gitea-runner-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/gitea-runner:/config:ro
    labels:
      - "traefik.enable=false"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD-SHELL", "pgrep act_runner || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Vaultwarden — Bitwarden-compatible Password Manager
  # URL: https://vault.${DOMAIN}
  # MUST use HTTPS for browser extensions to work
  # Docs: https://github.com/dani-garcia/vaultwarden
  # ---------------------------------------------------------------------------
  vaultwarden:
    image: vaultwarden/server:1.32.5
    container_name: vaultwarden
    restart: unless-stopped
    networks:
      - proxy
      - databases
    environment:
      - DOMAIN=https://vault.${DOMAIN}
      - SIGNUPS_ALLOWED=${VAULTWARDEN_SIGNUPS_ALLOWED:-false}
      - INVITATIONS_ALLOWED=${VAULTWARDEN_INVITATIONS_ALLOWED:-true}
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN}
      - DATABASE_URL=postgresql://vaultwarden:${VAULTWARDEN_DB_PASSWORD}@homelab-postgres:5432/vaultwarden
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_FROM=${VAULTWARDEN_SMTP_FROM:-vaultwarden@${DOMAIN}}
      - SMTP_FROM_NAME=Vaultwarden
      - SMTP_SECURITY=${SMTP_SECURITY:-starttls}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASS}
      - SMTP_TIMEOUT=15
      - LOG_LEVEL=warn
      - TZ=${TZ}
      - ROCKET_WORKERS=2
      - SHOW_PASSWORD_HINT=false
      - SIGNUPS_DOMAINS_WHITELIST=${VAULTWARDEN_SIGNUP_DOMAINS:-}
      - ADMIN_RATELIMIT_SECONDS=${VAULTWARDEN_ADMIN_RATELIMIT:-300}
      - ADMIN_RATELIMIT_MAX_BURST=${VAULTWARDEN_ADMIN_BURST:-3}
    volumes:
      - vaultwarden-data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vaultwarden.rule=Host(`vault.${DOMAIN}`)"
      - "traefik.http.routers.vaultwarden.entrypoints=websecure"
      - "traefik.http.routers.vaultwarden.tls.certresolver=letsencrypt"
      - "traefik.http.services.vaultwarden.loadbalancer.server.port=80"
      - "traefik.http.routers.vaultwarden.middlewares=security-headers@file"
      # WebSocket for real-time sync
      - "traefik.http.routers.vaultwarden-websocket.rule=Host(`vault.${DOMAIN}`) && Path(`/notifications/hub`)"
      - "traefik.http.routers.vaultwarden-websocket.entrypoints=websecure"
      - "traefik.http.routers.vaultwarden-websocket.tls.certresolver=letsencrypt"
      - "traefik.http.services.vaultwarden-websocket.loadbalancer.server.port=3012"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", curl, -sf, http://localhost:80/alive]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Outline — Team Knowledge Base
  # URL: https://docs.${DOMAIN}
  # Requires Authentik OIDC for authentication
  # Docs: https://docs.getoutline.com/
  # ---------------------------------------------------------------------------
  outline:
    image: outlinewiki/outline:0.81.1
    container_name: outline
    restart: unless-stopped
    networks:
      - proxy
      - databases
    environment:
      - NODE_ENV=production
      - SECRET_KEY=${OUTLINE_SECRET_KEY}
      - UTILS_SECRET=${OUTLINE_UTILS_SECRET}
      - DATABASE_URL=postgres://outline:${OUTLINE_DB_PASSWORD}@homelab-postgres:5432/outline?sslmode=disable
      - PGSSLMODE=disable
      - REDIS_URL=redis://:${REDIS_PASSWORD}@homelab-redis:6379
      - URL=https://docs.${DOMAIN}
      - PORT=3000
      - OIDC_CLIENT_ID=${OUTLINE_OAUTH_CLIENT_ID}
      - OIDC_CLIENT_SECRET=${OUTLINE_OAUTH_CLIENT_SECRET}
      - OIDC_AUTH_URI=https://${AUTHENTIK_DOMAIN}/application/o/authorize/
      - OIDC_TOKEN_URI=https://${AUTHENTIK_DOMAIN}/application/o/token/
      - OIDC_USERINFO_URI=https://${AUTHENTIK_DOMAIN}/application/o/userinfo/
      - OIDC_LOGOUT_URI=https://${AUTHENTIK_DOMAIN}/application/o/outline/end-session/
      - OIDC_DISPLAY_NAME=Authentik
      - OIDC_SCOPES=openid profile email
      - FILE_STORAGE=${OUTLINE_FILE_STORAGE:-local}
      - FILE_STORAGE_LOCAL_ROOT_DIR=/var/lib/outline/data
      - FILE_STORAGE_UPLOAD_MAX_SIZE=26214400
      # Optional: MinIO/S3 storage
      # - AWS_ACCESS_KEY_ID=${OUTLINE_S3_ACCESS_KEY}
      # - AWS_SECRET_ACCESS_KEY=${OUTLINE_S3_SECRET_KEY}
      # - AWS_REGION=${AWS_REGION:-us-east-1}
      # - AWS_S3_UPLOAD_BUCKET_URL=https://s3.${DOMAIN}
      # - AWS_S3_UPLOAD_BUCKET_NAME=outline
      # - AWS_S3_FORCE_PATH_STYLE=true
      # - AWS_S3_ACL=private
    volumes:
      - outline-data:/var/lib/outline/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.outline.rule=Host(`docs.${DOMAIN}`)"
      - "traefik.http.routers.outline.entrypoints=websecure"
      - "traefik.http.routers.outline.tls.certresolver=letsencrypt"
      - "traefik.http.services.outline.loadbalancer.server.port=3000"
      - "traefik.http.routers.outline.middlewares=security-headers@file"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/_health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # BookStack — Wiki / Documentation Platform
  # URL: https://wiki.${DOMAIN}
  # Docs: https://www.bookstackapp.com/docs/
  # ---------------------------------------------------------------------------
  bookstack:
    image: lscr.io/linuxserver/bookstack:v24.12.20241215
    container_name: bookstack
    restart: unless-stopped
    networks:
      - proxy
      - databases
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ}
      - APP_URL=https://wiki.${DOMAIN}
      - APP_KEY=${BOOKSTACK_APP_KEY}
      - DB_HOST=homelab-mariadb
      - DB_PORT=3306
      - DB_DATABASE=bookstack
      - DB_USERNAME=bookstack
      - DB_PASSWORD=${BOOKSTACK_DB_PASSWORD}
      - AUTH_METHOD=${BOOKSTACK_AUTH_METHOD:-standard}
      - OIDC_CLIENT_ID=${BOOKSTACK_OIDC_CLIENT_ID}
      - OIDC_CLIENT_SECRET=${BOOKSTACK_OIDC_CLIENT_SECRET}
      - OIDC_ISSUER=https://${AUTHENTIK_DOMAIN}/application/o/bookstack/
      - OIDC_NAME=Authentik
      - OIDC_DUMP_USER_DETAILS=false
      - OIDC_AUTO_REGISTER=true
      - OIDC_AUTO_CONFIRM_EMAIL=true
    volumes:
      - bookstack-data:/config
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bookstack.rule=Host(`wiki.${DOMAIN}`)"
      - "traefik.http.routers.bookstack.entrypoints=websecure"
      - "traefik.http.routers.bookstack.tls.certresolver=letsencrypt"
      - "traefik.http.services.bookstack.loadbalancer.server.port=80"
      - "traefik.http.routers.bookstack.middlewares=security-headers@file"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Stirling-PDF — PDF Manipulation Tool
  # URL: https://pdf.${DOMAIN}
  # Docs: https://github.com/Stirling-Tools/Stirling-PDF
  # ---------------------------------------------------------------------------
  stirling-pdf:
    image: frooodle/s-pdf:0.36.6
    container_name: stirling-pdf
    restart: unless-stopped
    networks:
      - proxy
    environment:
      - TZ=${TZ}
      - DOCKER_ENABLE_SECURITY=${STIRLING_SECURITY_ENABLED:-false}
      - SECURITY_ENABLE_LOGIN=${STIRLING_SECURITY_ENABLED:-false}
      - SECURITY_INITIAL_LOGIN_USERNAME=${STIRLING_ADMIN_USER:-admin}
      - SECURITY_INITIAL_LOGIN_PASSWORD=${STIRLING_ADMIN_PASSWORD}
      - SYSTEM_DEFAULTLOCALE=en-US
      - UI_APPNAME=Stirling PDF
      - UI_HOMEDESCRIPTION=PDF Tools for Homelab
      - UI_APPNAMENAVBAR=Stirling PDF
      - SYSTEM_MAXFILESIZE=100
      - METRICS_ENABLED=false
    volumes:
      - stirling-pdf-data:/usr/share/tessdata
      - stirling-pdf-config:/configs
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stirling-pdf.rule=Host(`pdf.${DOMAIN}`)"
      - "traefik.http.routers.stirling-pdf.entrypoints=websecure"
      - "traefik.http.routers.stirling-pdf.tls.certresolver=letsencrypt"
      - "traefik.http.services.stirling-pdf.loadbalancer.server.port=8080"
      - "traefik.http.routers.stirling-pdf.middlewares=security-headers@file"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v1/info/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Excalidraw — Virtual Whiteboard
  # URL: https://draw.${DOMAIN}
  # Docs: https://docs.excalidraw.com/
  # ---------------------------------------------------------------------------
  excalidraw:
    image: excalidraw/excalidraw:latest
    container_name: excalidraw
    restart: unless-stopped
    networks:
      - proxy
    environment:
      - NODE_ENV=production
      - TZ=${TZ}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.excalidraw.rule=Host(`draw.${DOMAIN}`)"
      - "traefik.http.routers.excalidraw.entrypoints=websecure"
      - "traefik.http.routers.excalidraw.tls.certresolver=letsencrypt"
      - "traefik.http.services.excalidraw.loadbalancer.server.port=80"
      - "traefik.http.routers.excalidraw.middlewares=security-headers@file"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# =============================================================================
# Networks
# =============================================================================
networks:
  proxy:
    external: true
  databases:
    external: true

# =============================================================================
# Volumes
# =============================================================================
volumes:
  gitea-data:
  gitea-runner-data:
  vaultwarden-data:
  outline-data:
  bookstack-data:
  stirling-pdf-data:
  stirling-pdf-config:
