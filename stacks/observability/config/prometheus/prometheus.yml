global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'homelab'

scrape_configs:
  # Prometheus 自监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # cAdvisor - 容器指标
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Node Exporter - 主机指标
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Traefik - 反代指标
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8080']

  # Authentik - SSO 指标
  - job_name: 'authentik'
    static_configs:
      - targets: ['authentik:9000']

  # Nextcloud - 存储指标
  - job_name: 'nextcloud'
    static_configs:
      - targets: ['nextcloud:80']
    metrics_path: /status

  # Gitea - 代码托管指标
  - job_name: 'gitea'
    static_configs:
      - targets: ['gitea:3000']
    metrics_path: /metrics

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
