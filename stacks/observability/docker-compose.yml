# =============================================================================
# HomeLab Stack — Observability Stack
# Services: Prometheus + Grafana + Loki + Tempo + Alertmanager + Uptime Kuma
#
# Complete observability solution covering Metrics, Logs, Traces, and Alerting.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Prometheus — Metrics collection
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    networks:
      - proxy
      - observability
    volumes:
      - prometheus-data:/prometheus
      - ../config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../config/prometheus/alerts:/etc/prometheus/alerts:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--web.route-prefix=/'
    labels:
      - traefik.enable=true
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.${DOMAIN}`)"
      - traefik.http.routers.prometheus.entrypoints=websecure
      - traefik.http.routers.prometheus.tls=true
      - traefik.http.services.prometheus.loadbalancer.server.port=9090
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Grafana — Visualization dashboards
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.2.2
    container_name: grafana
    restart: unless-stopped
    networks:
      - proxy
      - observability
    volumes:
      - grafana-data:/var/lib/grafana
      - ../config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://grafana.${DOMAIN}
      - GF_AUTH_GENERIC_OAUTH_ENABLED=true
      - GF_AUTH_GENERIC_OAUTH_NAME=Authentik
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=${GRAFANA_OAUTH_CLIENT_ID}
      - GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=${GRAFANA_OAUTH_CLIENT_SECRET}
      - GF_AUTH_GENERIC_OAUTH_SCOPES=openid profile email
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=https://auth.${DOMAIN}/application/o/authorize/
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=https://auth.${DOMAIN}/application/o/token/
      - GF_AUTH_GENERIC_OAUTH_API_URL=https://auth.${DOMAIN}/application/o/userinfo/
    labels:
      - traefik.enable=true
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)"
      - traefik.http.routers.grafana.entrypoints=websecure
      - traefik.http.routers.grafana.tls=true
      - traefik.http.services.grafana.loadbalancer.server.port=3000
    depends_on:
      - prometheus
      - loki
      - tempo
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Loki — Log aggregation
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.2.0
    container_name: loki
    restart: unless-stopped
    networks:
      - observability
    volumes:
      - loki-data:/loki
      - ../config/loki/loki.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    labels:
      - traefik.enable=true
      - "traefik.http.routers.loki.rule=Host(`loki.${DOMAIN}`)"
      - traefik.http.routers.loki.entrypoints=websecure
      - traefik.http.routers.loki.tls=true
      - traefik.http.services.loki.loadbalancer.server.port=3100
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Promtail — Log collection agent
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:3.2.0
    container_name: promtail
    restart: unless-stopped
    networks:
      - observability
    volumes:
      - ../config/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9080/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Tempo — Distributed tracing
  # ---------------------------------------------------------------------------
  tempo:
    image: grafana/tempo:2.6.0
    container_name: tempo
    restart: unless-stopped
    networks:
      - observability
    volumes:
      - tempo-data:/tmp/tempo
      - ../config/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
    command: -config.file=/etc/tempo/tempo.yml
    labels:
      - traefik.enable=true
      - "traefik.http.routers.tempo.rule=Host(`tempo.${DOMAIN}`)"
      - traefik.http.routers.tempo.entrypoints=websecure
      - traefik.http.routers.tempo.tls=true
      - traefik.http.services.tempo.loadbalancer.server.port=3200
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3200/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Alertmanager — Alert routing
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    networks:
      - observability
    volumes:
      - alertmanager-data:/alertmanager
      - ../config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=https://alertmanager.${DOMAIN}'
      - '--cluster.listen-address='
    labels:
      - traefik.enable=true
      - "traefik.http.routers.alertmanager.rule=Host(`alertmanager.${DOMAIN}`)"
      - traefik.http.routers.alertmanager.entrypoints=websecure
      - traefik.http.routers.alertmanager.tls=true
      - traefik.http.services.alertmanager.loadbalancer.server.port=9093
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9093/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # cAdvisor — Container metrics
  # ---------------------------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.50.0
    container_name: cadvisor
    restart: unless-stopped
    networks:
      - observability
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    labels:
      - traefik.enable=true
      - "traefik.http.routers.cadvisor.rule=Host(`cadvisor.${DOMAIN}`)"
      - traefik.http.routers.cadvisor.entrypoints=websecure
      - traefik.http.routers.cadvisor.tls=true
      - traefik.http.services.cadvisor.loadbalancer.server.port=8080
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Node Exporter — Host metrics
  # ---------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    networks:
      - observability
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    labels:
      - traefik.enable=true
      - "traefik.http.routers.node-exporter.rule=Host(`node.${DOMAIN}`)"
      - traefik.http.routers.node-exporter.entrypoints=websecure
      - traefik.http.routers.node-exporter.tls=true
      - traefik.http.services.node-exporter.loadbalancer.server.port=9100
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9100/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Uptime Kuma — Service availability monitoring
  # ---------------------------------------------------------------------------
  uptime-kuma:
    image: louislam/uptime-kuma:1.23.15
    container_name: uptime-kuma
    restart: unless-stopped
    networks:
      - proxy
      - observability
    volumes:
      - uptime-kuma-data:/app/data
    labels:
      - traefik.enable=true
      - "traefik.http.routers.uptime-kuma.rule=Host(`uptime.${DOMAIN}`)"
      - traefik.http.routers.uptime-kuma.entrypoints=websecure
      - traefik.http.routers.uptime-kuma.tls=true
      - traefik.http.services.uptime-kuma.loadbalancer.server.port=3001
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Grafana OnCall — Alert management & on-call scheduling
  # ---------------------------------------------------------------------------
  oncall:
    image: grafana/oncall:v1.9.22
    container_name: oncall
    restart: unless-stopped
    networks:
      - observability
    volumes:
      - oncall-data:/var/lib/oncall
    environment:
      - SECRET_KEY=${ONCALL_SECRET_KEY:-changeme}
      - BASE_URL=https://oncall.${DOMAIN}
      - DATABASE_URL=sqlite:////var/lib/oncall/oncall.db
      - TELEGRAM_API_KEY=${TELEGRAM_API_KEY:-}
    labels:
      - traefik.enable=true
      - "traefik.http.routers.oncall.rule=Host(`oncall.${DOMAIN}`)"
      - traefik.http.routers.oncall.entrypoints=websecure
      - traefik.http.routers.oncall.tls=true
      - traefik.http.services.oncall.loadbalancer.server.port=8080
    depends_on:
      - grafana
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  observability:
    name: observability
  proxy:
    external: true
    name: proxy

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:
  alertmanager-data:
  uptime-kuma-data:
  oncall-data:
