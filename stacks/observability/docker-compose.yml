version: '3.8'

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local
  promtail-data:
    driver: local
  tempo-data:
    driver: local
  alertmanager-data:
    driver: local
  uptime-kuma-data:
    driver: local

networks:
  proxy:
    external: true
  internal:
    external: true

services:
  # ------------------------------------------------------------------------
  # Node Exporter - 主机指标采集
  # ------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    networks:
      - internal
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=false"  # 不暴露到外网

  # ------------------------------------------------------------------------
  # cAdvisor - 容器资源指标
  # ------------------------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.50.0
    container_name: cadvisor
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=false"

  # ------------------------------------------------------------------------
  # Prometheus - 指标采集与存储
  # ------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    networks:
      - internal
      - proxy  # 可通过 Traefik 暴露（可选）
    volumes:
      - prometheus-data:/prometheus
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alerts:/etc/prometheus/alerts:ro
      - ./config/prometheus/rules:/etc/prometheus/rules:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'
      - '--query.max-concurrency=10'
      - '--query.timeout=2m'
      - '--query.max-samples=50000000'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.${DOMAIN}`)"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.tls=true"
      - "traefik.http.routers.prometheus.tls.certResolver=letsencrypt"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
      - "traefik.http.routers.prometheus.middlewares=readonly@file"  # 只读中间件

  # ------------------------------------------------------------------------
  # Alertmanager - 告警路由与去重
  # ------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    networks:
      - internal
      - proxy
    volumes:
      - alertmanager-data:/data
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/data'
      - '--web.listen-address=:9093'
      - '--cluster.listen-address=0.0.0.0:9094'
      - '--cluster.peer=alertmanager:9094'
      - '--log.level=info'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.alertmanager.rule=Host(`alerts.${DOMAIN}`)"
      - "traefik.http.routers.alertmanager.entrypoints=websecure"
      - "traefik.http.routers.alertmanager.tls=true"
      - "traefik.http.routers.alertmanager.tls.certResolver=letsencrypt"
      - "traefik.http.services.alertmanager.loadbalancer.server.port=9093"

  # ------------------------------------------------------------------------
  # Loki - 日志聚合
  # ------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.2.0
    container_name: loki
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - loki-data:/loki
      - ./config/loki/loki.yml:/etc/loki/loki.yml:ro
    command: -config.file=/etc/loki/loki.yml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=false"  # 通过 Grafana 访问，不单独暴露

  # ------------------------------------------------------------------------
  # Promtail - 日志采集 Agent
  # ------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:3.2.0
    container_name: promtail
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/loki/promtail.yml:/etc/promtail/promtail.yml:ro
      - promtail-data:/promtail
    command: -config.file=/etc/promtail/promtail.yml
    depends_on:
      loki:
        condition: service_healthy
    labels:
      - "traefik.enable=false"

  # ------------------------------------------------------------------------
  # Tempo - 分布式链路追踪
  # ------------------------------------------------------------------------
  tempo:
    image: grafana/tempo:2.6.0
    container_name: tempo
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - tempo-data:/tempo
      - ./config/tempo/tempo.yml:/etc/tempo.yml:ro
    command: -config.file=/etc/tempo.yml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=false"  # 通过 Grafana 访问

  # ------------------------------------------------------------------------
  # Grafana - 可视化面板
  # ------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.2.2
    container_name: grafana
    restart: unless-stopped
    networks:
      - proxy
      - internal
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
      alertmanager:
        condition: service_healthy
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      # OIDC 集成 (与 SSO Stack 配合)
      # - GF_AUTH_GENERIC_OAUTH_ENABLED=true
      # - GF_AUTH_GENERIC_OAUTH_NAME=Authentik
      # - GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP=true
      # - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=${GRAFANA_OAUTH_CLIENT_ID}
      # - GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=${GRAFANA_OAUTH_CLIENT_SECRET}
      # - GF_AUTH_GENERIC_OAUTH_AUTH_URL=https://auth.${DOMAIN}/application/o/authorize/
      # - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=https://auth.${DOMAIN}/application/o/token/
      # - GF_AUTH_GENERIC_OAUTH_API_URL=https://auth.${DOMAIN}/application/v1/users/@me
      # - GF_AUTH_GENERIC_OAUTH_SCOPES=openid profile email
      # - GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH=groups[*]@.contains('homelab-admins') ? 'Admin' : 'Viewer'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certResolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
      # 可选: 与 SSO Stack 集成 ForwardAuth
      # - "traefik.http.routers.grafana.middlewares=auth@docker"

  # ------------------------------------------------------------------------
  # Uptime Kuma - 服务可用性监控
  # ------------------------------------------------------------------------
  uptime-kuma:
    image: louislam/uptime-kuma:1.23.15
    container_name: uptime-kuma
    restart: unless-stopped
    networks:
      - proxy
      - internal
    volumes:
      - uptime-kuma-data:/app/data
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uptime-kuma.rule=Host(`status.${DOMAIN}`)"
      - "traefik.http.routers.uptime-kuma.entrypoints=websecure"
      - "traefik.http.routers.uptime-kuma.tls=true"
      - "traefik.http.routers.uptime-kuma.tls.certResolver=letsencrypt"
      - "traefik.http.services.uptime-kuma.loadbalancer.server.port=3001"

  # ------------------------------------------------------------------------
  # Grafana OnCall (可选 - 值班管理)
  # ------------------------------------------------------------------------
  grafana-oncall:
    image: grafana/oncall:v1.9.22
    container_name: grafana-oncall
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - alertmanager-data:/app
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      # 配置数据库 (生产环境使用 PostgreSQL)
      - ONCALL_DB_TYPE=sqlite
      # 集成 Alertmanager
      - ONCALL_ALERTMANAGER_URL=http://alertmanager:9093
      # 集成 Grafana
      - ONCALL_GRAFANA_URL=http://grafana:3000
      # 通知通道 (与 Notifications Stack 集成)
      # - ONCALL_NOTIFICATION_URL=https://ntfy.${DOMAIN}/oncall
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=false"  # 可选暴露，通常内网访问