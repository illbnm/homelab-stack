# =============================================================================
# AI Stack — GPU 自适应配置
# 支持 NVIDIA GPU (CUDA) / AMD GPU (ROCm) / CPU fallback
# =============================================================================
# 使用方法:
# 1. NVIDIA GPU: 
#    export GPU_TYPE=nvidia && docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
# 2. AMD GPU:
#    export GPU_TYPE=amd && docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
# 3. CPU Only:
#    export GPU_TYPE=cpu && docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
# =============================================================================

services:
  # -------------------------------------------------------------------------
  # Ollama - LLM 推理引擎
  # -------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:0.3.14
    container_name: ollama
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*
      # GPU 配置
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
    deploy:
      resources:
        reservations:
          devices:
            # NVIDIA GPU
            - driver: nvidia
              count: ${GPU_COUNT:-1}
              capabilities: [gpu]
            # AMD GPU (需要 container 支持 ROCm)
            - driver: amd
              count: ${GPU_COUNT:-1}
              capabilities: [gpu]
    labels:
      - traefik.enable=true
      - "traefik.http.routers.ollama.rule=Host(`ollama.${DOMAIN}`)"
      - traefik.http.routers.ollama.entrypoints=websecure
      - traefik.http.routers.ollama.tls=true
      - traefik.http.services.ollama.loadbalancer.server.port=11434
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # -------------------------------------------------------------------------
  # Open WebUI - LLM Web 界面
  # -------------------------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.3.35
    container_name: open-webui
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-changeme-secret-32chars}
      - DEFAULT_LOCALE=zh-CN
      # 启用 GPU 加速推理 (如果 Ollama 支持)
      - ENABLE_RAG_WEB_SEARCH=true
    depends_on:
      ollama:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - "traefik.http.routers.open-webui.rule=Host(`ai.${DOMAIN}`)"
      - traefik.http.routers.open-webui.entrypoints=websecure
      - traefik.http.routers.open-webui.tls=true
      - traefik.http.services.open-webui.loadbalancer.server.port=8080
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # -------------------------------------------------------------------------
  # Stable Diffusion - 图像生成
  # -------------------------------------------------------------------------
  stable-diffusion:
    image: ghcr.io/abiosoft/sd-webui-docker:cpu-v1.10.1
    container_name: stable-diffusion
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - sd-models:/app/models
      - sd-output:/app/outputs
      - sd-sd-models:/stable-diffusion-webui/models
    environment:
      # CPU 模式 (默认)
      - COMMANDLINE_ARGS=--no-half --skip-torch-cuda-test --use-cpu all
      # NVIDIA GPU 模式 (取消注释并使用 GPU)
      # - COMMANDLINE_ARGS=--listen --api --ckpt-dir /app/models
      # AMD GPU 模式
      # - COMMANDLINE_ARGS=--listen --api --use-directml
      - SD_WEBUI_USERNAME=${SD_USERNAME:-admin}
      - SD_WEBUI_PASSWORD=${SD_PASSWORD:-admin123}
    # GPU 配置 (取消注释以启用)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    labels:
      - traefik.enable=true
      - "traefik.http.routers.sd.rule=Host(`sd.${DOMAIN}`)"
      - traefik.http.routers.sd.entrypoints=websecure
      - traefik.http.routers.sd.tls=true
      - traefik.http.services.sd.loadbalancer.server.port=7860
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7860/ || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s

  # -------------------------------------------------------------------------
  # Perplexica - AI 搜索引擎
  # -------------------------------------------------------------------------
  perplexica:
    image: itzcrazykns1337/perplexica:main
    container_name: perplexica
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - perplexica-config:/app/config
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - PERPLEXICA_SECRET_KEY=${PERPLEXICA_SECRET_KEY:-changeme-secret}
    depends_on:
      ollama:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - "traefik.http.routers.perplexica.rule=Host(`perplexica.${DOMAIN}`)"
      - traefik.http.routers.perplexica.entrypoints=websecure
      - traefik.http.routers.perplexica.tls=true
      - traefik.http.services.perplexica.loadbalancer.server.port=3000
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  proxy:
    external: true

volumes:
  ollama-data:
  open-webui-data:
  sd-models:
  sd-output:
  sd-sd-models:
  perplexica-config:
