# =============================================================================
# HomeLab Stack ˇŞ AI Services
# Services: Ollama + Open WebUI + Stable Diffusion + Perplexica
#
# GPU Support:
#   Set OLLAMA_GPU_ENABLED=true in .env to enable NVIDIA GPU passthrough.
#   Requires nvidia-container-toolkit installed on host.
#
# Prerequisites:
#   1. cp .env.example .env && fill in required values
#   2. Base infrastructure stack running (Traefik + proxy network)
# =============================================================================

x-gpu: &gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

services:

  # ---------------------------------------------------------------------------
  # Ollama ˇŞ LLM Inference Engine
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:0.3.12
    container_name: ollama
    restart: unless-stopped
    networks:
      - proxy
      - ai-internal
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*
      - OLLAMA_HOST=0.0.0.0
    <<: *gpu
    labels:
      - traefik.enable=true
      - "traefik.http.routers.ollama.rule=Host(`ollama.${DOMAIN}`)"
      - traefik.http.routers.ollama.entrypoints=websecure
      - traefik.http.routers.ollama.tls=true
      - traefik.http.services.ollama.loadbalancer.server.port=11434
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Open WebUI ˇŞ Chat Interface for Ollama
  # ---------------------------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.3.32
    container_name: open-webui
    restart: unless-stopped
    networks:
      - proxy
      - ai-internal
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-changeme-secret-32chars}
      - DEFAULT_LOCALE=zh-CN
    depends_on:
      ollama:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - "traefik.http.routers.open-webui.rule=Host(`ai.${DOMAIN}`)"
      - traefik.http.routers.open-webui.entrypoints=websecure
      - traefik.http.routers.open-webui.tls=true
      - traefik.http.services.open-webui.loadbalancer.server.port=8080
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Stable Diffusion ˇŞ AI Image Generation
  # ---------------------------------------------------------------------------
  stable-diffusion:
    image: universonic/stable-diffusion-webui:latest
    container_name: stable-diffusion
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - sd-models:/app/models
      - sd-output:/app/outputs
    environment:
      - COMMANDLINE_ARGS=${SD_COMMANDLINE_ARGS:---no-half --skip-torch-cuda-test --use-cpu all}
    <<: *gpu
    labels:
      - traefik.enable=true
      - "traefik.http.routers.sd.rule=Host(`sd.${DOMAIN}`)"
      - traefik.http.routers.sd.entrypoints=websecure
      - traefik.http.routers.sd.tls=true
      - traefik.http.services.sd.loadbalancer.server.port=7860
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:7860/ || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s

  # ---------------------------------------------------------------------------
  # Perplexica ˇŞ AI Search Engine
  # ---------------------------------------------------------------------------
  perplexica:
    image: itzcrazykns1337/perplexica:main
    container_name: perplexica
    restart: unless-stopped
    networks:
      - proxy
      - ai-internal
    volumes:
      - perplexica-data:/home/perplexica/data
    environment:
      - OLLAMA_URL=http://ollama:11434
      - NEXT_PUBLIC_API_URL=https://search.${DOMAIN}/api
      - SEARXNG_API_URL=http://searxng:8080
    depends_on:
      ollama:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - "traefik.http.routers.perplexica.rule=Host(`search.${DOMAIN}`)"
      - traefik.http.routers.perplexica.entrypoints=websecure
      - traefik.http.routers.perplexica.tls=true
      - traefik.http.services.perplexica.loadbalancer.server.port=3000
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  proxy:
    external: true
  ai-internal:
    name: ai-internal
    driver: bridge

volumes:
  ollama-data:
  open-webui-data:
  sd-models:
  sd-output:
  perplexica-data: