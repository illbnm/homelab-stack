version: "3.8"

# =============================================================================
# AI Stack — Local AI Inference
# Services: Ollama + Open WebUI + Stable Diffusion + Perplexica
# Usage:
#   CPU mode:    docker compose up -d
#   NVIDIA GPU:  ENABLE_GPU=nvidia docker compose up -d
#   AMD GPU:     ENABLE_GPU=amd docker compose up -d
#   With SD:     docker compose --profile sd up -d
# =============================================================================

networks:
  proxy:
    external: true
  ai:
    name: ai
    driver: bridge

volumes:
  ollama_data:
  open_webui_data:
  sd_models:
  sd_output:
  perplexica_data:

services:
  # ---------------------------------------------------------------------------
  # Ollama — LLM Inference Engine
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:0.3.14
    container_name: ollama
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - ai
      - proxy
    environment:
      - OLLAMA_ORIGINS=*
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ollama.rule=Host(`ollama.${DOMAIN}`)"
      - "traefik.http.routers.ollama.entrypoints=websecure"
      - "traefik.http.routers.ollama.tls.certresolver=letsencrypt"
      - "traefik.http.services.ollama.loadbalancer.server.port=11434"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Open WebUI — Chat Interface for Ollama with OIDC/Authentik support
  # ---------------------------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.3.35
    container_name: open-webui
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - ai
      - proxy
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:?WEBUI_SECRET_KEY required}
      - DEFAULT_LOCALE=${DEFAULT_LOCALE:-zh-CN}
      - TZ=${TZ:-Asia/Shanghai}
      # OIDC/Authentik Authentication
      - WEBUI_AUTH=${WEBUI_AUTH:-true}
      - OIDC_CLIENT_ID=${OPEN_WEBUI_OAUTH_CLIENT_ID:-}
      - OIDC_CLIENT_SECRET=${OPEN_WEBUI_OAUTH_CLIENT_SECRET:-}
      - OIDC_ISSUER=${OPEN_WEBUI_OAUTH_ISSUER:-https://${AUTHENTIK_DOMAIN}/application/o/openwebui/}
      - OIDC_CALLBACK_URL=${OPEN_WEBUI_OAUTH_CALLBACK_URL:-https://ai.${DOMAIN}/auth/callback}
      - OIDC_SCOPES=${OPEN_WEBUI_OAUTH_SCOPES:-openid profile email}
      - OIDC_EMAIL_CLAIM=${OPEN_WEBUI_OIDC_EMAIL_CLAIM:-email}
      - OIDC_NAME_CLAIM=${OPEN_WEBUI_OIDC_NAME_CLAIM:-name}
      - OIDC_USERNAME_CLAIM=${OPEN_WEBUI_OIDC_USERNAME_CLAIM:-preferred_username}
      # Optional: Enable auto-provisioning of new users
      - OIDC_AUTO_PROVISION=${OPEN_WEBUI_AUTO_PROVISION:-false}
    volumes:
      - open_webui_data:/app/backend/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.open-webui.rule=Host(`ai.${DOMAIN}`)"
      - "traefik.http.routers.open-webui.entrypoints=websecure"
      - "traefik.http.routers.open-webui.tls.certresolver=letsencrypt"
      - "traefik.http.services.open-webui.loadbalancer.server.port=8080"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Stable Diffusion WebUI — Image Generation (optional, enable with --profile sd)
  # ---------------------------------------------------------------------------
  stable-diffusion:
    image: ghcr.io/abiosoft/sd-webui-docker:cpu-v1.10.1
    profiles: ["sd"]
    container_name: stable-diffusion
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - ai
      - proxy
    environment:
      - COMMANDLINE_ARGS=${SD_ARGS:---no-half --skip-torch-cuda-test --use-cpu all}
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - sd_models:/app/models
      - sd_output:/app/outputs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sd.rule=Host(`sd.${DOMAIN}`)"
      - "traefik.http.routers.sd.entrypoints=websecure"
      - "traefik.http.routers.sd.tls.certresolver=letsencrypt"
      - "traefik.http.services.sd.loadbalancer.server.port=7860"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7860/ || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 180s

  # ---------------------------------------------------------------------------
  # Perplexica — AI-Powered Search Engine
  # ---------------------------------------------------------------------------
  perplexica:
    image: ghcr.io/itzcrazykns1337/perplexica:latest
    container_name: perplexica
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - ai
      - proxy
    depends_on:
      - ollama
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - SIMILARITY_MODEL=bge-m3
      - SEARCH_MODELS=llama3:8b
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - perplexica_data:/app/storage
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.perplexica.rule=Host(`search.${DOMAIN}`)"
      - "traefik.http.routers.perplexica.entrypoints=websecure"
      - "traefik.http.routers.perplexica.tls.certresolver=letsencrypt"
      - "traefik.http.services.perplexica.loadbalancer.server.port=3000"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# Open WebUI OIDC (Authentik) Setup Instructions
# ===============================================
#
# Open WebUI supports OIDC authentication with Authentik.
# To enable OAuth login with Authentik:
#
# 1. Ensure the OpenWebUI OAuth provider was created by running:
#    ./scripts/setup-authentik.sh
#
# 2. Set the following environment variables in .env:
#    OPEN_WEBUI_OAUTH_CLIENT_ID=<from setup-authentik.sh output>
#    OPEN_WEBUI_OAUTH_CLIENT_SECRET=<from setup-authentik.sh output>
#    OPEN_WEBUI_OAUTH_ISSUER=https://auth.yourdomain.com/application/o/openwebui/
#    OPEN_WEBUI_OAUTH_CALLBACK_URL=https://ai.yourdomain.com/auth/callback
#
# 3. Restart Open WebUI:
#    docker compose -f stacks/ai/docker-compose.yml up -d open-webui
#
# 4. Login via OAuth:
#    - Access Open WebUI at https://ai.yourdomain.com
#    - First user to login via OIDC will be created as admin
#
# 5. (Optional) Enable auto-provisioning for all OIDC users:
#    OPEN_WEBUI_AUTO_PROVISION=true
