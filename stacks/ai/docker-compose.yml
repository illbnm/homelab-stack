# =============================================================================
# HomeLab Stack — AI Stack
# Services: Ollama + Open WebUI + Stable Diffusion (Automatic1111)
#
# GPU Configuration:
#   By default, this runs in CPU mode. To enable GPU acceleration:
#   - NVIDIA GPU: Uncomment the "deploy:" block in ollama and stable-diffusion services
#   - AMD GPU:    Uncomment the AMD blocks instead (use amdgpu driver)
#
# Usage:
#   cd stacks/ai && cp .env.example .env && nano .env
#   docker compose up -d
# =============================================================================

x-ai-base: &ai-base
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  networks:
    - proxy

services:
  # ===========================================================================
  # Ollama — Local LLM inference engine
  # ===========================================================================
  ollama:
    <<: *ai-base
    image: ollama/ollama:0.5.6
    container_name: ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
      - OLLAMA_KEEP_ALIVE=24h
      - TZ=${TZ}
    volumes:
      - ollama-data:/root/.ollama
      - ${AI_MODELS_PATH:-ai-models}:/models
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - traefik.enable=true
      - "traefik.http.routers.ollama.rule=Host(`ollama.${DOMAIN}`)"
      - traefik.http.routers.ollama.entrypoints=websecure
      - traefik.http.routers.ollama.tls=true
      - traefik.http.routers.ollama.tls.certresolver=letsencrypt
      - traefik.http.services.ollama.loadbalancer.server.port=11434
      - traefik.http.routers.ollama.middlewares=security-headers@file
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    privileged: true
    # -----------------------------------------------------------------------
    # GPU Configuration (uncomment ONE block based on your hardware):
    #
    # NVIDIA GPU:
    #   deploy:
    #     resources:
    #       reservations:
    #         devices:
    #           - driver: nvidia
    #             count: all
    #             capabilities: [gpu]
    #
    # AMD GPU (ROCm):
    #   deploy:
    #     resources:
    #       reservations:
    #         devices:
    #           - driver: amdgpu
    #             count: all
    #             capabilities: [gpu]
    # -----------------------------------------------------------------------

  # ===========================================================================
  # Model Downloader — Init container to pull models on first start
  # ===========================================================================
  model-downloader:
    image: ollama/ollama:0.5.6
    container_name: ollama-model-downloader
    restart: "no"
    command: >
      /bin/sh -c "
        echo 'Waiting for Ollama to be ready...' &&
        sleep 10 &&
        for model in ${OLLAMA_MODELS:-llama3.3 mistral}; do
          echo \"Pulling model: $$model\" &&
          ollama pull $$model || echo \"Failed to pull $$model, skipping\" &&
          echo \"$$model ready\"
        done &&
        echo 'All models downloaded!'
      "
    environment:
      - TZ=${TZ}
    volumes:
      - ollama-data:/root/.ollama
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - proxy
    profiles:
      - download

  # ===========================================================================
  # Open WebUI — Web UI for LLM chat
  # ===========================================================================
  open-webui:
    <<: *ai-base
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-changeme-secret-32chars}
      - TZ=${TZ}
      # Authentik OIDC / SSO (optional — enable by setting OIDC vars in .env)
      - WEBUI_URL=https://ai.${DOMAIN}
      - OAUTH_PROVIDER_NAME=${OIDC_PROVIDER_NAME:-authentik}
      - OPENID_PROVIDER_URL=${OIDC_ISSUER_URL:-https://${AUTHENTIK_DOMAIN}/application/o/open-webui/.well-known/openid-configuration}
      - OAUTH_CLIENT_ID=${OPEN_WEBUI_OAUTH_CLIENT_ID:-}
      - OAUTH_CLIENT_SECRET=${OPEN_WEBUI_OAUTH_CLIENT_SECRET:-}
      - OPENID_REDIRECT_URI=https://ai.${DOMAIN}/oauth/oidc/callback
      - OAUTH_SCOPES=openid email profile
      - ENABLE_OAUTH_SIGNUP=${OIDC_ENABLE_SIGNUP:-false}
      - ENABLE_LOGIN_FORM=${OIDC_DISABLE_LOGIN_FORM:-true}
      - OAUTH_MERGE_ACCOUNTS_BY_EMAIL=true
      # Locale
      - DEFAULT_LOCALE=${DEFAULT_LOCALE:-zh-CN}
      # RAG (optional)
      - ENABLE_RAG=${ENABLE_RAG:-false}
      - RAG_EMBEDDING_MODEL=${RAG_EMBEDDING_MODEL:-nomic-embed-text}
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      ollama:
        condition: service_healthy
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - traefik.enable=true
      - "traefik.http.routers.open-webui.rule=Host(`ai.${DOMAIN}`)"
      - traefik.http.routers.open-webui.entrypoints=websecure
      - traefik.http.routers.open-webui.tls=true
      - traefik.http.routers.open-webui.tls.certresolver=letsencrypt
      - traefik.http.services.open-webui.loadbalancer.server.port=8080
      - traefik.http.routers.open-webui.middlewares=security-headers@file
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===========================================================================
  # Stable Diffusion WebUI — Image generation (Automatic1111)
  # ===========================================================================
  stable-diffusion:
    <<: *ai-base
    image: ghcr.io/automatictroll/automatic1111-webui:1.10
    container_name: stable-diffusion
    environment:
      - TZ=${TZ}
      # Command line args — adjust based on GPU type (see .env.example for presets)
      - COMMANDLINE_ARGS=${SD_COMMANDLINE_ARGS:---no-half --skip-torch-cuda-test --use-cpu all --force-enable-textseg --api}
      - GRADIO_SERVER_PORT=7860
    volumes:
      - sd-models:/app/models
      - sd-output:/app/outputs
      - sd-cache:/root/.cache
      - ${AI_MODELS_PATH:-ai-models}/stable-diffusion:/app/sd-models:ro
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - traefik.enable=true
      - "traefik.http.routers.sd.rule=Host(`sd.${DOMAIN}`)"
      - traefik.http.routers.sd.entrypoints=websecure
      - traefik.http.routers.sd.tls=true
      - traefik.http.routers.sd.tls.certresolver=letsencrypt
      - traefik.http.services.sd.loadbalancer.server.port=7860
      - traefik.http.routers.sd.middlewares=security-headers@file
      # SD API endpoints
      - "traefik.http.routers.sd-api.rule=Host(`sd.${DOMAIN}`) && PathPrefix(`/sdapi`)"
      - traefik.http.routers.sd-api.entrypoints=websecure
      - traefik.http.routers.sd-api.tls=true
      - traefik.http.routers.sd-api.tls.certresolver=letsencrypt
      - traefik.http.services.sd-api.loadbalancer.server.port=7860
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7860/ || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 180s
    shm_size: "2gb"
    mem_limit: 16g
    # -----------------------------------------------------------------------
    # GPU Configuration (uncomment ONE block based on your hardware):
    #
    # NVIDIA GPU:
    #   deploy:
    #     resources:
    #       reservations:
    #         devices:
    #           - driver: nvidia
    #             count: all
    #             capabilities: [gpu]
    #
    # AMD GPU (ROCm):
    #   deploy:
    #     resources:
    #       reservations:
    #         devices:
    #           - driver: amdgpu
    #             count: all
    #             capabilities: [gpu]
    # -----------------------------------------------------------------------

networks:
  proxy:
    external: true

volumes:
  ollama-data:
  open-webui-data:
  sd-models:
  sd-output:
  sd-cache:
