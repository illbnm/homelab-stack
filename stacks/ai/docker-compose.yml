services:
  # ---------------------------------------------------------------------------
  # Ollama — Local LLM Inference Engine
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:${OLLAMA_VERSION:-0.5.16}
    container_name: ollama
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*
      - OLLAMA_HOST=0.0.0.0
    # GPU reservations — ignored gracefully when no NVIDIA GPU present
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${OLLAMA_GPU_COUNT:-all}
              capabilities: [gpu]
    labels:
      - traefik.enable=true
      - "traefik.http.routers.ollama.rule=Host(`ollama.${DOMAIN}`)"
      - traefik.http.routers.ollama.entrypoints=websecure
      - traefik.http.routers.ollama.tls=true
      - traefik.http.services.ollama.loadbalancer.server.port=11434
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Open WebUI — Web Interface for Ollama
  # ---------------------------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:${OPEN_WEBUI_VERSION:-0.6.5}
    container_name: open-webui
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-change-me-32-chars-minimum}
      - DEFAULT_LOCALE=${DEFAULT_LOCALE:-zh-CN}
      # Space-separated list of models to preload, e.g. "llama3:8b mistral"
      - OLLAMA_PRELOAD_MODELS=${OLLAMA_PRELOAD_MODELS:-}
    depends_on:
      ollama:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - "traefik.http.routers.open-webui.rule=Host(`ai.${DOMAIN}`)"
      - traefik.http.routers.open-webui.entrypoints=websecure
      - traefik.http.routers.open-webui.tls=true
      - traefik.http.services.open-webui.loadbalancer.server.port=8080
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # A1111 Stable Diffusion WebUI — Image Generation
  # ---------------------------------------------------------------------------
  stable-diffusion-webui:
    image: ghcr.io/automatic-user/automatic:${SD_VERSION:-1.10.3}
    container_name: stable-diffusion-webui
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - sd-models:/app/models
      - sd-output:/app/outputs
      - sd-cache:/root/.cache
    environment:
      # Core args: enable API, listen on all interfaces
      # Extra args from SD_EXTRA_ARGS (see .env.example)
      - CLI_ARGS=${SD_CLI_ARGS:---api --listen --opt-sdp-attention}
      - TORCH_DTYPE=${SD_TORCH_DTYPE:-float16}
      - PIP_ARGS=--prefer-binary
      # Model config — set in .env to auto-download on first start
      # e.g. HF_MODEL_ID=stabilityai/stable-diffusion-3-medium
      - HF_MODEL_ID=${SD_MODEL_ID:-}
      - HF_MODEL_REVISION=${SD_MODEL_REVISION:-}
      - TRANSFORMERS_CACHE=/root/.cache/transformers
      - HF_HOME=/root/.cache/huggingface
    # GPU reservations — ignored gracefully when no NVIDIA GPU present
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${SD_GPU_COUNT:-all}
              capabilities: [gpu]
    labels:
      - traefik.enable=true
      - "traefik.http.routers.sd.rule=Host(`sd.${DOMAIN}`)"
      - traefik.http.routers.sd.entrypoints=websecure
      - traefik.http.routers.sd.tls=true
      - traefik.http.services.sd.loadbalancer.server.port=7860
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7860/ || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 300s

networks:
  proxy:
    external: true

volumes:
  ollama-data:
  open-webui-data:
  sd-models:
  sd-output:
  sd-cache:
