services:
  # ─────────────────────────────────────────────────────────────
  # Ollama - LLM Inference Engine
  # ─────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:0.3.12
    container_name: ollama
    restart: unless-stopped
    networks:
      - proxy
      - ai_internal
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*
    # GPU deployment - uncomment based on your hardware
    # NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    # AMD GPU (ROCm):
    # devices:
    #   - /dev/kfd:/dev/kfd
    #   - /dev/dri:/dev/dri
    # CPU only (default - no changes needed)
    labels:
      - traefik.enable=true
      - "traefik.http.routers.ollama.rule=Host(`ollama.${DOMAIN}`)"
      - traefik.http.routers.ollama.entrypoints=websecure
      - traefik.http.routers.ollama.tls=true
      - traefik.http.services.ollama.loadbalancer.server.port=11434
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────────────────────
  # Open WebUI - LLM Web Interface
  # ─────────────────────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:0.3.32
    container_name: open-webui
    restart: unless-stopped
    networks:
      - proxy
      - ai_internal
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-changeme-secret-key-min-32-chars}
      - DEFAULT_LOCALE=zh-CN
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-false}
    depends_on:
      ollama:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - "traefik.http.routers.open-webui.rule=Host(`ai.${DOMAIN}`)"
      - traefik.http.routers.open-webui.entrypoints=websecure
      - traefik.http.routers.open-webui.tls=true
      - traefik.http.services.open-webui.loadbalancer.server.port=8080
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─────────────────────────────────────────────────────────────
  # Stable Diffusion WebUI - Image Generation
  # ─────────────────────────────────────────────────────────────
  stable-diffusion:
    image: universonic/stable-diffusion-webui:latest-sha
    container_name: stable-diffusion
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - sd-models:/app/models
      - sd-output:/app/outputs
    environment:
      - COMMANDLINE_ARGS=--no-half --skip-torch-cuda-test --use-cpu all
      # For GPU acceleration, remove --use-cpu all and add:
      # NVIDIA: --precision full --no-half
      # AMD: --precision full --no-half --directml
    # GPU deployment - uncomment based on your hardware
    # NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    # AMD GPU:
    # devices:
    #   - /dev/kfd:/dev/kfd
    #   - /dev/dri:/dev/dri
    labels:
      - traefik.enable=true
      - "traefik.http.routers.sd.rule=Host(`sd.${DOMAIN}`)"
      - traefik.http.routers.sd.entrypoints=websecure
      - traefik.http.routers.sd.tls=true
      - traefik.http.services.sd.loadbalancer.server.port=7860
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7860/ || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s

  # ─────────────────────────────────────────────────────────────
  # Perplexica - AI-Powered Search Engine
  # ─────────────────────────────────────────────────────────────
  perplexica:
    image: itzcrazykns1337/perplexica:main-sha
    container_name: perplexica
    restart: unless-stopped
    networks:
      - proxy
      - ai_internal
    volumes:
      - perplexica-data:/app/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - PERPLEXICA_SECRET_KEY=${PERPLEXICA_SECRET_KEY:-changeme-perplexica-secret}
    depends_on:
      ollama:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - "traefik.http.routers.perplexica.rule=Host(`search.${DOMAIN}`)"
      - traefik.http.routers.perplexica.entrypoints=websecure
      - traefik.http.routers.perplexica.tls=true
      - traefik.http.services.perplexica.loadbalancer.server.port=3000
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# ─────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────
networks:
  proxy:
    external: true
    name: proxy
  ai_internal:
    driver: bridge
    internal: true

# ─────────────────────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────────────────────
volumes:
  ollama-data:
    driver: local
  open-webui-data:
    driver: local
  sd-models:
    driver: local
  sd-output:
    driver: local
  perplexica-data:
    driver: local
