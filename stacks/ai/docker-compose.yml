services:
  # ─────────────────────────────────────────────
  # Ollama — LLM 推理引擎
  # ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:0.3.12
    container_name: ollama
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - TZ=${TZ:-Asia/Shanghai}
    # GPU support — uncomment the appropriate section:
    # ── NVIDIA GPU ──
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    # ── AMD GPU (ROCm) ──
    # devices:
    #   - /dev/kfd
    #   - /dev/dri
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────────
  # Open WebUI — LLM Web 界面
  # ─────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:0.3.32
    container_name: open-webui
    restart: unless-stopped
    networks:
      - internal
      - proxy
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-changeme}
      - TZ=${TZ:-Asia/Shanghai}
    depends_on:
      ollama:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - "traefik.http.routers.openwebui.rule=Host(`ai.${DOMAIN}`)"
      - traefik.http.routers.openwebui.entrypoints=websecure
      - traefik.http.routers.openwebui.tls=true
      - traefik.http.services.openwebui.loadbalancer.server.port=8080
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────
  # Stable Diffusion WebUI — 图像生成
  # ─────────────────────────────────────────────
  stable-diffusion:
    image: universonic/stable-diffusion-webui:latest
    container_name: stable-diffusion
    restart: unless-stopped
    networks:
      - internal
      - proxy
    volumes:
      - sd-models:/app/stable-diffusion-webui/models
      - sd-outputs:/app/stable-diffusion-webui/outputs
    environment:
      - CLI_ARGS=--listen --api --xformers
      - TZ=${TZ:-Asia/Shanghai}
    # GPU support — uncomment for NVIDIA:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    labels:
      - traefik.enable=true
      - "traefik.http.routers.sd.rule=Host(`sd.${DOMAIN}`)"
      - traefik.http.routers.sd.entrypoints=websecure
      - traefik.http.routers.sd.tls=true
      - traefik.http.services.sd.loadbalancer.server.port=7860
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:7860/sdapi/v1/progress || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s

  # ─────────────────────────────────────────────
  # Perplexica — AI 搜索引擎
  # ─────────────────────────────────────────────
  perplexica:
    image: itzcrazykns1337/perplexica:main
    container_name: perplexica
    restart: unless-stopped
    networks:
      - internal
      - proxy
    volumes:
      - perplexica-data:/app/data
    environment:
      - OLLAMA_URL=http://ollama:11434
      - TZ=${TZ:-Asia/Shanghai}
    depends_on:
      ollama:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - "traefik.http.routers.perplexica.rule=Host(`search.${DOMAIN}`)"
      - traefik.http.routers.perplexica.entrypoints=websecure
      - traefik.http.routers.perplexica.tls=true
      - traefik.http.services.perplexica.loadbalancer.server.port=3000
    healthcheck:
      test: [CMD-SHELL, "wget -qO /dev/null http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  internal:
    external: true
  proxy:
    external: true

volumes:
  ollama-data:
  open-webui-data:
  sd-models:
  sd-outputs:
  perplexica-data:
