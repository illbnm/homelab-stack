services:
  ollama:
    image: ollama/ollama:0.3.14
    container_name: ollama
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*
    labels:
      - traefik.enable=true
      - "traefik.http.routers.ollama.rule=Host(`ollama.${DOMAIN}`)"
      - traefik.http.routers.ollama.entrypoints=websecure
      - traefik.http.routers.ollama.tls=true
      - traefik.http.services.ollama.loadbalancer.server.port=11434
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.3.35
    container_name: open-webui
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-changeme-secret-32chars}
      - DEFAULT_LOCALE=zh-CN
      # OIDC Authentication via Authentik
      - ENABLE_OLLAMA_WEBUI_AUTH=False
      - ENABLE_OIDC_MIXED_FLOW=True
      - OIDC_PROVIDER_NAME=Authentik
      - OIDC_CLIENT_ID=${OPENWEBUI_OAUTH_CLIENT_ID}
      - OIDC_CLIENT_SECRET=${OPENWEBUI_OAUTH_CLIENT_SECRET}
      - OIDC_AUTH_SERVER_URL=https://${AUTHENTIK_DOMAIN}/application/o/openwebui/
      - OIDC_TOKEN_URL=https://${AUTHENTIK_DOMAIN}/application/o/token/
      - OIDC_USERINFO_URL=https://${AUTHENTIK_DOMAIN}/application/o/userinfo/
      - OIDC_OPENID_CONFIG_ENDPOINT=https://${AUTHENTIK_DOMAIN}/.well-known/openid-configuration
      - OIDC_SCOPE=openid profile email
      - OIDC_ROLE_CLAIM=groups
      - OIDC_ADMIN_ROLE=homelab-admins
    depends_on:
      ollama:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - "traefik.http.routers.open-webui.rule=Host(`ai.${DOMAIN}`)"
      - traefik.http.routers.open-webui.entrypoints=websecure
      - traefik.http.routers.open-webui.tls=true
      - traefik.http.services.open-webui.loadbalancer.server.port=8080
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  stable-diffusion:
    image: ghcr.io/abiosoft/sd-webui-docker:cpu-v1.10.1
    container_name: stable-diffusion
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - sd-models:/app/models
      - sd-output:/app/outputs
    environment:
      - COMMANDLINE_ARGS=--no-half --skip-torch-cuda-test --use-cpu all
    labels:
      - traefik.enable=true
      - "traefik.http.routers.sd.rule=Host(`sd.${DOMAIN}`)"
      - traefik.http.routers.sd.entrypoints=websecure
      - traefik.http.routers.sd.tls=true
      - traefik.http.services.sd.loadbalancer.server.port=7860
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:7860/ || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s

networks:
  proxy:
    external: true

volumes:
  ollama-data:
  open-webui-data:
  sd-models:
  sd-output:
