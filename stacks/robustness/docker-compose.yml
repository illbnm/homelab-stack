# Homelab Stack #8 - Robustness (国内网络适配 + 环境鲁棒性)
# 提供国内镜像源配置、网络健康检查、自动重试机制

services:
  # =============================================================================
  # Docker 镜像加速配置 - 提供国内镜像源代理
  # =============================================================================
  docker-registry-mirror:
    image: registry.cn-hangzhou.aliyuncs.com/library/registry:2.8.3
    container_name: docker-registry-mirror
    restart: unless-stopped
    networks:
      - robustness_internal
    volumes:
      - registry-data:/var/lib/registry
      - ./config/registry.yml:/etc/docker/registry/config.yml:ro
    environment:
      - REGISTRY_STORAGE_DELETE_ENABLED=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/v2/_catalog"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.registry-mirror.rule=Host(`registry.${DOMAIN}`)
      - traefik.http.routers.registry-mirror.entrypoints=websecure
      - traefik.http.routers.registry-mirror.tls=true
      - traefik.http.services.registry-mirror.loadbalancer.server.port=5000

  # =============================================================================
  # 网络健康检查服务 - 持续监控网络连通性
  # =============================================================================
  network-monitor:
    image: curlimages/curl:8.5.0
    container_name: network-monitor
    restart: unless-stopped
    networks:
      - robustness_internal
    command: >
      sh -c "
      while true; do
        echo \"[$$(date -Iseconds)] Checking network connectivity...\";
        
        # Check external DNS
        if ! nslookup www.baidu.com > /dev/null 2>&1; then
          echo \"[WARN] DNS resolution failed\";
        fi;
        
        # Check Docker Hub connectivity
        if ! curl -sf --connect-timeout 5 https://hub.docker.com > /dev/null 2>&1; then
          echo \"[WARN] Docker Hub unreachable, using mirror\";
        fi;
        
        # Check GitHub connectivity
        if ! curl -sf --connect-timeout 5 https://github.com > /dev/null 2>&1; then
          echo \"[WARN] GitHub unreachable\";
        fi;
        
        sleep 60;
      done
      "
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # 自动重试拉取服务 - 处理网络波动导致的拉取失败
  # =============================================================================
  pull-retry-helper:
    image: alpine:3.19.1
    container_name: pull-retry-helper
    restart: unless-stopped
    networks:
      - robustness_internal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./scripts/pull-retry.sh:/pull-retry.sh:ro
    command: ["sh", "-c", "sleep infinity"]
    # 此服务提供 pull-retry 脚本执行环境

  # =============================================================================
  # DNS 缓存服务 - 加速 DNS 解析，减少 DNS 查询延迟
  # =============================================================================
  dnsmasq:
    image: jpillora/dnsmasq:1.9.0
    container_name: dnsmasq
    restart: unless-stopped
    networks:
      - robustness_internal
    ports:
      - "5353:53/tcp"
      - "5353:53/udp"
    volumes:
      - ./config/dnsmasq.conf:/etc/dnsmasq.conf:ro
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: ["CMD", "pgrep", "dnsmasq"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.homelab.service=dnsmasq"
      - "com.homelab.feature=dns-cache"

  # =============================================================================
  # 国内 NTP 时间同步 - 确保时间准确性
  # =============================================================================
  ntp-sync:
    image: alpine:3.19.1
    container_name: ntp-sync
    restart: unless-stopped
    networks:
      - robustness_internal
    command: >
      sh -c "
      apk add --no-cache openntpd;
      while true; do
        echo \"[$$(date -Iseconds)] Syncing time with NTP servers...\";
        ntpd -d -n -p ntp.aliyun.com -p ntp.tencent.com -p cn.pool.ntp.org 2>&1 | head -20;
        sleep 3600;
      done
      "
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # 配置中心 - 提供统一的国内镜像源配置
  # =============================================================================
  config-server:
    image: nginx:1.25.4-alpine
    container_name: robustness-config-server
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - ./config:/usr/share/nginx/html/config:ro
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/config/"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - traefik.enable=true
      - traefik.http.routers.robustness-config.rule=Host(`config.${DOMAIN}`)
      - traefik.http.routers.robustness-config.entrypoints=websecure
      - traefik.http.routers.robustness-config.tls=true
      - traefik.http.services.robustness-config.loadbalancer.server.port=80

networks:
  proxy:
    external: true
  robustness_internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.100.0/24

volumes:
  registry-data:
    driver: local
