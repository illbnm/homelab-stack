# Dnsmasq 配置文件 - DNS 缓存和国内 DNS 转发
# 用于加速 DNS 解析，减少查询延迟

# 监听所有网络接口
listen-address=0.0.0.0
bind-interfaces

# 上游 DNS 服务器 (阿里 DNS)
server=223.5.5.5
server=223.6.6.6

# 备用 DNS (腾讯 DNSPod)
server=119.29.29.29

# 禁用 resolv.conf
no-resolv

# 缓存大小 (条记录)
cache-size=10000

# 最小 TTL (秒) - 避免过短的 TTL 导致频繁查询
min-cache-ttl=300

# 最大 TTL (秒)
max-cache-ttl=86400

# 启用日志
log-queries
log-facility=-

# 阻止特定域名 (可选)
# address=/ads.example.com/127.0.0.1

# 本地域名解析 (可选)
# address=/homelab.local/192.168.1.1

# DHCP 配置 (如需要)
# dhcp-range=192.168.1.50,192.168.1.150,12h
