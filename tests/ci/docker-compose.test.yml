# =============================================================================
# CI Test Docker Compose — HomeLab Stack
# Used for GitHub Actions CI environment (no real domain required)
# =============================================================================
version: '3.9'

services:
  # Minimal base services for CI testing
  traefik:
    image: traefik:v3.1.6
    container_name: traefik-ci
    networks:
      - test-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  portainer:
    image: portainer/portainer-ce:2.21.4
    container_name: portainer-ci
    networks:
      - test-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer-data:/data
    healthcheck:
      test: ["CMD", "/portainer", "--version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  test-proxy:
    name: proxy

volumes:
  portainer-data:
