# =============================================================================
# CI Docker Compose for Testing
# Used for running tests in CI without real domains
# =============================================================================
version: "3.8"

services:
  # Minimal Traefik for testing
  traefik-test:
    image: traefik:v3.1.6
    container_name: traefik-test
    ports:
      - "80:80"
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
    networks:
      - test-network
    labels:
      - "traefik.enable=true"

  # Minimal PostgreSQL for testing
  postgres-test:
    image: postgres:15-alpine
    container_name: postgres-test
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test
    networks:
      - test-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Minimal Redis for testing
  redis-test:
    image: redis:7-alpine
    container_name: redis-test
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Minimal MinIO for backup testing
  minio-test:
    image: minio/minio:latest
    container_name: minio-test
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

networks:
  test-network:
    driver: bridge