# =============================================================================
# CI Test Environment — Docker Compose for GitHub Actions
# =============================================================================
# Minimal compose for CI environment (no real domain required)
# Services are accessed via localhost instead of DOMAIN
# =============================================================================

services:
  # Minimal base infrastructure for CI testing
  traefik:
    image: traefik:v3.0
    container_name: ci-traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - ci-proxy

  portainer:
    image: portainer/portainer-ce:latest
    container_name: ci-portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - portainer-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ci-proxy

networks:
  ci-proxy:
    name: ci-proxy
    driver: bridge

volumes:
  portainer-data:
