# =============================================================================
# CI Test Compose — HomeLab Stack
# Purpose: Lightweight stack for CI/CD integration tests.
#          Uses localhost endpoints — no real domain or TLS required.
#          Overrides production settings with CI-friendly values.
# Usage:
#   docker compose -f tests/ci/docker-compose.test.yml up -d
#   ./tests/run-tests.sh --stack base
#   docker compose -f tests/ci/docker-compose.test.yml down -v
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Traefik — Reverse proxy (CI mode: no TLS, dashboard on :8080)
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.1.6
    container_name: traefik
    restart: "no"
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--ping=true"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ci-net

  # ---------------------------------------------------------------------------
  # Prometheus — Metrics collection (CI mode: scrape interval 15s)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: "no"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=1h"
      - "--web.enable-lifecycle"
    volumes:
      - ../../config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../config/prometheus/rules:/etc/prometheus/rules:ro
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - ci-net

  # ---------------------------------------------------------------------------
  # Grafana — Dashboards (CI mode: anonymous access enabled)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.2.2
    container_name: grafana
    restart: "no"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "ci-test-password"
      GF_SERVER_ROOT_URL: "http://localhost:3000"
      GF_LOG_LEVEL: "warn"
    volumes:
      - ../../config/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - ci-net

  # ---------------------------------------------------------------------------
  # cAdvisor — Container metrics exporter for Prometheus
  # ---------------------------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: "no"
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8082:8080"
    networks:
      - ci-net

  # ---------------------------------------------------------------------------
  # PostgreSQL — Database (CI mode: simple credentials)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16.4-alpine
    container_name: postgres
    restart: "no"
    environment:
      POSTGRES_USER: "ci_user"
      POSTGRES_PASSWORD: "ci_password"
      POSTGRES_DB: "ci_test"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ci_user -d ci_test"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ci-net

  # ---------------------------------------------------------------------------
  # Redis — Cache (CI mode: no password)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4.0-alpine
    container_name: redis
    restart: "no"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - ci-net

networks:
  ci-net:
    driver: bridge
    name: ci-net
