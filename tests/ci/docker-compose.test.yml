# =============================================================================
# HomeLab Stack — CI Test Compose
# Lightweight stack for CI pipelines — minimal resource footprint
# Usage: docker compose -f tests/ci/docker-compose.test.yml up -d
# =============================================================================
#
# This compose file is intended for CI environments (GitHub Actions, etc.)
# It runs the minimum services needed to validate the test framework itself.
#
# NOT a full homelab — only used to verify tests pass/fail correctly.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Traefik — Reverse proxy (core dependency for all stacks)
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.1.6
    container_name: traefik
    restart: "no"
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--ping=true"
    ports:
      - "8080:8080"   # Traefik API
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - proxy

  # ---------------------------------------------------------------------------
  # ntfy — Notification service (lightweight, no TLS)
  # ---------------------------------------------------------------------------
  ntfy:
    image: binwiederhier/ntfy:v2.11.0
    container_name: ntfy
    restart: "no"
    command: serve
    ports:
      - "2586:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/v1/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - proxy

  # ---------------------------------------------------------------------------
  # Apprise — Notification API
  # ---------------------------------------------------------------------------
  apprise:
    image: caronc/apprise:v1.1.6
    container_name: apprise
    restart: "no"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - proxy

networks:
  proxy:
    name: proxy
    driver: bridge
