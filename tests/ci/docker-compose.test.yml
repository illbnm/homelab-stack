# =============================================================================
# HomeLab Stack — CI Test Environment
# Lightweight compose for CI/CD pipelines — no real domains needed.
# Runs essential services for integration testing.
#
# Usage:
#   docker compose -f tests/ci/docker-compose.test.yml up -d
#   ./tests/run-tests.sh --ci --stack base,databases,monitoring
#   docker compose -f tests/ci/docker-compose.test.yml down -v
# =============================================================================

services:

  # --- Base ---
  traefik:
    image: traefik:v3.1.6
    container_name: traefik
    command:
      - --api.insecure=true
      - --ping=true
      - --entrypoints.web.address=:80
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  portainer:
    image: portainer/portainer-ce:2.21.4
    container_name: portainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.portainer.rule=PathPrefix(`/portainer`)
      - traefik.http.services.portainer.loadbalancer.server.port=9000
    healthcheck:
      test: ["CMD", "/portainer", "--version"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --- Databases ---
  postgres:
    image: postgres:16-alpine
    container_name: homelab-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: postgres
    volumes:
      - ../../stacks/databases/initdb:/docker-entrypoint-initdb.d:ro
    networks:
      - databases
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: homelab-redis
    command: redis-server --requirepass testpassword --appendonly yes
    networks:
      - databases
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "testpassword", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mariadb:
    image: mariadb:11.4
    container_name: homelab-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: testpassword
      MARIADB_AUTO_UPGRADE: "1"
    volumes:
      - ../../stacks/databases/initdb-mysql:/docker-entrypoint-initdb.d:ro
    networks:
      - databases
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  # --- Monitoring (lightweight) ---
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=1h
      - --web.enable-lifecycle
    volumes:
      - ../../config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - monitoring
      - proxy
    healthcheck:
      test: ["CMD", "promtool", "check", "healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=testpassword
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    ports:
      - "3000:3000"
    networks:
      - monitoring
      - proxy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --- Notifications (lightweight) ---
  ntfy:
    image: binwiederhier/ntfy:v2.11.0
    container_name: ntfy
    command: serve
    networks:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  proxy:
    name: proxy
    driver: bridge
  databases:
    name: databases
    driver: bridge
  monitoring:
    name: monitoring
    driver: bridge
