# =============================================================================
# Traefik — TLS Options (dynamic configuration)
# Docs: https://doc.traefik.io/traefik/https/tls/
# =============================================================================

tls:
  options:
    # ── "modern" profile — TLS 1.3 only ──────────────────────────────────────
    # Use this for maximum security (incompatible with very old clients)
    modern:
      minVersion: VersionTLS13
      sniStrict: true

    # ── "intermediate" profile — TLS 1.2 + 1.3 ───────────────────────────────
    # Recommended for broad compatibility (Mozilla Intermediate)
    intermediate:
      minVersion: VersionTLS12
      sniStrict: true
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
      curvePreferences:
        - CurveP521
        - CurveP384
