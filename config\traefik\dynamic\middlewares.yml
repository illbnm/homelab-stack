# =============================================================================
# Traefik — Common Middlewares (dynamic configuration)
# Docs: https://doc.traefik.io/traefik/middlewares/overview/
# =============================================================================

http:
  middlewares:

    # ── Basic Auth (Traefik dashboard) ────────────────────────────────────────
    # Populate /etc/traefik/dynamic/.htpasswd with:
    #   echo "$(htpasswd -nB admin)" > config/traefik/dynamic/.htpasswd
    # or set users inline below (escape $ as $$ in compose env, but NOT here).
    auth:
      basicAuth:
        usersFile: "/etc/traefik/dynamic/.htpasswd"

    # ── Security Headers ──────────────────────────────────────────────────────
    security-headers:
      headers:
        sslRedirect: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        permissionsPolicy: "camera=(), microphone=(), geolocation=()"
        customResponseHeaders:
          X-Robots-Tag: "noindex, nofollow, nosnippet, noarchive"
          Server: ""

    # ── Rate Limiting ─────────────────────────────────────────────────────────
    rate-limit:
      rateLimit:
        average: 100
        burst: 50
        period: 1s

    # ── IP Allowlist (example — restrict to LAN only) ─────────────────────────
    # Uncomment and adjust CIDR ranges as needed.
    # lan-only:
    #   ipAllowList:
    #     sourceRange:
    #       - "192.168.0.0/16"
    #       - "172.16.0.0/12"
    #       - "10.0.0.0/8"

    # ── Compress responses ────────────────────────────────────────────────────
    compress:
      compress: {}

    # ── Forward Auth (Authentik SSO — enable when SSO stack is deployed) ──────
    # forward-auth:
    #   forwardAuth:
    #     address: "http://authentik-proxy:9000/outpost.goauthentik.io/auth/traefik"
    #     trustForwardHeader: true
    #     authResponseHeaders:
    #       - X-authentik-username
    #       - X-authentik-groups
    #       - X-authentik-email
    #       - X-authentik-name
    #       - X-authentik-uid
    #       - X-authentik-jwt
    #       - X-authentik-meta-jwks
    #       - X-authentik-meta-outpost
    #       - X-authentik-meta-provider
    #       - X-authentik-meta-app
    #       - X-authentik-meta-version
