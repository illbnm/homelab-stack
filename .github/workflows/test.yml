name: Integration Tests

on:
  push:
    branches: [main]
    paths:
      - 'stacks/**'
      - 'scripts/**'
      - 'tests/**'
  pull_request:
    branches: [main]
    paths:
      - 'stacks/**'
      - 'scripts/**'
      - 'tests/**'
  workflow_dispatch:

env:
  DOMAIN: test.local
  TZ: UTC

jobs:
  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up environment
        run: |
          cp .env.example .env

          # Generate required secrets
          sed -i "s|^DOMAIN=.*|DOMAIN=test.local|" .env
          sed -i "s|^TZ=.*|TZ=UTC|" .env
          sed -i "s|^AUTHENTIK_SECRET_KEY=.*|AUTHENTIK_SECRET_KEY=$(openssl rand -base64 32)|" .env
          sed -i "s|^AUTHENTIK_POSTGRES_PASSWORD=.*|AUTHENTIK_POSTGRES_PASSWORD=$(openssl rand -hex 16)|" .env
          sed -i "s|^AUTHENTIK_REDIS_PASSWORD=.*|AUTHENTIK_REDIS_PASSWORD=$(openssl rand -hex 16)|" .env
          sed -i "s|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=$(openssl rand -hex 16)|" .env
          sed -i "s|^REDIS_PASSWORD=.*|REDIS_PASSWORD=$(openssl rand -hex 16)|" .env
          sed -i "s|^MARIADB_ROOT_PASSWORD=.*|MARIADB_ROOT_PASSWORD=$(openssl rand -hex 16)|" .env
          sed -i "s|^GRAFANA_ADMIN_PASSWORD=.*|GRAFANA_ADMIN_PASSWORD=$(openssl rand -hex 16)|" .env
          sed -i "s|^VAULTWARDEN_ADMIN_TOKEN=.*|VAULTWARDEN_ADMIN_TOKEN=$(openssl rand -base64 48)|" .env
          sed -i "s|^NEXTCLOUD_ADMIN_PASSWORD=.*|NEXTCLOUD_ADMIN_PASSWORD=$(openssl rand -hex 16)|" .env

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq curl

      - name: Create external Docker network
        run: docker network create proxy

      - name: Start base stack (CI mode)
        run: |
          docker compose -f tests/ci/docker-compose.test.yml up -d
          echo "Waiting for containers to start..."
          sleep 10

      - name: Wait for containers to be healthy
        run: |
          for container in traefik portainer; do
            echo "Waiting for ${container}..."
            timeout 60 bash -c "
              until [ \"\$(docker inspect -f '{{.State.Health.Status}}' ${container} 2>/dev/null)\" = 'healthy' ]; do
                sleep 3
              done
            " || echo "WARN: ${container} did not become healthy in time"
          done

      - name: Make test scripts executable
        run: chmod -R +x tests/

      - name: Run base stack tests
        run: ./tests/run-tests.sh --stack base --json
        continue-on-error: true

      - name: Run config integrity tests (all stacks)
        run: |
          # Validate compose configs for all stacks that exist
          for stack_dir in stacks/*/; do
            stack=$(basename "${stack_dir}")
            echo "Validating compose config for ${stack}..."
            docker compose -f "${stack_dir}/docker-compose.yml" \
              --project-directory "${stack_dir}" \
              config --quiet 2>/dev/null || \
              echo "WARN: ${stack} compose config has issues"
          done
        continue-on-error: true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: tests/results/report.json
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          docker compose -f tests/ci/docker-compose.test.yml down -v --remove-orphans 2>/dev/null || true
          docker network rm proxy 2>/dev/null || true
