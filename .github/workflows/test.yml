name: Integration Tests

on:
  push:
    paths:
      - 'stacks/**'
      - 'tests/**'
      - 'scripts/**'
      - 'config/**'
  pull_request:
    paths:
      - 'stacks/**'
      - 'tests/**'
      - 'scripts/**'
      - 'config/**'

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck on test framework
        run: |
          cd tests
          shellcheck -x -S warning run-tests.sh
          shellcheck -x -S warning lib/*.sh
          shellcheck -x -S warning stacks/*.test.sh
          shellcheck -x -S warning e2e/*.test.sh

  test-base:
    name: Base Stack Tests
    runs-on: ubuntu-22.04
    needs: shellcheck
    steps:
      - uses: actions/checkout@v4

      - name: Create networks
        run: |
          docker network create proxy || true
          docker network create databases || true

      - name: Create test .env and configs
        # CI-only test credentials — not used in production
        run: |
          TRAEFIK_AUTH=$(htpasswd -nb admin test 2>/dev/null || echo 'admin:$$apr1$$test')
          cat > stacks/base/.env << ENVEOF
          DOMAIN=test.local
          TZ=UTC
          ACME_EMAIL=test@test.local
          TRAEFIK_AUTH=${TRAEFIK_AUTH}
          ENVEOF
          mkdir -p config/traefik/dynamic
          touch config/traefik/acme.json && chmod 600 config/traefik/acme.json
          cat > config/traefik/traefik.yml << 'TRAEFIKEOF'
          api:
            dashboard: false
          ping:
            entryPoint: traefik
          entryPoints:
            web:
              address: ":80"
            websecure:
              address: ":443"
            traefik:
              address: ":8080"
          providers:
            docker:
              exposedByDefault: false
              network: proxy
            file:
              directory: /dynamic
              watch: true
          TRAEFIKEOF

      - name: Start base stack
        run: docker compose -f stacks/base/docker-compose.yml up -d
        timeout-minutes: 5

      - name: Wait for healthy
        run: |
          chmod +x tests/lib/wait-healthy.sh
          ./tests/lib/wait-healthy.sh --timeout 120

      - name: Run tests
        run: |
          chmod +x tests/run-tests.sh
          ./tests/run-tests.sh --stack base

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-base
          path: tests/results/

      - name: Cleanup
        if: always()
        run: docker compose -f stacks/base/docker-compose.yml down -v

  test-databases:
    name: Database Stack Tests
    runs-on: ubuntu-22.04
    needs: shellcheck
    steps:
      - uses: actions/checkout@v4

      - name: Create networks
        run: |
          docker network create proxy || true
          docker network create databases || true

      - name: Create test .env
        # CI-only test credentials — not used in production
        run: |
          cat > stacks/databases/.env << 'EOF'
          DOMAIN=test.local
          POSTGRES_ROOT_USER=postgres
          POSTGRES_ROOT_PASSWORD=ci_test_pg
          REDIS_PASSWORD=ci_test_redis
          MARIADB_ROOT_PASSWORD=ci_test_maria
          PGADMIN_EMAIL=admin@test.com
          PGADMIN_PASSWORD=ci_test_pgadmin
          REDIS_COMMANDER_USER=admin
          REDIS_COMMANDER_PASSWORD=ci_test_rediscmd
          NEXTCLOUD_DB_PASSWORD=ci_test_nc
          GITEA_DB_PASSWORD=ci_test_gitea
          OUTLINE_DB_PASSWORD=ci_test_outline
          AUTHENTIK_DB_PASSWORD=ci_test_auth
          GRAFANA_DB_PASSWORD=ci_test_grafana
          VAULTWARDEN_DB_PASSWORD=ci_test_vault
          BOOKSTACK_DB_PASSWORD=ci_test_books
          EOF

      - name: Start databases stack
        run: docker compose -f stacks/databases/docker-compose.yml up -d
        timeout-minutes: 5

      - name: Wait for healthy
        run: |
          chmod +x tests/lib/wait-healthy.sh
          ./tests/lib/wait-healthy.sh --timeout 120

      - name: Run tests
        run: |
          chmod +x tests/run-tests.sh
          ./tests/run-tests.sh --stack databases

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-databases
          path: tests/results/

      - name: Cleanup
        if: always()
        run: docker compose -f stacks/databases/docker-compose.yml down -v

  validate-all-compose:
    name: Validate All Compose Files
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Create required networks
        run: |
          docker network create proxy || true
          docker network create databases || true
          docker network create storage-internal || true

      - name: Create stub .env files for validation
        run: |
          for stack_dir in stacks/*/; do
            if [ ! -f "${stack_dir}.env" ]; then
              cat > "${stack_dir}.env" << 'ENVEOF'
          DOMAIN=test.local
          TZ=UTC
          POSTGRES_ROOT_USER=postgres
          POSTGRES_ROOT_PASSWORD=ci_test
          REDIS_PASSWORD=ci_test
          MARIADB_ROOT_PASSWORD=ci_test
          PGADMIN_EMAIL=admin@test.com
          PGADMIN_PASSWORD=ci_test
          AUTHENTIK_SECRET_KEY=ci_test_secret_key_placeholder
          AUTHENTIK_DB_PASSWORD=ci_test
          ACME_EMAIL=test@test.local
          JELLYFIN_MEDIA_PATH=/tmp/media
          MEDIA_PATH=/tmp/media
          DOWNLOAD_PATH=/tmp/downloads
          VPN_SERVICE_PROVIDER=none
          OPENVPN_USER=test
          OPENVPN_PASSWORD=test
          NEXTCLOUD_DB_PASSWORD=ci_test
          GITEA_DB_PASSWORD=ci_test
          OUTLINE_DB_PASSWORD=ci_test
          GRAFANA_DB_PASSWORD=ci_test
          VAULTWARDEN_DB_PASSWORD=ci_test
          BOOKSTACK_DB_PASSWORD=ci_test
          NTFY_BASE_URL=http://localhost
          GOTIFY_TOKEN=ci_test
          BACKUP_DIR=/tmp/backups
          ENVEOF
            fi
          done

      - name: Validate compose syntax
        run: |
          FAILED=0
          for f in $(find stacks -name 'docker-compose.yml'); do
            echo -n "Checking ${f}... "
            if docker compose -f "${f}" config --quiet 2>/dev/null; then
              echo "OK"
            else
              echo "FAILED"
              FAILED=$((FAILED + 1))
            fi
          done
          if [ $FAILED -gt 0 ]; then
            echo "${FAILED} compose file(s) failed validation"
            exit 1
          fi

      - name: Check for latest tags
        run: |
          COUNT=$(grep -r 'image:.*:latest' stacks/ 2>/dev/null | wc -l)
          if [ "$COUNT" -gt 0 ]; then
            echo "Found :latest image tags:"
            grep -rn 'image:.*:latest' stacks/
            exit 1
          fi
          echo "No :latest tags found"
