name: Integration Tests

on:
  push:
    paths: ['stacks/**', 'scripts/**', 'tests/**']
  pull_request:
    paths: ['stacks/**', 'scripts/**', 'tests/**']

jobs:
  test:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup environment
        run: |
          cp .env.example .env
          chmod +x scripts/*.sh
          chmod +x tests/**/*.sh
      
      - name: Generate secrets
        run: |
          if [[ -f scripts/generate-secrets.sh ]]; then
            ./scripts/generate-secrets.sh
          fi
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl
      
      - name: Setup Docker
        run: |
          sudo systemctl start docker
          docker --version
          docker compose version
      
      - name: Start base stack
        run: |
          if [[ -f stacks/base/docker-compose.yml ]]; then
            docker compose -f stacks/base/docker-compose.yml up -d
          fi
      
      - name: Wait for healthy
        run: |
          echo "Waiting for containers to be healthy..."
          sleep 30
      
      - name: Run base tests
        run: |
          ./tests/run-tests.sh --stack base --json
      
      - name: Run all stack tests (dry-run mode)
        run: |
          # 在不启动所有服务的情况下验证测试脚本语法
          for test_file in tests/stacks/*.test.sh; do
            echo "Validating: $test_file"
            bash -n "$test_file"
          done
      
      - name: Validate compose files
        run: |
          for f in $(find stacks -name 'docker-compose.yml'); do
            echo "Validating: $f"
            docker compose -f "$f" config --quiet
          done
      
      - name: Check for :latest tags
        run: |
          if grep -r 'image:.*:latest' stacks/ 2>/dev/null; then
            echo "❌ Found :latest image tags"
            exit 1
          fi
          echo "✅ No :latest tags found"
      
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: tests/results/
          retention-days: 30
      
      - name: Cleanup
        if: always()
        run: |
          docker compose -f stacks/base/docker-compose.yml down || true
