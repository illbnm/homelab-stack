# =============================================================================
# HomeLab Stack — Integration Tests CI Workflow
# =============================================================================
# Triggers on pushes or PRs that modify stacks/, scripts/, tests/, or config/.
# Runs the full integration test suite in a clean Ubuntu environment.
# =============================================================================

name: Integration Tests

on:
  push:
    paths:
      - 'stacks/**'
      - 'scripts/**'
      - 'tests/**'
      - 'config/**'
  pull_request:
    paths:
      - 'stacks/**'
      - 'scripts/**'
      - 'tests/**'
      - 'config/**'

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job: Configuration validation (fast, no Docker needed)
  # ---------------------------------------------------------------------------
  config-check:
    name: Configuration Validation
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq shellcheck

      - name: Shellcheck test scripts
        run: |
          if [ ! -d tests/ ]; then
            echo "::warning::tests/ directory not found — skipping shellcheck"
            exit 0
          fi
          ERRORS=0
          find tests/ -name '*.sh' -type f | while read -r f; do
            echo "Checking: ${f}"
            if ! shellcheck -x -S warning "${f}"; then
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ "${ERRORS}" -gt 0 ]; then
            echo "::error::shellcheck found issues in ${ERRORS} file(s)"
            exit 1
          fi

      - name: Validate compose files
        run: |
          if [ ! -d stacks/ ]; then
            echo "::warning::stacks/ directory not found — skipping compose validation"
            exit 0
          fi
          FOUND=$(find stacks/ -name 'docker-compose.yml' -o -name 'docker-compose.*.yml' 2>/dev/null | wc -l)
          if [ "${FOUND}" -eq 0 ]; then
            echo "::warning::No compose files found in stacks/ — skipping validation"
            exit 0
          fi
          ERRORS=0
          find stacks/ -name 'docker-compose.yml' -o -name 'docker-compose.*.yml' | while read -r f; do
            echo "Validating: ${f}"
            if ! docker compose -f "${f}" config --quiet 2>&1; then
              echo "::error::${f} has invalid syntax"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ "${ERRORS}" -gt 0 ]; then
            exit 1
          fi

      - name: Check for latest tags and untagged images
        run: |
          if [ ! -d stacks/ ]; then
            echo "::warning::stacks/ directory not found — skipping tag check"
            exit 0
          fi
          FOUND=$(find stacks/ \( -name '*.yml' -o -name '*.yaml' \) 2>/dev/null | wc -l)
          if [ "${FOUND}" -eq 0 ]; then
            echo "::warning::No YAML files found in stacks/ — skipping tag check"
            exit 0
          fi

          FAIL=0

          # Check for explicit :latest tags (including with trailing comments)
          LATEST_COUNT=$(grep -rE 'image:\s+\S+:latest(\s|$|#)' stacks/ --include='*.yml' --include='*.yaml' 2>/dev/null | wc -l || echo "0")
          if [ "${LATEST_COUNT}" -gt 0 ]; then
            echo "::error::Found ${LATEST_COUNT} explicit ':latest' image tags:"
            grep -rnE 'image:\s+\S+:latest(\s|$|#)' stacks/ --include='*.yml' --include='*.yaml' || true
            FAIL=1
          fi

          # Check for untagged images (no : after image name → defaults to latest)
          # Matches lines like "image: nginx" but not "image: nginx:1.25" or variable refs
          UNTAGGED_COUNT=$(grep -rE 'image:\s+[a-zA-Z0-9_./-]+\s*$' stacks/ --include='*.yml' --include='*.yaml' 2>/dev/null | grep -v ':\S*:' | grep -v '\$\{' | wc -l || echo "0")
          if [ "${UNTAGGED_COUNT}" -gt 0 ]; then
            echo "::error::Found ${UNTAGGED_COUNT} untagged images (default to :latest):"
            grep -rnE 'image:\s+[a-zA-Z0-9_./-]+\s*$' stacks/ --include='*.yml' --include='*.yaml' | grep -v ':\S*:' | grep -v '\$\{' || true
            FAIL=1
          fi

          if [ "${FAIL}" -eq 1 ]; then
            exit 1
          fi
          echo "No :latest or untagged images found"

  # ---------------------------------------------------------------------------
  # Job: Base stack integration tests
  # ---------------------------------------------------------------------------
  test-base:
    name: Base Stack Tests
    runs-on: ubuntu-22.04
    needs: config-check
    if: |
      contains(github.event.head_commit.message, '[test-all]') ||
      contains(github.event.head_commit.message, '[test-base]') ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq curl

      - name: Setup environment
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          fi
          if [ -f scripts/generate-secrets.sh ]; then
            chmod +x scripts/generate-secrets.sh
            ./scripts/generate-secrets.sh || true
          fi

      - name: Create Docker networks
        run: |
          docker network create internal 2>/dev/null || true
          docker network create proxy 2>/dev/null || true

      - name: Verify compose file exists
        run: |
          if [ ! -f stacks/base/docker-compose.yml ]; then
            echo "::error::stacks/base/docker-compose.yml not found — cannot run base stack tests"
            exit 1
          fi

      - name: Start base stack
        run: |
          docker compose -f stacks/base/docker-compose.yml --env-file .env up -d

      - name: Wait for healthy
        run: |
          chmod +x tests/lib/wait-healthy.sh
          ./tests/lib/wait-healthy.sh --timeout 120

      - name: Run base tests
        run: |
          chmod +x tests/run-tests.sh
          ./tests/run-tests.sh --stack base --json

      - name: Show container status on failure
        if: failure()
        run: |
          echo "=== Container Status ==="
          docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          echo ""
          echo "=== Recent Logs ==="
          docker compose -f stacks/base/docker-compose.yml logs --tail=50 2>/dev/null || true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-base
          path: tests/results/
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          docker compose -f stacks/base/docker-compose.yml down -v 2>/dev/null || true

  # ---------------------------------------------------------------------------
  # Job: Databases stack integration tests
  # ---------------------------------------------------------------------------
  test-databases:
    name: Databases Stack Tests
    runs-on: ubuntu-22.04
    needs: config-check
    if: |
      contains(github.event.head_commit.message, '[test-all]') ||
      contains(github.event.head_commit.message, '[test-databases]') ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq curl

      - name: Setup environment
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          elif [ -f stacks/databases/.env.example ]; then
            cp stacks/databases/.env.example .env
          fi
          # Set test passwords if not in .env
          {
            echo "POSTGRES_ROOT_PASSWORD=testpgroot123"
            echo "REDIS_PASSWORD=testredis123"
            echo "MARIADB_ROOT_PASSWORD=testmaria123"
            echo "PGADMIN_EMAIL=admin@test.local"
            echo "PGADMIN_PASSWORD=testpgadmin123"
            echo "NEXTCLOUD_DB_PASSWORD=testnextcloud123"
            echo "GITEA_DB_PASSWORD=testgitea123"
            echo "OUTLINE_DB_PASSWORD=testoutline123"
            echo "AUTHENTIK_DB_PASSWORD=testauthentik123"
            echo "GRAFANA_DB_PASSWORD=testgrafana123"
            echo "NEXTCLOUD_MARIADB_PASSWORD=testnextcloudmaria123"
            echo "DOMAIN=localhost"
          } >> .env

      - name: Create Docker networks
        run: |
          docker network create internal 2>/dev/null || true
          docker network create proxy 2>/dev/null || true

      - name: Verify compose file exists
        run: |
          if [ ! -f stacks/databases/docker-compose.yml ]; then
            echo "::error::stacks/databases/docker-compose.yml not found — cannot run databases stack tests"
            exit 1
          fi

      - name: Start databases stack
        run: |
          chmod +x stacks/databases/scripts/*.sh 2>/dev/null || true
          docker compose -f stacks/databases/docker-compose.yml --env-file .env up -d

      - name: Wait for healthy
        run: |
          chmod +x tests/lib/wait-healthy.sh
          ./tests/lib/wait-healthy.sh --timeout 180

      - name: Run databases tests
        run: |
          chmod +x tests/run-tests.sh
          ./tests/run-tests.sh --stack databases --json

      - name: Show container status on failure
        if: failure()
        run: |
          echo "=== Container Status ==="
          docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          echo ""
          echo "=== Recent Logs ==="
          docker compose -f stacks/databases/docker-compose.yml logs --tail=50 2>/dev/null || true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-databases
          path: tests/results/
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          docker compose -f stacks/databases/docker-compose.yml down -v 2>/dev/null || true

  # ---------------------------------------------------------------------------
  # Job: Full integration test (all stacks)
  # ---------------------------------------------------------------------------
  test-all:
    name: Full Integration Tests
    runs-on: ubuntu-22.04
    needs: config-check
    if: |
      contains(github.event.head_commit.message, '[test-all]') ||
      github.event.pull_request.base.ref == 'main'
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq curl

      - name: Setup environment
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          fi
          if [ -f scripts/generate-secrets.sh ]; then
            chmod +x scripts/generate-secrets.sh
            ./scripts/generate-secrets.sh || true
          fi

      - name: Create Docker networks
        run: |
          docker network create internal 2>/dev/null || true
          docker network create proxy 2>/dev/null || true

      - name: Run configuration tests
        run: |
          chmod +x tests/run-tests.sh
          ./tests/run-tests.sh --config --json

      - name: Run all stack tests
        run: |
          ./tests/run-tests.sh --all --json

      - name: Show results
        if: always()
        run: |
          if [ -f tests/results/report.json ]; then
            echo "=== Test Report ==="
            jq .summary tests/results/report.json
          fi

      - name: Show container status on failure
        if: failure()
        run: |
          docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-all
          path: tests/results/
          retention-days: 30
