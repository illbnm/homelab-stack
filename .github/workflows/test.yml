name: Integration Tests

on:
  push:
    paths:
      - 'stacks/**'
      - 'scripts/**'
      - 'tests/**'
  pull_request:
    paths:
      - 'stacks/**'
      - 'scripts/**'
      - 'tests/**'

jobs:
  test:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Docker
        uses: docker/setup-buildx-action@v3
      
      - name: Setup environment
        run: |
          cp .env.example .env || true
          ./scripts/generate-secrets.sh || true
      
      - name: Start base stack
        run: |
          docker compose -f stacks/base/docker-compose.yml up -d
      
      - name: Wait for healthy
        run: |
          chmod +x tests/lib/wait-healthy.sh || true
          ./tests/lib/wait-healthy.sh --timeout 120 || sleep 30
      
      - name: Run tests - Base Stack
        run: |
          chmod +x tests/run-tests.sh
          ./tests/run-tests.sh --stack base --json
        continue-on-error: true
      
      - name: Run tests - All Stacks
        run: |
          ./tests/run-tests.sh --all --json
        continue-on-error: true
      
      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: tests/results/
          retention-days: 30
      
      - name: Upload JUnit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-report
          path: tests/results/junit.xml
          retention-days: 30
      
      - name: Cleanup
        if: always()
        run: |
          docker compose -f stacks/base/docker-compose.yml down -v || true
