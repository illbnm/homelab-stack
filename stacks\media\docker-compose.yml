---
# =============================================================================
# Media Stack — Jellyfin + Sonarr + Radarr + Prowlarr + qBittorrent + Jellyseerr
# =============================================================================
# TRaSH Guides hardlink-compatible layout:
#   /data/torrents/{movies,tv}   ← qBittorrent download paths
#   /data/media/{movies,tv}      ← Jellyfin library paths
# =============================================================================

name: media

networks:
  media_internal:
    name: media_internal
    driver: bridge
  traefik_proxy:
    name: traefik_proxy
    external: true

volumes:
  jellyfin_config:
    name: jellyfin_config
  jellyfin_cache:
    name: jellyfin_cache
  sonarr_config:
    name: sonarr_config
  radarr_config:
    name: radarr_config
  prowlarr_config:
    name: prowlarr_config
  qbittorrent_config:
    name: qbittorrent_config
  jellyseerr_config:
    name: jellyseerr_config

services:

  # ---------------------------------------------------------------------------
  # qBittorrent — Torrent downloader
  # ---------------------------------------------------------------------------
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:4.6.7
    container_name: qbittorrent
    restart: unless-stopped
    networks:
      - media_internal
      - traefik_proxy
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Asia/Shanghai}
      WEBUI_PORT: 8080
    volumes:
      - qbittorrent_config:/config
      - ${DOWNLOADS_ROOT:-/data/torrents}:/data/torrents
    ports:
      - "${QBITTORRENT_PORT:-6881}:6881"
      - "${QBITTORRENT_PORT:-6881}:6881/udp"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v2/app/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.${DOMAIN}`)"
      - "traefik.http.routers.qbittorrent.entrypoints=websecure"
      - "traefik.http.routers.qbittorrent.tls=true"
      - "traefik.http.routers.qbittorrent.tls.certresolver=${CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8080"
      - "traefik.docker.network=traefik_proxy"
      # Optional: Authentik forward auth
      # - "traefik.http.routers.qbittorrent.middlewares=authentik@docker"

  # ---------------------------------------------------------------------------
  # Prowlarr — Indexer manager (must be healthy before Sonarr/Radarr)
  # ---------------------------------------------------------------------------
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:1.22.0
    container_name: prowlarr
    restart: unless-stopped
    networks:
      - media_internal
      - traefik_proxy
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - prowlarr_config:/config
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9696/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.${DOMAIN}`)"
      - "traefik.http.routers.prowlarr.entrypoints=websecure"
      - "traefik.http.routers.prowlarr.tls=true"
      - "traefik.http.routers.prowlarr.tls.certresolver=${CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
      - "traefik.docker.network=traefik_proxy"
      # Optional: Authentik forward auth
      # - "traefik.http.routers.prowlarr.middlewares=authentik@docker"

  # ---------------------------------------------------------------------------
  # Sonarr — TV series management
  # ---------------------------------------------------------------------------
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.11
    container_name: sonarr
    restart: unless-stopped
    networks:
      - media_internal
      - traefik_proxy
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - sonarr_config:/config
      # Mount entire /data so hardlinks work across torrents/ and media/
      - ${MEDIA_ROOT:-/data/media}:/data/media
      - ${DOWNLOADS_ROOT:-/data/torrents}:/data/torrents
    depends_on:
      qbittorrent:
        condition: service_healthy
      prowlarr:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8989/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.${DOMAIN}`)"
      - "traefik.http.routers.sonarr.entrypoints=websecure"
      - "traefik.http.routers.sonarr.tls=true"
      - "traefik.http.routers.sonarr.tls.certresolver=${CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
      - "traefik.docker.network=traefik_proxy"
      # Optional: Authentik forward auth
      # - "traefik.http.routers.sonarr.middlewares=authentik@docker"

  # ---------------------------------------------------------------------------
  # Radarr — Movie management
  # ---------------------------------------------------------------------------
  radarr:
    image: lscr.io/linuxserver/radarr:5.8.1
    container_name: radarr
    restart: unless-stopped
    networks:
      - media_internal
      - traefik_proxy
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - radarr_config:/config
      # Mount entire /data so hardlinks work across torrents/ and media/
      - ${MEDIA_ROOT:-/data/media}:/data/media
      - ${DOWNLOADS_ROOT:-/data/torrents}:/data/torrents
    depends_on:
      qbittorrent:
        condition: service_healthy
      prowlarr:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7878/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.${DOMAIN}`)"
      - "traefik.http.routers.radarr.entrypoints=websecure"
      - "traefik.http.routers.radarr.tls=true"
      - "traefik.http.routers.radarr.tls.certresolver=${CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
      - "traefik.docker.network=traefik_proxy"
      # Optional: Authentik forward auth
      # - "traefik.http.routers.radarr.middlewares=authentik@docker"

  # ---------------------------------------------------------------------------
  # Jellyfin — Media server
  # ---------------------------------------------------------------------------
  jellyfin:
    image: jellyfin/jellyfin:10.9.11
    container_name: jellyfin
    restart: unless-stopped
    networks:
      - media_internal
      - traefik_proxy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      JELLYFIN_PublishedServerUrl: https://jellyfin.${DOMAIN}
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - ${MEDIA_ROOT:-/data/media}:/data/media:ro
    # Uncomment to enable hardware transcoding (Intel QuickSync)
    # devices:
    #   - /dev/dri:/dev/dri
    # Uncomment to enable hardware transcoding (NVIDIA GPU)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    depends_on:
      sonarr:
        condition: service_healthy
      radarr:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8096/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.${DOMAIN}`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls=true"
      - "traefik.http.routers.jellyfin.tls.certresolver=${CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
      - "traefik.docker.network=traefik_proxy"
      # Jellyfin handles its own auth — no forward auth needed
      # CORS headers for remote clients
      - "traefik.http.middlewares.jellyfin-headers.headers.customResponseHeaders.X-Robots-Tag=noindex,nofollow,nosnippet,noarchive,notranslate,noimageindex"

  # ---------------------------------------------------------------------------
  # Jellyseerr — Media request management
  # ---------------------------------------------------------------------------
  jellyseerr:
    image: fallenbagel/jellyseerr:2.1.1
    container_name: jellyseerr
    restart: unless-stopped
    networks:
      - media_internal
      - traefik_proxy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LOG_LEVEL: ${JELLYSEERR_LOG_LEVEL:-info}
    volumes:
      - jellyseerr_config:/app/config
    depends_on:
      jellyfin:
        condition: service_healthy
      sonarr:
        condition: service_healthy
      radarr:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5055/api/v1/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyseerr.rule=Host(`jellyseerr.${DOMAIN}`)"
      - "traefik.http.routers.jellyseerr.entrypoints=websecure"
      - "traefik.http.routers.jellyseerr.tls=true"
      - "traefik.http.routers.jellyseerr.tls.certresolver=${CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.services.jellyseerr.loadbalancer.server.port=5055"
      - "traefik.docker.network=traefik_proxy"
      # Optional: Authentik forward auth
      # - "traefik.http.routers.jellyseerr.middlewares=authentik@docker"
