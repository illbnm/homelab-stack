version: "3.8"

# =============================================================================
# Notifications Stack — ntfy + Gotify
# 统一通知中心：支持 ntfy App 推送 + Gotify 备用推送
# =============================================================================
#
# 启动方式:
#   docker compose -f stacks/notifications/docker-compose.yml up -d
#
# 依赖:
#   - 已运行 base stack (Traefik 网络)
#   - 已配置 .env 文件
# =============================================================================

networks:
  proxy:
    external: true
  notifications:
    name: notifications
    driver: bridge

volumes:
  ntfy_cache:
    driver: local
  ntfy_data:
    driver: local
  gotify_data:
    driver: local

services:
  # ---------------------------------------------------------------------------
  # ntfy — 开源推送通知服务器
  # Web UI: https://ntfy.${DOMAIN}
  # ---------------------------------------------------------------------------
  ntfy:
    image: binwiederhier/ntfy:v2.11.0
    container_name: ntfy
    restart: unless-stopped
    command:
      - serve
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ../../config/ntfy/server.yml:/etc/ntfy/server.yml:ro
      - ntfy_cache:/var/cache/ntfy
      - ntfy_data:/var/lib/ntfy
    networks:
      - proxy
      - notifications
    ports:
      - "${NTFY_PORT:-2586}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -E '\"healthy\":true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.ntfy.rule=Host(`ntfy.${DOMAIN}`)"
      - "traefik.http.routers.ntfy.entrypoints=websecure"
      - "traefik.http.routers.ntfy.tls=true"
      - "traefik.http.routers.ntfy.tls.certresolver=letsencrypt"
      - "traefik.http.services.ntfy.loadbalancer.server.port=80"
      # Watchtower
      - "com.centurylinklabs.watchtower.enable=true"
      # Homepage
      - "homepage.group=Notifications"
      - "homepage.name=ntfy"
      - "homepage.icon=ntfy.png"
      - "homepage.href=https://ntfy.${DOMAIN}"
      - "homepage.description=推送通知服务器"

  # ---------------------------------------------------------------------------
  # Gotify — 备用推送服务
  # Web UI: https://gotify.${DOMAIN}
  # ---------------------------------------------------------------------------
  gotify:
    image: gotify/server:2.5.0
    container_name: gotify
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      GOTIFY_DEFAULTUSER_NAME: ${GOTIFY_ADMIN_USER:-admin}
      GOTIFY_DEFAULTUSER_PASS: ${GOTIFY_ADMIN_PASS:?GOTIFY_ADMIN_PASS is required}
      GOTIFY_SERVER_PORT: 80
      GOTIFY_SERVER_KEEPALIVEPERIODSECONDS: 0
      GOTIFY_SERVER_LISTENADDR: ""
      GOTIFY_SERVER_SSL_ENABLED: "false"
      GOTIFY_DATABASE_DIALECT: sqlite3
      GOTIFY_DATABASE_CONNECTION: data/gotify.db
      GOTIFY_PASSSTRENGTH: 10
      GOTIFY_UPLOADEDIMAGESDIR: data/images
      GOTIFY_PLUGINSDIR: data/plugins
    volumes:
      - gotify_data:/app/data
    networks:
      - proxy
      - notifications
    ports:
      - "${GOTIFY_PORT:-8070}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:80/health -O - | grep -E 'ok|true|200' || wget -q --tries=1 -O /dev/null http://localhost:80/ && echo 'ok'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.gotify.rule=Host(`gotify.${DOMAIN}`)"
      - "traefik.http.routers.gotify.entrypoints=websecure"
      - "traefik.http.routers.gotify.tls=true"
      - "traefik.http.routers.gotify.tls.certresolver=letsencrypt"
      - "traefik.http.services.gotify.loadbalancer.server.port=80"
      # Websocket 支持 (Gotify 实时推送依赖 WebSocket)
      - "traefik.http.middlewares.gotify-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.gotify.middlewares=gotify-headers"
      # Watchtower
      - "com.centurylinklabs.watchtower.enable=true"
      # Homepage
      - "homepage.group=Notifications"
      - "homepage.name=Gotify"
      - "homepage.icon=gotify.png"
      - "homepage.href=https://gotify.${DOMAIN}"
      - "homepage.description=备用推送服务"
